<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PokéCatch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:rgba(0,0,0,0)}
html,body{width:100%;height:100%;overflow:hidden;background:#111;
  font-family:'Courier New',monospace;user-select:none;-webkit-user-select:none;
  touch-action:manipulation}
.scr{position:absolute;top:0;left:0;right:0;bottom:0;display:none;
  flex-direction:column;align-items:center}

/* ── AUTH ── */
#sauth{background:linear-gradient(170deg,#330000,#cc0000 40%,#550000 70%,#111);
  justify-content:center;gap:18px;padding:28px 24px}
.auth-input{width:100%;max-width:300px;background:rgba(0,0,0,.4);
  border:2px solid rgba(255,255,255,.3);border-radius:14px;
  padding:14px 18px;font-size:16px;font-family:'Courier New',monospace;
  color:#fff;-webkit-appearance:none;outline:none;text-align:center}
.auth-input:focus{border-color:#ffcb05;background:rgba(0,0,0,.6)}
.auth-input::-webkit-input-placeholder{color:rgba(255,255,255,.4)}
.auth-input::placeholder{color:rgba(255,255,255,.4)}
#a-title{font-size:52px;font-weight:900;color:#fff;
  text-shadow:3px 3px 0 #000,0 0 20px rgba(255,80,80,.5)}
#a-sub{color:rgba(255,255,255,.65);font-size:12px;text-align:center;line-height:1.6;max-width:280px}
#a-msg{font-size:13px;text-align:center;min-height:18px;font-weight:700}

/* ── MENU ── */
#sm{background:linear-gradient(170deg,#330000,#cc0000 40%,#550000 70%,#111);
  justify-content:center;gap:18px;padding:24px}
.pb{width:96px;height:96px;border-radius:50%;flex-shrink:0;position:relative;
  border:7px solid #111;box-shadow:0 10px 30px rgba(0,0,0,.7);
  background:linear-gradient(180deg,#cc0000 47%,#222 47%,#222 53%,#eee 53%)}
.pb:after{content:'';position:absolute;top:50%;left:50%;
  width:22px;height:22px;border-radius:50%;
  background:#e8e8e8;border:5px solid #111;
  transform:translate(-50%,-50%)}
#m-title{font-size:52px;font-weight:900;color:#fff;
  text-shadow:3px 3px 0 #000,0 0 20px rgba(255,80,80,.5)}
#m-user{color:#ffcb05;font-size:14px;font-weight:900;text-align:center}
#m-sub{color:rgba(255,255,255,.7);font-size:13px;text-align:center;line-height:1.6}
.bigbtn{background:#ffcb05;color:#111;border:4px solid #111;border-radius:60px;
  padding:15px 52px;font-size:22px;font-weight:900;cursor:pointer;
  font-family:inherit;box-shadow:0 6px 0 #9a7a00;display:block;
  -webkit-appearance:none;width:auto}
.bigbtn:active{transform:translateY(5px);box-shadow:0 1px 0 #9a7a00}
.smolbtn{background:rgba(255,255,255,.1);color:#fff;border:2px solid rgba(255,255,255,.3);
  border-radius:40px;padding:9px 26px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;-webkit-appearance:none;display:block}
#m-saved{color:rgba(255,255,255,.5);font-size:12px;text-align:center}
#m-mute{background:none;border:none;color:rgba(255,255,255,.5);
  font-size:22px;cursor:pointer}

/* ── GAME ── */
#sg{background:#0d1a0d;align-items:stretch}
#hud{background:#cc0000;padding:8px 14px;flex-shrink:0;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,.5)}
#hud-lv{color:#ffcb05;font-size:14px;font-weight:900}
#hud-t{display:flex;flex-direction:column;align-items:center;gap:2px}
#hud-n{color:#fff;font-size:32px;font-weight:900;line-height:1}
#hud-b{width:80px;height:5px;background:rgba(255,255,255,.25);border-radius:3px}
#hud-f{height:100%;border-radius:3px;background:#ffcb05;
  -webkit-transition:width 1s linear,background .4s;transition:width 1s linear,background .4s}
#hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
#hud-col{background:#ffcb05;color:#111;border:2px solid #111;border-radius:6px;
  padding:4px 10px;font-size:12px;font-weight:900;cursor:pointer;
  font-family:inherit;-webkit-appearance:none}
#hud-hp{font-size:15px;letter-spacing:1px;line-height:1}

#trow{background:#111;display:flex;justify-content:space-around;
  padding:6px 2px;flex-shrink:0}
.tslot{display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:3px 8px;border-radius:8px;min-width:88px;
  border:1px solid rgba(255,203,5,.15);
  -webkit-transition:background .25s;transition:background .25s}
.tslot.penalty{background:rgba(255,0,0,.4)}
.tslot img{width:50px;height:50px;image-rendering:pixelated;border-radius:50%}
.tname{color:#ffcb05;font-size:9px;font-weight:900;text-align:center}
.tpips{display:flex;gap:4px;margin-top:1px}
.pip{width:12px;height:12px;border-radius:50%;border:2px solid #ffcb05;background:transparent}
.pip.on{background:#ffcb05}

/* ── FIELD + DEPTH ── */
#field{flex:1;width:100%;align-self:stretch;position:relative;overflow:hidden;
  min-height:200px;background:#0d1a0d}
#map-canvas{position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:0;pointer-events:none;
  image-rendering:pixelated;image-rendering:crisp-edges}
#field::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 40%,transparent 30%,rgba(0,0,0,.45) 100%);
  pointer-events:none;z-index:3}

/* depth layers for deco */
.grass{position:absolute;pointer-events:none;user-select:none;-webkit-user-select:none}
.grass.far {font-size:15px;opacity:.2;z-index:0}
.grass.mid {font-size:24px;opacity:.4;z-index:1}
.grass.near{font-size:36px;opacity:.55;z-index:2}

/* ── POKÉMON ── */
.mon{position:absolute;display:flex;flex-direction:column;
  align-items:center;cursor:pointer;z-index:5;
  -webkit-animation:popin .25s cubic-bezier(.17,.67,.34,1.3) both;
  animation:popin .25s cubic-bezier(.17,.67,.34,1.3) both}
@-webkit-keyframes popin{0%{-webkit-transform:scale(0);opacity:0}100%{-webkit-transform:scale(1);opacity:1}}
@keyframes popin{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.mon-img{width:82px;height:82px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:3px solid rgba(255,255,255,.75);position:relative;
  box-shadow:0 4px 14px rgba(0,0,0,.65)}
.mon-img img{width:70px;height:70px;image-rendering:pixelated;pointer-events:none}
.mon-lbl{color:#fff;font-size:13px;font-weight:900;background:rgba(0,0,0,.88);
  border-radius:6px;padding:2px 7px;margin-top:3px;
  white-space:nowrap;pointer-events:none;text-shadow:0 1px 2px #000}
.mon.tgt .mon-img{border-color:#ffcb05;
  box-shadow:0 0 14px rgba(255,203,5,.6),0 4px 14px rgba(0,0,0,.65)}
.mon.tgt .mon-lbl{background:#ffcb05;color:#111}

/* ── BOSS ── */
.mon.boss{z-index:10}
.mon.boss .mon-img{
  width:110px;height:110px;
  border:4px solid #ff2200;
  box-shadow:0 0 22px rgba(255,34,0,.8),0 0 50px rgba(255,34,0,.35),0 6px 18px rgba(0,0,0,.7);
  -webkit-animation:bosspulse 1.1s ease-in-out 0.3s infinite;
  animation:bosspulse 1.1s ease-in-out 0.3s infinite}
.mon.boss .mon-img img{width:90px;height:90px}
.mon.boss .mon-lbl{background:#cc0000;color:#fff;font-size:14px;padding:3px 10px}
@-webkit-keyframes bosspulse{
  0%,100%{-webkit-box-shadow:0 0 22px rgba(255,34,0,.8),0 6px 18px rgba(0,0,0,.7)}
  50%{-webkit-box-shadow:0 0 44px rgba(255,34,0,1),0 0 75px rgba(255,100,0,.5),0 6px 18px rgba(0,0,0,.7)}}
@keyframes bosspulse{
  0%,100%{box-shadow:0 0 22px rgba(255,34,0,.8),0 6px 18px rgba(0,0,0,.7)}
  50%{box-shadow:0 0 44px rgba(255,34,0,1),0 0 75px rgba(255,100,0,.5),0 6px 18px rgba(0,0,0,.7)}}
.boss-bars{width:110px;display:flex;flex-direction:column;gap:3px;margin-bottom:5px}
.boss-hpbar{height:9px;background:rgba(0,0,0,.7);border-radius:5px;
  border:1px solid #ff4444;overflow:hidden}
.boss-hpfill{height:100%;background:linear-gradient(90deg,#ff2200,#ff6600);border-radius:5px;
  -webkit-transition:width .15s,background .3s;transition:width .15s,background .3s}
.boss-timebar{height:5px;background:rgba(0,0,0,.5);border-radius:3px;overflow:hidden}
.boss-timefill{height:100%;background:#00cc44;border-radius:3px;
  -webkit-transition:width .1s linear,background .3s;transition:width .1s linear,background .3s}

/* ── MAP TOAST ── */
#map-toast{position:absolute;top:12px;left:50%;
  -webkit-transform:translateX(-50%);transform:translateX(-50%);
  background:rgba(0,0,0,.78);color:#ffcb05;font-size:13px;font-weight:900;
  border-radius:20px;padding:5px 18px;z-index:40;pointer-events:none;
  opacity:0;-webkit-transition:opacity .4s;transition:opacity .4s}
#map-toast.show{opacity:1}

/* ── FX ── */
.bling{position:absolute;pointer-events:none;z-index:20;
  width:60px;height:60px;border-radius:50%;
  border:4px solid #ffcb05;background:rgba(255,203,5,.2);
  -webkit-animation:bl .4s ease-out forwards;animation:bl .4s ease-out forwards}
.bossboom{position:absolute;pointer-events:none;z-index:20;
  width:140px;height:140px;border-radius:50%;
  border:6px solid #ff4400;background:rgba(255,100,0,.2);
  -webkit-animation:bl .55s ease-out forwards;animation:bl .55s ease-out forwards}
@-webkit-keyframes bl{0%{-webkit-transform:scale(.3);opacity:1}100%{-webkit-transform:scale(2.8);opacity:0}}
@keyframes bl{0%{transform:scale(.3);opacity:1}100%{transform:scale(2.8);opacity:0}}
.floattxt{position:absolute;pointer-events:none;z-index:20;font-weight:900;
  -webkit-animation:ft .55s ease-out forwards;animation:ft .55s ease-out forwards}
@-webkit-keyframes ft{0%{opacity:1;-webkit-transform:translateY(0)}100%{opacity:0;-webkit-transform:translateY(-38px)}}
@keyframes ft{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-38px)}}

/* ── COUNTDOWN ── */
#cdown{position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  z-index:60;pointer-events:none}
#cdown-n{font-size:130px;font-weight:900;color:#ffcb05;
  text-shadow:5px 5px 0 #000;opacity:0}
#timeup{position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.72);z-index:50;pointer-events:none;opacity:0;
  -webkit-transition:opacity .35s;transition:opacity .35s}
#timeup.show{opacity:1}
#timeup span{color:#ff4444;font-size:56px;font-weight:900;text-shadow:4px 4px 0 #000}

/* ── CASINO ── */
#sc{background:radial-gradient(ellipse at 50% 0%,#2a0e60,#060612);
  padding:20px 12px;gap:12px;justify-content:flex-start}
#cas-h{color:#ffcb05;font-size:28px;font-weight:900;text-align:center;
  text-shadow:0 0 20px rgba(255,203,5,.4)}
#cas-sub{color:rgba(255,255,255,.5);font-size:12px;text-align:center}
#cas-reels{display:flex;gap:10px;justify-content:center;width:100%}
.rw{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;max-width:105px}
.rl{color:#ffcb05;font-size:10px;font-weight:900;text-align:center}
.rv{width:84px;height:84px;border:4px solid #ffcb05;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:#06060e;position:relative;overflow:hidden;
  box-shadow:0 0 16px rgba(255,203,5,.25)}
.rv.off{border-color:#555;box-shadow:none}
.rv img{width:66px;height:66px;image-rendering:pixelated}
.rv .rx{position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;color:#666;font-weight:900;background:rgba(0,0,0,.5)}
.rv.spin img{-webkit-animation:sp .12s linear infinite;animation:sp .12s linear infinite}
@-webkit-keyframes sp{0%{-webkit-transform:scaleY(1)}50%{-webkit-transform:scaleY(0)}100%{-webkit-transform:scaleY(1)}}
@keyframes sp{0%{transform:scaleY(1)}50%{transform:scaleY(0)}100%{transform:scaleY(1)}}
.rscore{color:rgba(255,255,255,.6);font-size:11px}
#cas-res{display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:6px;min-height:110px;width:100%;text-align:center}
#cas-img{width:90px;height:90px;image-rendering:pixelated;display:none}
#cas-txt{font-size:17px;font-weight:900;color:#fff}
#cas-name{font-size:28px;font-weight:900;color:#ffcb05}

/* ── COLLECTION ── */
#scol{background:#08081e;padding:14px;gap:12px}
#col-top{display:flex;width:100%;align-items:center;justify-content:space-between}
#col-h{color:#ffcb05;font-size:22px;font-weight:900}
#col-cnt{color:rgba(255,255,255,.45);font-size:12px}
#col-x{background:#cc0000;color:#fff;border:none;border-radius:8px;
  padding:7px 16px;font-size:13px;font-weight:900;cursor:pointer;
  font-family:inherit;-webkit-appearance:none}
#col-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;
  width:100%;overflow-y:auto;flex:1;padding-bottom:8px}
.cel{background:rgba(255,255,255,.04);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;
  padding:7px 3px;border:1px solid rgba(255,203,5,.1)}
.cel img{width:50px;height:50px;image-rendering:pixelated}
.cel-n{color:#ffcb05;font-size:9px;font-weight:900;text-align:center;margin-top:3px}
.cel-new{color:#ff4455;font-size:9px;font-weight:900}
</style>
</head>
<body>

<!-- AUTH -->
<div id="sauth" class="scr" style="display:flex">
  <div class="pb"></div>
  <div id="a-title">PokéCatch</div>
  <div id="a-sub">Ingresa para guardar tu Pokédex en este dispositivo</div>
  <input class="auth-input" id="a-email" type="email" placeholder="📧 tu@email.com"
    autocomplete="email" autocapitalize="off" autocorrect="off">
  <input class="auth-input" id="a-name" type="text" placeholder="🎮 Nombre de entrenador"
    autocomplete="username" autocapitalize="words" autocorrect="off">
  <button class="bigbtn" id="a-btn">¡ENTRAR!</button>
  <div id="a-msg"></div>
</div>

<!-- MENU -->
<div id="sm" class="scr">
  <div class="pb"></div>
  <div id="m-title">PokéCatch</div>
  <div id="m-user"></div>
  <div id="m-sub">Atrapa 3 de cada objetivo<br>¡Cuidado con el jefe!</div>
  <button class="bigbtn" id="m-play">▶ JUGAR</button>
  <button class="smolbtn" id="m-col">📖 Mi Colección</button>
  <div id="m-saved"></div>
  <div style="display:flex;gap:14px;align-items:center">
    <button id="m-mute" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:22px;cursor:pointer">🔊</button>
    <button class="smolbtn" id="m-logout" style="font-size:12px;padding:6px 16px">🚪 Salir</button>
  </div>
</div>

<!-- GAME -->
<div id="sg" class="scr">
  <div id="hud">
    <div id="hud-lv">LVL 1</div>
    <div id="hud-t">
      <div id="hud-n">60</div>
      <div id="hud-b"><div id="hud-f" style="width:100%"></div></div>
    </div>
    <div id="hud-right">
      <button id="hud-col">📖</button>
      <div id="hud-hp">❤️❤️❤️❤️❤️</div>
    </div>
  </div>
  <div id="trow"></div>
  <div id="field">
    <canvas id="map-canvas"></canvas>
    <div id="map-toast"></div>
    <div id="cdown"><div id="cdown-n"></div></div>
    <div id="timeup"><span>¡TIEMPO!</span></div>
  </div>
</div>

<!-- CASINO -->
<div id="sc" class="scr">
  <div id="cas-h">🎰 RULETA</div>
  <div id="cas-sub">La ruleta elige al azar — ¡completa más para más chances!</div>
  <div id="cas-reels"></div>
  <div id="cas-res">
    <img id="cas-img" alt="">
    <div id="cas-txt"></div>
    <div id="cas-name"></div>
  </div>
  <button class="bigbtn" id="cas-btn" style="display:none;margin-top:auto;margin-bottom:12px">▶ SIGUIENTE NIVEL</button>
</div>

<!-- COLLECTION -->
<div id="scol" class="scr">
  <div id="col-top">
    <div><div id="col-h">📖 Colección</div><div id="col-cnt"></div></div>
    <button id="col-x">✕ Cerrar</button>
  </div>
  <div id="col-grid"></div>
</div>

<script>
(function() {
'use strict';

/* ── DATA ── */
var POOL = [
  {id:1,  n:'Bulbasaur', c:'#78c850'},{id:4,  n:'Charmander',c:'#f08030'},
  {id:7,  n:'Squirtle',  c:'#6890f0'},{id:25, n:'Pikachu',   c:'#f8d030'},
  {id:39, n:'Jigglypuff',c:'#f4bdc9'},{id:52, n:'Meowth',    c:'#c8a850'},
  {id:54, n:'Psyduck',   c:'#f8d848'},{id:79, n:'Slowpoke',  c:'#f4bdc9'},
  {id:94, n:'Gengar',    c:'#705898'},{id:113,n:'Chansey',   c:'#f4bdc9'},
  {id:129,n:'Magikarp',  c:'#f85888'},{id:133,n:'Eevee',     c:'#c8a058'},
  {id:143,n:'Snorlax',   c:'#708070'},{id:150,n:'Mewtwo',    c:'#9880c8'},
  {id:151,n:'Mew',       c:'#f8a0c0'},{id:152,n:'Chikorita', c:'#78c850'},
  {id:155,n:'Cyndaquil', c:'#f85030'},{id:158,n:'Totodile',  c:'#6890f0'},
  {id:172,n:'Pichu',     c:'#f8d030'},{id:175,n:'Togepi',    c:'#e8e8e8'},
  {id:196,n:'Espeon',    c:'#9880c8'},{id:197,n:'Umbreon',   c:'#f8c000'},
  {id:216,n:'Teddiursa', c:'#c09858'},{id:249,n:'Lugia',     c:'#8888c8'},
  {id:252,n:'Treecko',   c:'#78c850'},{id:255,n:'Torchic',   c:'#f87030'},
  {id:258,n:'Mudkip',    c:'#6890f0'},{id:385,n:'Jirachi',   c:'#f8d030'},
  {id:393,n:'Piplup',    c:'#6890f0'},{id:448,n:'Lucario',   c:'#3868b8'},
  {id:58, n:'Growlithe', c:'#f87030'},{id:147,n:'Dratini',   c:'#98a8d0'},
  {id:183,n:'Marill',    c:'#6898f0'},{id:280,n:'Ralts',     c:'#f0a0b8'}
];

var BOSS_POOL = [
  {id:94,  n:'Gengar',    c:'#705898', hp:14},
  {id:130, n:'Gyarados',  c:'#4860d8', hp:16},
  {id:143, n:'Snorlax',   c:'#506050', hp:18},
  {id:149, n:'Dragonite', c:'#f0b800', hp:15},
  {id:150, n:'Mewtwo',    c:'#9070c0', hp:20},
  {id:248, n:'Tyranitar', c:'#505060', hp:18},
  {id:249, n:'Lugia',     c:'#7080c0', hp:17},
  {id:250, n:'Ho-Oh',     c:'#f87828', hp:16}
];

var MAPS = [
  {deco:['🌿','🌱','🍀','🌾','🌲','🌳','🌸','🍃','🌺','🌻'], name:'Bosque', bg:'#1a3a14'},
  {deco:['🌊','🐚','🏖️','🌴','🐠','🦀','🌺','⛵'],           name:'Playa',  bg:'#006699'},
  {deco:['🪨','⛰️','💎','🌑','🦇','🕸️','💀','🔮'],           name:'Cueva',  bg:'#0a0a15'},
  {deco:['⭐','🌙','✨','💫','🦉','🌌','🔭','🌟'],             name:'Noche',  bg:'#050515'}
];

function gif(id){ return 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/'+id+'.gif'; }
function png(id){ return 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/'+id+'.png'; }
function cryUrl(id){ return 'https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/latest/'+id+'.ogg'; }

/* ── USER AUTH (localStorage) ── */
var currentUser = null;
var col = [];

function loadUser() {
  try {
    var u = localStorage.getItem('pkc-user');
    if (u) currentUser = JSON.parse(u);
  } catch(e) { currentUser = null; }
  if (currentUser && currentUser.email) {
    try { col = JSON.parse(localStorage.getItem('pkc5-' + currentUser.email) || '[]') || []; } catch(e) { col = []; }
    return true;
  }
  return false;
}

function persistUser() {
  try { localStorage.setItem('pkc-user', JSON.stringify(currentUser)); } catch(e) {}

function shuffle(a) {
  var b = a.slice(), i, j, t;
  for (i = b.length - 1; i > 0; i--) {

    t = b[i]; b[i] = b[j]; b[j] = t;

/* ── MUSIC ── */
var ac = null, musicTimer = null, nextBeat = 0, beatIdx = 0;
var MELODY = [261.63,329.63,392,440,523.25,392,329.63,261.63,
              293.66,349.23,392,440,523.25,440,349.23,293.66];
var BASS   = [130.81,0,196,0,130.81,0,196,0,
              146.83,0,196,0,146.83,0,196,0];
var BPS = 0.42;

function initAC() {
  if (ac) return;
  try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { ac = null; }
}

function tone(freq, when, dur, vol, type) {
  if (!ac) return;
  try {
    var o = ac.createOscillator();
    var g = ac.createGain();
    o.type = type || 'triangle';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vol, when + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(when); o.stop(when + dur + 0.06);
  } catch(e) {}
}

function musicTick() {
  if (muted || !ac) return;
  var AHEAD = 0.35;
  while (nextBeat < ac.currentTime + AHEAD) {
    var i = beatIdx % MELODY.length;
    tone(MELODY[i], nextBeat, BPS * 1.6, 0.055);
    if (BASS[i]) tone(BASS[i], nextBeat, BPS * 3.2, 0.04, 'sine');
    nextBeat += BPS;
    beatIdx++;
  }
  musicTimer = setTimeout(musicTick, 120);
}

function startMusic() {
  if (muted) return;
  initAC();
  if (!ac) return;
  if (ac.state === 'suspended') { try { ac.resume(); } catch(e) {} }
  clearTimeout(musicTimer);
  nextBeat = ac.currentTime + 0.2;
  beatIdx = 0;
  musicTick();
}

function stopMusic() { clearTimeout(musicTimer); }

function playDrumHit(when, vol, pitch) {
  if (!ac) return;
  try {
    var o = ac.createOscillator(), g = ac.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(pitch, when);
    o.frequency.exponentialRampToValueAtTime(pitch * 0.4, when + 0.05);
    g.gain.setValueAtTime(vol, when);
    g.gain.exponentialRampToValueAtTime(0.001, when + 0.055);
    o.connect(g); g.connect(ac.destination);
    o.start(when); o.stop(when + 0.07);
    var o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.type = 'sawtooth'; o2.frequency.value = 200 + (when * 137) % 200;
    g2.gain.setValueAtTime(vol * 0.45, when);
    g2.gain.exponentialRampToValueAtTime(0.001, when + 0.03);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(when); o2.stop(when + 0.04);
  } catch(e) {}
}

function playDrumRoll(duration) {
  if (!ac || muted) return;
  var t = ac.currentTime + 0.05;
  var n = 44;
  for (var i = 0; i < n; i++) {
    var p = i / n;
    var hitT = t + p * p * duration;
    playDrumHit(hitT, 0.025 + p * 0.09, 80 + p * 45);
  }
}

function pTree(ctx, P, x, baseY, w, h, cols, trunk) {
  var tH = Math.max(P*2, (h*0.28)|0), cH = h-tH, rows = Math.ceil(cH/P);
  for (var r=0; r<rows; r++) {
    var rW = Math.max(P*2, ((w*(0.15+r/rows*0.85)+0.5)|0));
    rW = ((rW/P+0.5)|0)*P;
    var rX = x+(((w-rW)/2)|0);
    ctx.fillStyle = cols[Math.min(r, cols.length-1)];
    ctx.fillRect(rX, baseY-cH+r*P, rW, P+1);
  }
  ctx.fillStyle = trunk;
  var tW = Math.max(P, (w*0.22)|0);
  ctx.fillRect(x+((w-tW)/2|0), baseY-tH, tW, tH);
}

    ctx.closePath(); ctx.fill();

  for (var y=H*0.31;y<H;y+=P*5) ctx.fillRect(W*0.56+P*2,y,P,P*3);

  var fT=[[0.04,0.12,0.28],[0.28,0.14,0.32],[0.70,0.13,0.28],[0.87,0.11,0.26]];

  ctx.fillStyle='#010610'; ctx.fillRect(0,0,W,H*0.30);
  ctx.fillStyle='#030c20'; ctx.fillRect(0,H*0.30,W,H*0.28);
  ctx.fillStyle='#05142e'; ctx.fillRect(0,H*0.58,W,H*0.20);
  ctx.fillStyle='#081a38'; ctx.fillRect(0,H*0.78,W,H*0.06);
  ctx.fillStyle='#fff8e8';
  ctx.fillRect(W*0.74,H*0.04,P*8,P*8);
  ctx.fillRect(W*0.74+P,H*0.03,P*6,P*10);
  ctx.fillRect(W*0.73,H*0.06,P*10,P*6);
  ctx.fillStyle='#ddd4b0'; ctx.fillRect(W*0.75,H*0.06,P*2,P*2);
  ctx.fillStyle='#ccc498'; ctx.fillRect(W*0.75+P,H*0.07,P,P);
  ctx.fillStyle='#ddd4b0'; ctx.fillRect(W*0.78,H*0.09,P*2,P*2);
  ctx.fillStyle='rgba(255,248,200,0.06)';
  ctx.beginPath(); ctx.arc(W*0.79,H*0.09,P*8,0,Math.PI*2); ctx.fill();
  var sd=[[0.05,0.04,2],[0.14,0.08,1],[0.22,0.03,3],[0.31,0.11,1],[0.42,0.06,2],
          [0.50,0.02,1],[0.58,0.15,2],[0.10,0.18,1],[0.20,0.22,3],[0.34,0.25,1],
          [0.46,0.20,2],[0.60,0.08,1],[0.68,0.20,2],[0.15,0.35,1],[0.27,0.40,2],
          [0.38,0.32,1],[0.52,0.36,3],[0.62,0.30,1],[0.08,0.45,2],[0.44,0.48,1],
          [0.55,0.44,2],[0.66,0.50,1],[0.72,0.38,2],[0.80,0.25,1],[0.85,0.42,3],
          [0.90,0.12,2],[0.95,0.32,1],[0.04,0.55,2],[0.18,0.60,1],[0.35,0.65,2]];
  for (var i=0;i<sd.length;i++){
    var sx=W*sd[i][0], sy=H*sd[i][1], ss=sd[i][2];
    ctx.fillStyle=i%4===0?'#fff8cc':(i%3===0?'#ccddff':'#ffffff');
    ctx.globalAlpha=0.75; ctx.fillRect(sx,sy,ss,ss);
    if (ss>=2){ ctx.globalAlpha=0.35; ctx.fillRect(sx-ss,sy,ss,ss); ctx.fillRect(sx+ss,sy,ss,ss); ctx.fillRect(sx,sy-ss,ss,ss); ctx.fillRect(sx,sy+ss,ss,ss); }
  }
  ctx.globalAlpha=1;
  ctx.fillStyle='#0a1a08'; ctx.fillRect(0,H*0.84,W,H*0.10);
  ctx.fillStyle='#060e04'; ctx.fillRect(0,H*0.94,W,H*0.06);
  ctx.fillStyle='#050d04';
  var nt=[[0.01,0.09,0.13],[0.10,0.12,0.17],[0.21,0.08,0.12],[0.30,0.11,0.15],
          [0.40,0.09,0.13],[0.48,0.13,0.18],[0.57,0.08,0.12],[0.65,0.11,0.16],
          [0.74,0.09,0.13],[0.82,0.12,0.16],[0.90,0.08,0.11],[0.97,0.10,0.14]];
  for (var ti=0;ti<nt.length;ti++){
    var ntx=W*nt[ti][0], nth=H*nt[ti][2], ntw=W*nt[ti][1];
    ctx.fillRect(ntx+ntw*0.4,H*0.84,ntw*0.2,nth*0.32);
    ctx.fillRect(ntx,H*0.84-nth*0.60,ntw,nth*0.45);
    ctx.fillRect(ntx+ntw*0.1,H*0.84-nth*0.88,ntw*0.8,nth*0.38);
    ctx.fillRect(ntx+ntw*0.25,H*0.84-nth,ntw*0.5,nth*0.22);
  }
  for (var fi=0;fi<22;fi++){
    var fx=((fi*113+37)%(W-16)|0), fy=((H*0.50+(fi*79+23)%(H*0.36))|0);
    ctx.fillStyle='rgba(180,255,100,0.85)'; ctx.fillRect(fx,fy,4,4);
    ctx.fillStyle='rgba(150,255,80,0.14)';
    ctx.beginPath(); ctx.arc(fx+2,fy+2,P,0,Math.PI*2); ctx.fill();
  }
}

function showMapToast() {
  var t = document.getElementById('map-toast');
  if (!t) return;
  t.textContent = '🗺 ' + currentMap().name;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1800);
}

/* ── HP ── */
function updateHP() {
  var s = '';
  for (var i = 0; i < MAX_HP; i++) s += i < playerHP ? '❤️' : '🖤';
  var el = document.getElementById('hud-hp');
  if (el) el.textContent = s;
}

/* ── LEVEL START ── */
function beginLevel() {
  stopGame();
  newCatch = null;
  playerHP = MAX_HP;
  updateHP();
  var pool = shuffle(POOL);
  targets = [];
  for (var i = 0; i < 3; i++) targets.push({id:pool[i].id, n:pool[i].n, c:pool[i].c, count:0});
  decoys = pool.slice(3, 18);
  mons = [];
  timer = 60;

  goTo('sg');
  document.getElementById('hud-lv').textContent = 'LVL ' + LV;
  buildTargetRow();
  updateTimer();
  applyMap();
  document.getElementById('timeup').classList.remove('show');
  setTimeout(function() { drawMapBg(); decorateField(); showMapToast(); }, 80);
  countdown(3, function() { beginSpawning(); });
}

function buildTargetRow() {
  var row = document.getElementById('trow');
  row.innerHTML = '';
  for (var i = 0; i < targets.length; i++) {
    var t = targets[i];
    var d = document.createElement('div');
    d.className = 'tslot'; d.id = 'ts' + i;
    var pips = '';
    for (var j = 0; j < 3; j++) pips += '<div class="pip" id="p' + i + j + '"></div>';
    d.innerHTML = '<img src="' + gif(t.id) + '" onerror="this.src=\'' + png(t.id) + '\'" alt="' + t.n + '" style="background:' + t.c + '22">'
      + '<div class="tname">' + t.n + '</div>'
      + '<div class="tpips">' + pips + '</div>';
    row.appendChild(d);
  }
}

/* ── FIELD DECORATION (3-depth layers) ── */
function decorateField() {
  var field = document.getElementById('field');
  var old = field.querySelectorAll('.grass');
  for (var k = 0; k < old.length; k++) old[k].parentNode.removeChild(old[k]);
  var fw = field.offsetWidth  || 360;
  var fh = field.offsetHeight || 480;
  var deco = currentMap().deco;

  var layers = [
    {cls:'far',  count:14},
    {cls:'mid',  count:10},
    {cls:'near', count:6}
  ];
  for (var li = 0; li < layers.length; li++) {
    var l = layers[li];
    for (var i = 0; i < l.count; i++) {
      var g = document.createElement('div');
      g.className = 'grass ' + l.cls;
      g.textContent = deco[Math.floor(Math.random() * deco.length)];
      g.style.left = Math.floor(Math.random() * (fw - 44)) + 'px';
      g.style.top  = Math.floor(Math.random() * (fh - 44)) + 'px';
      field.appendChild(g);
    }
  }
}

/* ── COUNTDOWN ── */
function countdown(n, cb) {
  var el = document.getElementById('cdown-n');
  var box = document.getElementById('cdown');
  box.style.pointerEvents = 'all';
  function tick(v) {
    el.style.opacity = '0';
    el.textContent = v > 0 ? String(v) : '¡YA!';
    setTimeout(function() {
      el.style.transition = 'opacity .15s';
      el.style.opacity = '1';
      setTimeout(function() {
        el.style.opacity = '0';
        if (v > 0) { setTimeout(function() { tick(v - 1); }, 300); }
        else { box.style.pointerEvents = 'none'; el.textContent = ''; cb(); }
      }, 700);
    }, 50);
  }
  tick(n);
}

/* ── GAMEPLAY ── */
function beginSpawning() {
  running = true;
  tInt = setInterval(function() {
    timer--;
    updateTimer();
    if (timer <= 0) {
      clearInterval(tInt);
      document.getElementById('timeup').classList.add('show');
      setTimeout(endLevel, 1400);
    }
  }, 1000);
  burst();
  sInt = setInterval(burst, 2000);
  raf = requestAnimationFrame(gameLoop);
  bossSpawnTimer = setTimeout(spawnBoss, 12000 + Math.floor(Math.random() * 8000));
}

function stopGame() {
  running = false;
  clearInterval(tInt); clearInterval(sInt);
  cancelAnimationFrame(raf);
  clearTimeout(bossSpawnTimer);
  bossSpawnTimer = null;
  if (boss) { clearInterval(boss.attackInterval); killBossEl(); }
  tInt = sInt = raf = null;
  for (var i = 0; i < mons.length; i++) {
    if (mons[i].el && mons[i].el.parentNode) mons[i].el.parentNode.removeChild(mons[i].el);
  }
  mons = [];
}

function killBossEl() {
  if (boss && boss.el && boss.el.parentNode) boss.el.parentNode.removeChild(boss.el);
  boss = null;
}

function updateTimer() {
  document.getElementById('hud-n').textContent = timer;
  var pct = timer / 60 * 100;
  var f = document.getElementById('hud-f');
  f.style.width = pct + '%';
  f.style.background = timer > 15 ? '#ffcb05' : '#ff4444';
}

/* ── SPAWN ── */
function burst() {
  if (!running) return;
  var n = 3 + Math.floor(Math.random() * 3);
  for (var i = 0; i < n; i++) {
    (function(delay){ setTimeout(spawnOne, delay); })(i * 200);
  }
}

function spawnOne() {
  if (!running || mons.length >= 22) return;
  var field = document.getElementById('field');
  var fw = field.offsetWidth  || 360;
  var fh = field.offsetHeight || 480;

  var pk;
  if (Math.random() < 0.30) {
    var inc = [];
    for (var i = 0; i < targets.length; i++) { if (targets[i].count < 3) inc.push(targets[i]); }
    if (!inc.length) return;
    pk = inc[Math.floor(Math.random() * inc.length)];
  } else {
    pk = decoys[Math.floor(Math.random() * decoys.length)];
  }

  var isTarget = false;
  for (var i = 0; i < targets.length; i++) { if (targets[i].id === pk.id) { isTarget = true; break; } }

  var mvList = ['float','fall','pop'];
  var mv = mvList[Math.floor(Math.random() * 3)];
  var m = {id:pk.id, n:pk.n, isTarget:isTarget, mv:mv,
    alive:true, x:0, y:0, vx:0, vy:0, born:0, life:0, el:null};

  if (mv === 'float') {
    m.x = 20 + Math.random() * (fw - 92); m.y = 10 + Math.random() * (fh - 92);
    var sp = 1.2 + Math.random() * 1.8, ang = Math.random() * Math.PI * 2;
    m.vx = Math.cos(ang) * sp; m.vy = Math.sin(ang) * sp;
  } else if (mv === 'fall') {
    m.x = 10 + Math.random() * (fw - 82); m.y = -80;
    m.vx = (Math.random() - 0.5) * 1.4; m.vy = 2 + Math.random() * 1.6;
  } else {
    m.x = 20 + Math.random() * (fw - 92); m.y = 10 + Math.random() * (fh - 92);
    m.born = Date.now(); m.life = 1800 + Math.random() * 2200;
  }

  var div = document.createElement('div');
  div.className = 'mon' + (isTarget ? ' tgt' : '');
  div.style.left = m.x + 'px'; div.style.top = m.y + 'px';
  div.innerHTML = '<div class="mon-img" style="background:' + pk.c + 'cc">'
    + '<img src="' + gif(pk.id) + '" onerror="this.src=\'' + png(pk.id) + '\'" alt="' + pk.n + '">'
    + '</div><div class="mon-lbl">' + pk.n + '</div>';

  (function(mon, el) {
    var tapped = false;
    el.addEventListener('touchend', function(e) {
      e.preventDefault();
      if (!tapped) { tapped = true; handleTap(mon); setTimeout(function(){ tapped = false; }, 400); }
    }, false);
    el.addEventListener('click', function() { if (!tapped) handleTap(mon); }, false);
  })(m, div);

  field.appendChild(div);
  m.el = div;
  mons.push(m);
}

/* ── GAME LOOP ── */
function gameLoop() {
  if (!running) return;
  var field = document.getElementById('field');
  var fw = field.offsetWidth  || 360;
  var fh = field.offsetHeight || 480;

  for (var i = 0; i < mons.length; i++) {
    var m = mons[i];
    if (!m.alive || !m.el) continue;
    if (m.mv === 'float') {
      m.x += m.vx; m.y += m.vy;
      if (m.x < 0)       { m.x = 0;        m.vx =  Math.abs(m.vx); }
      if (m.x > fw - 86) { m.x = fw - 86;  m.vx = -Math.abs(m.vx); }
      if (m.y < 0)       { m.y = 0;        m.vy =  Math.abs(m.vy); }
      if (m.y > fh - 96) { m.y = fh - 96;  m.vy = -Math.abs(m.vy); }
      m.el.style.left = m.x + 'px'; m.el.style.top = m.y + 'px';
    } else if (m.mv === 'fall') {
      m.x += m.vx; m.y += m.vy;
      if (m.x < 0)       { m.x = 0;        m.vx =  Math.abs(m.vx); }
      if (m.x > fw - 86) { m.x = fw - 86;  m.vx = -Math.abs(m.vx); }
      m.el.style.left = m.x + 'px'; m.el.style.top = m.y + 'px';
      if (m.y > fh + 10) killMon(m);
    } else {
      var age = Date.now() - m.born;
      if (age > m.life) { killMon(m); continue; }
      if (age > m.life - 500) m.el.style.opacity = ((m.life - age) / 500).toFixed(2);
    }
  }

  /* boss movement */
  if (boss && boss.alive && boss.el && typeof boss.vx === 'number') {
    boss.x += boss.vx; boss.y += boss.vy;
    if (boss.x < 5)        { boss.x = 5;         boss.vx =  Math.abs(boss.vx); }
    if (boss.x > fw - 120) { boss.x = fw - 120;  boss.vx = -Math.abs(boss.vx); }
    if (boss.y < 50)       { boss.y = 50;         boss.vy =  Math.abs(boss.vy); }
    if (boss.y > fh - 135) { boss.y = fh - 135;  boss.vy = -Math.abs(boss.vy); }
    boss.el.style.left = boss.x + 'px'; boss.el.style.top = boss.y + 'px';
  }

  raf = requestAnimationFrame(gameLoop);
}

function killMon(m) {
  m.alive = false;
  if (m.el && m.el.parentNode) m.el.parentNode.removeChild(m.el);
  var next = [];
  for (var i = 0; i < mons.length; i++) { if (mons[i] !== m) next.push(mons[i]); }
  mons = next;
}

/* ── TAP ── */
function handleTap(m) {
  if (!m.alive || !running) return;
  playCry(m.id);
  var field = document.getElementById('field');

  if (m.isTarget) {
    var t = null;
    for (var i = 0; i < targets.length; i++) { if (targets[i].id === m.id) { t = targets[i]; break; } }
    if (t && t.count < 3) {
      t.count++;
      playGood();
      addBling(field, m.x + 41, m.y + 41);
      updatePips(t);
      killMon(m);
      var allDone = true;
      for (var i = 0; i < targets.length; i++) { if (targets[i].count < 3) { allDone = false; break; } }
      if (allDone) setTimeout(endLevel, 300);
    }
  } else {
    var maxCnt = -1, penIdx = -1;
    for (var i = 0; i < targets.length; i++) {
      if (targets[i].count > maxCnt) { maxCnt = targets[i].count; penIdx = i; }
    }
    if (penIdx >= 0 && targets[penIdx].count > 0) {
      targets[penIdx].count--;
      updatePips(targets[penIdx]);
      var slot = document.getElementById('ts' + penIdx);
      if (slot) {
        slot.classList.add('penalty');
        (function(s){ setTimeout(function(){ s.classList.remove('penalty'); }, 350); })(slot);
      }
      addFloatTxt(field, m.x + 36, m.y - 4, '-1', '#ff4444', '22px');
    }
    playBad();
    addFloatTxt(field, m.x + 41, m.y + 10, '✗', '#ff4444', '26px');
    killMon(m);
  }
}

/* ── BOSS ── */
function spawnBoss() {
  if (!running || boss) return;
  var field = document.getElementById('field');
  var fw = field.offsetWidth  || 360;
  var fh = field.offsetHeight || 480;

  var bp = BOSS_POOL[Math.floor(Math.random() * BOSS_POOL.length)];
  var ang = Math.random() * Math.PI * 2;
  var speed = 3.0 + Math.random() * 2.0;

  boss = {id:bp.id, n:bp.n, c:bp.c, hp:bp.hp, maxHp:bp.hp,
    x: Math.max(10, fw/2 - 55),
    y: Math.max(60, fh/2 - 90),
    vx: Math.cos(ang) * speed,
    vy: Math.sin(ang) * speed,
    alive:true, attackInterval:null, el:null};

  var div = document.createElement('div');
  div.className = 'mon boss'; div.id = 'boss-el';
  div.style.left = boss.x + 'px'; div.style.top = boss.y + 'px';
  div.innerHTML =
    '<div class="boss-bars">'
    + '<div class="boss-hpbar"><div class="boss-hpfill" id="boss-hpf" style="width:100%"></div></div>'
    + '<div class="boss-timebar"><div class="boss-timefill" id="boss-timef" style="width:0%"></div></div>'
    + '</div>'
    + '<div class="mon-img" style="background:' + bp.c + 'cc">'
    + '<img src="' + gif(bp.id) + '" onerror="this.src=\'' + png(bp.id) + '\'" alt="' + bp.n + '">'
    + '</div>'
    + '<div class="mon-lbl" style="background:#cc0000;color:#fff;font-size:14px">👹 ' + bp.n.toUpperCase() + '</div>';

  (function(b, el) {
    var tapped = false;
    el.addEventListener('touchend', function(e) {
      e.preventDefault();
      if (!tapped) { tapped = true; damageBoss(); setTimeout(function(){ tapped = false; }, 150); }
    }, false);
    el.addEventListener('click', function() { if (!tapped) damageBoss(); }, false);
  })(boss, div);

  field.appendChild(div);
  boss.el = div;

  var CHARGE_MS = 7000;
  var chargeStart = Date.now();
  boss.attackInterval = setInterval(function() {
    if (!boss || !running) { clearInterval(boss.attackInterval); return; }
    var pct = Math.min(100, (Date.now() - chargeStart) / CHARGE_MS * 100);
    var tf = document.getElementById('boss-timef');
    if (tf) {
      tf.style.width = pct.toFixed(1) + '%';
      tf.style.background = pct > 80 ? '#ff2200' : (pct > 50 ? '#ff8800' : '#00cc44');
    }
    if (pct >= 100) { chargeStart = Date.now(); bossAttack(); }
  }, 100);
}

function damageBoss() {
  if (!boss || !boss.alive || !running) return;
  boss.hp--;
  playBossHit();
  var hpPct = Math.max(0, boss.hp / boss.maxHp * 100).toFixed(1);
  var hf = document.getElementById('boss-hpf');
  if (hf) {
    hf.style.width = hpPct + '%';
    hf.style.background = boss.hp <= boss.maxHp * 0.3
      ? '#ff2200' : (boss.hp <= boss.maxHp * 0.6 ? '#ff8800' : '#00cc44');
  }
  if (boss.el) {
    boss.el.style.filter = 'brightness(3)';
    (function(){ setTimeout(function(){ if (boss && boss.el) boss.el.style.filter = ''; }, 80); })();
    var field = document.getElementById('field');
    addFloatTxt(field, boss.x + 50, boss.y + 10, '💥', '#fff', '24px');
  }
  if (boss.hp <= 0) killBoss(true);
}

function killBoss(defeated) {
  if (!boss) return;
  clearInterval(boss.attackInterval);
  if (defeated) {
    playBossKilled();
    var field = document.getElementById('field');
    var boom = document.createElement('div');
    boom.className = 'bossboom';
    boom.style.left = boss.x + 'px'; boom.style.top = (boss.y + 20) + 'px';
    field.appendChild(boom);
    setTimeout(function() { if (boom.parentNode) boom.parentNode.removeChild(boom); }, 650);
    if (running && timer > 12) {
      bossSpawnTimer = setTimeout(spawnBoss, 14000 + Math.floor(Math.random() * 6000));
    }
  }
  killBossEl();
}

function bossAttack() {
  if (!boss || !running) return;
  playDamage();
  playerHP = Math.max(0, playerHP - 1);
  updateHP();
  var field = document.getElementById('field');
  field.style.filter = 'brightness(2.2) saturate(0.3)';
  setTimeout(function() { if (field) field.style.filter = ''; }, 220);
  if (boss.el) addFloatTxt(field, boss.x + 25, boss.y - 20, '⚡', '#ff2200', '30px');
  if (playerHP <= 0) {
    if (tInt) clearInterval(tInt);
    document.getElementById('timeup').classList.add('show');
    setTimeout(endLevel, 1400);
  }
}

/* ── FX ── */
function addBling(field, x, y) {
  var d = document.createElement('div');
  d.className = 'bling';
  d.style.left = (x - 30) + 'px'; d.style.top = (y - 30) + 'px';
  field.appendChild(d);
  setTimeout(function() { if (d.parentNode) d.parentNode.removeChild(d); }, 450);
}

function addFloatTxt(field, x, y, txt, color, size) {
  var d = document.createElement('div');
  d.className = 'floattxt';
  d.style.left = x + 'px'; d.style.top = y + 'px';
  d.style.color = color; d.style.fontSize = size || '22px';
  d.textContent = txt;
  field.appendChild(d);
  setTimeout(function() { if (d.parentNode) d.parentNode.removeChild(d); }, 600);
}

/* ── PIPS ── */
function updatePips(t) {
  var i = targets.indexOf(t);
  for (var j = 0; j < 3; j++) {
    var el = document.getElementById('p' + i + j);
    if (el) el.className = 'pip' + (j < t.count ? ' on' : '');
  }
}

/* ── CASINO ── */
function endLevel() { stopGame(); showCasino(); }

function showCasino() {
  goTo('sc');
  var reelsEl = document.getElementById('cas-reels');
  reelsEl.innerHTML = '';
  document.getElementById('cas-img').style.display = 'none';
  document.getElementById('cas-txt').textContent = '';
  document.getElementById('cas-name').textContent = '';
  document.getElementById('cas-btn').style.display = 'none';

  /* build all 3 reels — ALL spin regardless of completion */
  var reels = [];
  for (var i = 0; i < targets.length; i++) {
    var t = targets[i];
    var on = t.count >= 3;
    var w = document.createElement('div');
    w.className = 'rw';
    w.innerHTML = '<div class="rl">' + t.n + '</div>'
      + '<div class="rv' + (on ? '' : ' off') + '" id="rv' + i + '">'
      + '<img src="' + gif(t.id) + '" onerror="this.src=\'' + png(t.id) + '\'" alt="' + t.n + '">'
      + (on ? '' : '<div class="rx">✗</div>')
      + '</div>'
      + '<div class="rscore">' + t.count + '/3</div>';
    reelsEl.appendChild(w);
    reels.push({el: document.getElementById('rv' + i), t: t, on: on});
  }

  var ct = document.getElementById('cas-txt');
  var cn = document.getElementById('cas-name');
  var ci = document.getElementById('cas-img');

  /* random reel pick from ALL 3 — prevents cheating by only completing one */
  var winnerIdx = Math.floor(Math.random() * reels.length);
  var winnerReel = reels[winnerIdx];

  setTimeout(function() {
    /* spin all reels + drum roll */
    for (var i = 0; i < reels.length; i++) reels[i].el.classList.add('spin');
    playDrumRoll(3.0);

    setTimeout(function() {
      /* stop all, dim losers, highlight winner */
      for (var i = 0; i < reels.length; i++) {
        reels[i].el.classList.remove('spin');
        if (i !== winnerIdx) {
          reels[i].el.style.opacity = '.3';
        } else {
          reels[i].el.style.boxShadow = winnerReel.on
            ? '0 0 28px #ffcb05' : '0 0 22px #ff4444';
        }
      }

      if (winnerReel.on) {
        /* WIN */
        playJackpot();
        playCry(winnerReel.t.id);
        ci.src = gif(winnerReel.t.id);
        ci.onerror = function() { ci.src = png(winnerReel.t.id); };
        ci.style.display = 'block';
        var isNew = col.indexOf(winnerReel.t.id) === -1;
        ct.textContent = isNew ? '¡Nuevo Pokémon!' : '¡Capturaste a...';
        ct.style.color  = isNew ? '#ffcb05' : '#fff';
        cn.textContent  = winnerReel.t.n.toUpperCase() + '!';
        cn.style.color  = '#ffcb05';
        if (isNew) { col.push(winnerReel.t.id); newCatch = winnerReel.t.id; saveCol(); }
      } else {
        /* LOSE — landed on incomplete slot */
        playBad();
        ct.textContent = '¡Sin suerte esta vez!';
        ct.style.color = '#ff4444';
        cn.textContent = winnerReel.t.count > 0
          ? 'Solo tenías ' + winnerReel.t.count + '/3 de ' + winnerReel.t.n
          : 'Intenta atrapar más la próxima';
        cn.style.color = 'rgba(255,255,255,.5)';
        cn.style.fontSize = '14px';
      }
      document.getElementById('cas-btn').style.display = 'block';
    }, 3200);
  }, 500);
}

/* ── INIT ── */
if (loadUser()) {
  refreshMenu();
  goTo('sm');
}
/* else: #sauth already has style="display:flex" */

})();
</script>
