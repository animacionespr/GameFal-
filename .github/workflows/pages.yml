name: Desplegar en GitHub Pages

on:
  push:
    branches: [claude/spanish-app-idea-xnnk8b]
  workflow_dispatch:
  schedule:
    # 7:00am y 7:00pm hora de Puerto Rico (UTC-4) → 11:00 y 23:00 UTC
    - cron: '0 11 * * *'
    - cron: '0 23 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Actualizar datos desde fuentes oficiales
        run: node scripts/update-data.mjs
        continue-on-error: true

      - name: Confirmar cambios de datos si los hay
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/updates.json
          git diff --staged --quiet || git commit -m "data: actualización automática $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push origin HEAD:claude/spanish-app-idea-xnnk8b || true
        continue-on-error: true

      - uses: actions/configure-pages@v4
        id: pages

      - name: Construir aplicación
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
