name: Desplegar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '10 10 * * *'
    - cron: '5 16 * * *'
    - cron: '10 3 * * *'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Descargar foto oficial de la gobernadora
        run: |
          mkdir -p public/images
          curl -sL -A "Mozilla/5.0" \
            "https://bioguide.congress.gov/photos/G000582.jpg" \
            -o public/images/gobernadora-pr.jpg && \
            file public/images/gobernadora-pr.jpg | grep -qiE "JPEG|image" && \
            echo "✓ Foto de Congress.gov" || \
          curl -sL -A "Mozilla/5.0" \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Jenniffer_Gonz%C3%A1lez_Col%C3%B3n.jpg/440px-Jenniffer_Gonz%C3%A1lez_Col%C3%B3n.jpg" \
            -o public/images/gobernadora-pr.jpg && \
            echo "✓ Foto de Wikipedia" || echo "⚠ Usando SVG"
        continue-on-error: true

      - name: Actualizar datos desde fuentes oficiales
        run: node scripts/update-data.mjs
        continue-on-error: true

      - name: Confirmar cambios de datos si los hay
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/updates.json
          git diff --staged --quiet || git commit -m "data: actualización automática $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push origin HEAD:main || true
        continue-on-error: true

      - name: Construir aplicación
        run: npm run build

      - name: Desplegar en gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: ''
