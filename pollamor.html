<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PollAmor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0820;font-family:'Courier New',monospace;user-select:none;-webkit-user-select:none}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
#chat-wrap{
  display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  background:rgba(8,8,24,0.97);border:2px solid #ff6b9d;border-radius:12px;
  padding:0;overflow:hidden;pointer-events:auto;
}
#chat-head{background:linear-gradient(135deg,#ff6b9d,#c44dff);padding:10px 14px;display:flex;align-items:center;gap:10px}
#chat-avatar{width:36px;height:36px;border-radius:50%;border:2px solid #fff;overflow:hidden;flex-shrink:0}
#chat-avatar canvas{image-rendering:pixelated;position:relative;left:0;top:0;transform:none}
#chat-info{flex:1}
#chat-name{color:#fff;font-size:15px;font-weight:bold;font-family:'Courier New',monospace}
#chat-compat{color:rgba(255,255,255,0.85);font-size:12px;font-family:'Courier New',monospace}
#chat-close{color:#fff;font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
#chat-msgs{overflow-y:auto;padding:10px;background:rgba(5,5,18,0.9);font-family:'Courier New',monospace}
.msg{margin:6px 0;max-width:82%;font-size:13px;line-height:1.4;padding:7px 10px;border-radius:10px;word-wrap:break-word}
.msg-them{background:rgba(196,77,255,0.2);border:1px solid rgba(196,77,255,0.4);color:#e0c4ff;align-self:flex-start}
.msg-you{background:rgba(255,107,157,0.2);border:1px solid rgba(255,107,157,0.4);color:#ffd0e8;margin-left:auto;text-align:right}
.msg-sys{color:#ffd700;font-size:11px;text-align:center;margin:4px 0;opacity:0.8}
#chat-msgs-inner{display:flex;flex-direction:column}
#chat-icebreakers{padding:6px 10px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid rgba(255,107,157,0.2)}
.ice-btn{background:rgba(255,107,157,0.15);border:1px solid rgba(255,107,157,0.4);color:#ff9de2;padding:4px 8px;border-radius:12px;font-size:11px;cursor:pointer;font-family:'Courier New',monospace;white-space:nowrap}
.ice-btn:active{background:rgba(255,107,157,0.3)}
#chat-input-row{display:flex;gap:6px;padding:8px 10px;border-top:1px solid rgba(255,107,157,0.2)}
#chat-input{flex:1;background:#111128;border:1px solid #ff6b9d;color:#fff;padding:7px 12px;border-radius:20px;font-size:13px;outline:none;font-family:'Courier New',monospace}
#chat-send{background:#ff6b9d;border:none;color:#fff;padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-family:'Courier New',monospace}
#chat-send:active{background:#e0547e}
</style>
</head>
<body>
<canvas id="g"></canvas>
<div id="chat-wrap">
  <div id="chat-head">
    <div id="chat-avatar"><canvas id="avatarCv" width="36" height="36"></canvas></div>
    <div id="chat-info">
      <div id="chat-name">...</div>
      <div id="chat-compat">...</div>
    </div>
    <div id="chat-close">✕</div>
  </div>
  <div id="chat-msgs"><div id="chat-msgs-inner"></div></div>
  <div id="chat-icebreakers">
    <button class="ice-btn">¿A qué te dedicas?</button>
    <button class="ice-btn">¿Cuál es tu canción favorita?</button>
    <button class="ice-btn">¿Te gustaría salir un día?</button>
  </div>
  <div id="chat-input-row">
    <input id="chat-input" type="text" placeholder="Escribe algo..." maxlength="120">
    <button id="chat-send">Enviar</button>
  </div>
</div>
<script>
'use strict';
/* ══════════════════════════════════════════
   POLL AMOR  –  Winter Town Dating Poll Game
   ══════════════════════════════════════════ */

// ── Canvas / Resolution ─────────────────
const cv=document.getElementById('g');
const cx=cv.getContext('2d');
const VW=390,VH=844;
let SC=1;
function resize(){
  SC=Math.min(window.innerWidth/VW,window.innerHeight/VH);
  cv.width=Math.round(VW*SC);cv.height=Math.round(VH*SC);
  const cw=document.getElementById('chat-wrap');
  if(cw.style.display!=='none'){
    cw.style.width=Math.round(350*SC)+'px';cw.style.height=Math.round(520*SC)+'px';
    document.getElementById('chat-msgs').style.height=Math.round(220*SC)+'px';
  }
}
resize();window.addEventListener('resize',resize);

// ── Tile Map ────────────────────────────
const TS=20,MW=30,MH=32;
const WW=MW*TS,WH=MH*TS;
const MAP_TOP=80,MAP_H=580,MAP_BOT=MAP_TOP+MAP_H;

// Winter town tile types
const T_SNOW=0,T_PATH=1,T_PLAZA=2,T_DANCE=3,T_FOUNTAIN=4,
      T_BENCH=5,T_LAMP=6,T_WALL=7,T_ROOF=8,T_TREE=9,
      T_CAFE=10,T_BORDER=11,T_ICE=12;

let MAP=[],lampPositions=[],danceCenter={x:0,y:0},fountainCenter={x:0,y:0};

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

function buildMap(){
  MAP=[];lampPositions=[];
  for(let r=0;r<MH;r++){MAP.push(new Uint8Array(MW));for(let c=0;c<MW;c++)MAP[r][c]=T_SNOW;}

  // Outer border walls
  for(let r=0;r<MH;r++)for(let c=0;c<MW;c++){
    if(r<2||r>=MH-2||c<2||c>=MW-2)MAP[r][c]=T_BORDER;
  }

  // Snow-covered pine trees along inner edge
  const treePos=[
    [2,4],[2,8],[2,12],[2,16],[2,20],[2,24],[2,27],
    [29,4],[29,8],[29,12],[29,16],[29,20],[29,24],[29,27],
    [4,2],[8,2],[12,2],[16,2],[20,2],[24,2],[28,2],
    [4,29],[8,29],[12,29],[16,29],[20,29],[24,29],[28,29],
  ];
  treePos.forEach(([r,c])=>{if(r<MH&&c<MW)MAP[r][c]=T_TREE;});

  // Golden diagonal paths (cross layout)
  for(let r=2;r<MH-2;r++){MAP[r][14]=T_PATH;MAP[r][15]=T_PATH;}
  for(let c=2;c<MW-2;c++){MAP[15][c]=T_PATH;MAP[16][c]=T_PATH;}

  // Central stone plaza around cross intersection
  for(let r=13;r<=18;r++)for(let c=12;c<=17;c++)MAP[r][c]=T_PLAZA;

  // ── Buildings (peaked roofs + walls) ──
  // Top-left: Purple building (Tienda)
  for(let r=4;r<=7;r++)for(let c=4;c<=9;c++)MAP[r][c]=T_ROOF;
  for(let r=8;r<=11;r++)for(let c=4;c<=9;c++)MAP[r][c]=T_WALL;

  // Top-right: Red building (Café)
  for(let r=4;r<=7;r++)for(let c=20;c<=25;c++)MAP[r][c]=T_ROOF;
  for(let r=8;r<=11;r++)for(let c=20;c<=25;c++)MAP[r][c]=T_WALL;

  // Bottom-left: Blue building
  for(let r=20;r<=23;r++)for(let c=4;c<=9;c++)MAP[r][c]=T_ROOF;
  for(let r=24;r<=27;r++)for(let c=4;c<=9;c++)MAP[r][c]=T_WALL;

  // Bottom-right: Green building
  for(let r=20;r<=23;r++)for(let c=20;c<=25;c++)MAP[r][c]=T_ROOF;
  for(let r=24;r<=27;r++)for(let c=20;c<=25;c++)MAP[r][c]=T_WALL;

  // ── Dance floor (bottom-left open area) ──
  for(let r=17;r<=26;r++)for(let c=10;c<=13;c++)MAP[r][c]=T_DANCE;
  danceCenter={x:(10+13)/2*TS+TS/2,y:(17+26)/2*TS+TS/2};

  // ── Café/warm lounge floor (top-right open area) ──
  for(let r=5;r<=13;r++)for(let c=16;c<=18;c++)MAP[r][c]=T_CAFE;

  // ── Fountain (bottom-right area) ──
  for(let r=17;r<=20;r++)for(let c=17;c<=20;c++)MAP[r][c]=T_FOUNTAIN;
  fountainCenter={x:(17+20)/2*TS+TS,y:(17+20)/2*TS+TS};

  // ── Small frozen pond (top-left open area) ──
  for(let r=12;r<=13;r++)for(let c=10;c<=12;c++)MAP[r][c]=T_ICE;

  // ── Benches along paths ──
  const benches=[[14,7],[14,22],[17,7],[17,22],[10,14],[10,15],[22,14],[22,15]];
  benches.forEach(([r,c])=>{if(MAP[r][c]===T_SNOW||MAP[r][c]===T_PATH)MAP[r][c]=T_BENCH;});

  // ── Street lamps at key spots ──
  const lamps=[[12,13],[12,16],[19,13],[19,16],[14,6],[17,6],[14,23],[17,23],[6,13],[6,16],[25,13],[25,16]];
  lamps.forEach(([r,c])=>{
    if(r<MH&&c<MW){MAP[r][c]=T_LAMP;lampPositions.push({x:(c+0.5)*TS,y:(r+0.5)*TS});}
  });
}
buildMap();

// ── Background Image ────────────────────
const _BG_B64=''; // Plaza Boricua — fill with base64 when PNG is uploaded
let _BG_IMG=null,_BG_READY=false;
const _BG_ACTIVE=true; // plaza boricua always shown (programmatic or PNG)
if(_BG_B64){
  _BG_IMG=new Image();
  _BG_IMG.onload=()=>{_BG_READY=true;prerenderMap();};
  _BG_IMG.src='data:image/png;base64,'+_BG_B64;
}

// ── Prerender map ───────────────────────
let mapOC,mapOX;
function prerenderMap(){
  mapOC=document.createElement('canvas');mapOC.width=WW;mapOC.height=WH;
  mapOX=mapOC.getContext('2d');
  if(_BG_READY&&_BG_IMG){
    mapOX.imageSmoothingEnabled=true;
    mapOX.drawImage(_BG_IMG,0,0,WW,WH);
  }else{
    mapOX.imageSmoothingEnabled=true;
    drawPlazaBg(mapOX,WW,WH);
  }
}

function drawPlazaBg(g,W,H){
  // ── Helpers ──
  function prFlag(x,y,fw,fh){
    for(let i=0;i<5;i++){g.fillStyle=i%2===0?'#ce1126':'#f4f5f5';g.fillRect(x,y+i*fh/5,fw,Math.ceil(fh/5));}
    g.fillStyle='#0f2d80';
    g.beginPath();g.moveTo(x,y);g.lineTo(x+fh*0.87,y+fh/2);g.lineTo(x,y+fh);g.closePath();g.fill();
    g.fillStyle='#fff';
    const scx=x+fh*0.3,scy=y+fh/2,sr=fh*0.13;
    g.beginPath();
    for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5,b=a+Math.PI/5;g.lineTo(scx+Math.cos(a)*sr,scy+Math.sin(a)*sr);g.lineTo(scx+Math.cos(b)*sr*0.4,scy+Math.sin(b)*sr*0.4);}
    g.closePath();g.fill();
  }
  function wins(x,y,w,h,cols,rows,col){
    const pw=w/cols*0.55,ph=h/rows*0.5;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      const wx=x+c*(w/cols)+w/cols*0.22,wy=y+r*(h/rows)+h/rows*0.22;
      g.fillStyle=col;g.fillRect(wx,wy,pw,ph);
      g.fillStyle='rgba(255,255,255,0.12)';g.fillRect(wx,wy,pw/2,ph/2);
    }
  }
  function bench(x,y,w){
    g.fillStyle='#8d6e3f';g.fillRect(x,y,w,5);g.fillRect(x,y-9,w,4);
    g.fillStyle='#616161';g.fillRect(x+3,y+5,4,9);g.fillRect(x+w-7,y+5,4,9);
  }
  function miniPalm(x,y,sc){
    g.fillStyle='#6d4c2e';g.fillRect(x-2*sc,y,3*sc,18*sc);
    const leaves=[[-14,-12,-4,-4],[-8,-18,-2,-2],[2,-20,4,-2],[10,-16,2,-4],[14,-10,-2,-4]];
    leaves.forEach(([dx1,dy1,dx2,dy2])=>{
      g.strokeStyle='#4caf50';g.lineWidth=3*sc;
      g.beginPath();g.moveTo(x,y-2*sc);g.quadraticCurveTo(x+dx1*sc,y+dy1*sc,x+(dx1+dx2)*sc,y+(dy1+dy2)*sc);g.stroke();
      g.strokeStyle='#81c784';g.lineWidth=sc;g.stroke();
    });
  }

  // ── Sky ──
  const sky=g.createLinearGradient(0,0,0,H*0.4);
  sky.addColorStop(0,'#5ba3d0');sky.addColorStop(0.5,'#87ceeb');sky.addColorStop(1,'#c5e8f5');
  g.fillStyle=sky;g.fillRect(0,0,W,H*0.4+2);

  // ── Green hills (right) ──
  g.fillStyle='#2e7d32';
  g.beginPath();g.moveTo(W*0.36,H*0.4);g.lineTo(W*0.5,H*0.1);g.lineTo(W*0.68,H*0.22);g.lineTo(W*0.86,H*0.07);g.lineTo(W,H*0.2);g.lineTo(W,H*0.4);g.closePath();g.fill();
  g.fillStyle='#388e3c';
  g.beginPath();g.moveTo(W*0.4,H*0.4);g.lineTo(W*0.56,H*0.14);g.lineTo(W*0.73,H*0.26);g.lineTo(W*0.92,H*0.1);g.lineTo(W,H*0.25);g.lineTo(W,H*0.4);g.closePath();g.fill();
  g.fillStyle='#1b5e20';
  g.beginPath();g.moveTo(W*0.55,H*0.4);g.lineTo(W*0.7,H*0.18);g.lineTo(W*0.82,H*0.29);g.lineTo(W,H*0.22);g.lineTo(W,H*0.4);g.closePath();g.fill();

  // ── Ocean ──
  g.fillStyle='#1565c0';g.fillRect(W*0.17,H*0.23,W*0.66,H*0.09);
  g.fillStyle='#1e88e5';g.fillRect(W*0.2,H*0.25,W*0.6,H*0.055);
  g.fillStyle='#42a5f5';g.fillRect(W*0.24,H*0.27,W*0.52,H*0.025);
  for(let i=0;i<5;i++){g.fillStyle='rgba(255,255,255,0.22)';g.fillRect(W*0.22+i*W*0.1,H*0.28,W*0.06,1.5);}
  // Beach
  g.fillStyle='#f5deb3';g.fillRect(W*0.17,H*0.31,W*0.66,H*0.035);
  g.fillStyle='#ffe0b2';g.fillRect(W*0.19,H*0.315,W*0.62,H*0.02);
  // Pier
  g.fillStyle='#8d6e3f';g.fillRect(W*0.44,H*0.245,7,H*0.065);g.fillRect(W*0.42,H*0.24,11,4);

  // ── Lighthouse ──
  const lhx=W*0.455|0;
  g.fillStyle='#f5f5f5';g.fillRect(lhx,H*0.1|0,9,H*0.13|0);
  g.fillStyle='#e53935';g.fillRect(lhx,H*0.1|0,9,5);g.fillRect(lhx,H*0.165|0,9,5);
  g.fillStyle='#f9a825';g.fillRect(lhx+1,(H*0.1-5)|0,7,5);
  g.fillStyle='#546e7a';g.fillRect(lhx-2,H*0.23|0,13,4);

  // ── Background palms ──
  miniPalm(W*0.23,H*0.33,0.45);miniPalm(W*0.35,H*0.34,0.38);
  miniPalm(W*0.57,H*0.32,0.35);miniPalm(W*0.68,H*0.34,0.42);

  // ── LEFT BUILDING: CAFÉ BORICUA ──────────────
  // Upper orange wall
  g.fillStyle='#d4571e';g.fillRect(0,H*0.12|0,W*0.27|0,(H*0.28)|0);
  // Ground floor darker
  g.fillStyle='#bf4a13';g.fillRect(0,H*0.4|0,W*0.27|0,H*0.22|0);
  // Facade edge line
  g.fillStyle='rgba(0,0,0,0.15)';g.fillRect(0,H*0.38|0,W*0.27|0,4);
  // Windows
  wins(8,H*0.14,W*0.22,H*0.2,3,2,'#1a3a6b');
  // Large storefront windows
  g.fillStyle='#1a3a6b';g.fillRect(8,H*0.42|0,W*0.11|0,H*0.12|0);g.fillRect(W*0.14|0,H*0.42|0,W*0.1|0,H*0.12|0);
  g.fillStyle='rgba(255,255,255,0.1)';g.fillRect(8,H*0.42|0,W*0.04|0,H*0.12|0);
  // Sign
  g.fillStyle='#111';g.fillRect(3,H*0.4|0,W*0.24|0,H*0.028|0);
  g.fillStyle='#fff';g.font='bold 8px monospace';g.textAlign='left';
  g.fillText('CAFÉ BORICUA',7,(H*0.413)|0);g.font='6px monospace';g.fillText('CONTEMPORÁNEO',7,(H*0.422)|0);
  // PR flag
  prFlag(10,H*0.33,20,14);
  // Door
  g.fillStyle='#4e342e';g.fillRect(W*0.09|0,H*0.5|0,W*0.07|0,H*0.12|0);
  g.fillStyle='#3e2723';g.fillRect((W*0.125)|0,H*0.5|0,2,H*0.12|0);
  g.fillStyle='#ffd54f';g.fillRect((W*0.114)|0,(H*0.545)|0,3,3);
  // Sidewalk plant
  g.fillStyle='#4caf50';g.beginPath();g.arc(W*0.025|0,H*0.615|0,9,0,Math.PI*2);g.fill();
  g.fillStyle='#388e3c';g.beginPath();g.arc(W*0.025|0,H*0.61|0,5,0,Math.PI*2);g.fill();
  g.fillStyle='#5d4037';g.fillRect((W*0.018)|0,H*0.62|0,12,9);
  // Chalkboard sign outside
  g.fillStyle='#1a1a1a';g.fillRect(W*0.22|0,H*0.57|0,20,24);
  g.fillStyle='#fff';g.font='5px monospace';g.fillText('HOY:',W*0.222|0,(H*0.585)|0);g.fillText('CAFÉ',W*0.222|0,(H*0.592)|0);g.fillText('COLAO',W*0.222|0,(H*0.599)|0);

  // ── CENTER-LEFT: TIENDA DE DISEÑO ──────────────
  g.fillStyle='#26a69a';g.fillRect(W*0.25|0,H*0.17|0,W*0.2|0,H*0.24|0);
  g.fillStyle='#00897b';g.fillRect(W*0.25|0,H*0.41|0,W*0.2|0,H*0.21|0);
  wins(W*0.27,H*0.19,W*0.15,H*0.18,2,2,'#004d40');
  g.fillStyle='#004d40';g.fillRect(W*0.253|0,H*0.39|0,W*0.19|0,H*0.028|0);
  g.fillStyle='#fff';g.font='bold 7px monospace';g.textAlign='left';
  g.fillText('TIENDA DE',W*0.258|0,(H*0.404)|0);g.fillText('DISEÑO LOCAL',W*0.256|0,(H*0.412)|0);
  // Canopy
  g.fillStyle='#00695c';g.fillRect(W*0.24|0,H*0.41|0,W*0.22|0,5);
  prFlag(W*0.36|0,H*0.28|0,20,14);
  // Street lamp post
  g.fillStyle='#546e7a';g.fillRect(W*0.38|0,H*0.38|0,4,(H*0.24)|0);
  g.fillStyle='#78909c';g.fillRect(W*0.376|0,H*0.38|0,10,4);
  g.fillStyle='#fff9c4';g.fillRect(W*0.378|0,H*0.381|0,6,3);
  // Small kiosk/stand
  g.fillStyle='#5d4037';g.fillRect(W*0.4|0,H*0.47|0,W*0.1|0,H*0.07|0);
  g.fillStyle='#4e342e';g.fillRect(W*0.39|0,H*0.455|0,W*0.12|0,4);
  g.fillStyle='#d7ccc8';g.fillRect(W*0.405|0,H*0.47|0,W*0.08|0,H*0.055|0);
  g.fillStyle='#333';g.font='6px monospace';g.textAlign='center';
  g.fillText('🥤',W*0.45|0,(H*0.5)|0);

  // ── RIGHT: ARTE URBANO ──────────────────────
  // Green accent building
  g.fillStyle='#558b2f';g.fillRect(W*0.63|0,H*0.17|0,W*0.1|0,H*0.25|0);
  g.fillStyle='#33691e';g.fillRect(W*0.63|0,H*0.42|0,W*0.1|0,H*0.2|0);
  wins(W*0.64,H*0.19,W*0.08,H*0.18,1,2,'#1b5e20');
  prFlag(W*0.64|0,H*0.29|0,20,14);
  // Main gray building
  g.fillStyle='#607d8b';g.fillRect(W*0.73|0,H*0.13|0,W*0.27|0,H*0.29|0);
  g.fillStyle='#546e7a';g.fillRect(W*0.73|0,H*0.42|0,W*0.27|0,H*0.2|0);
  wins(W*0.75,H*0.15,W*0.23,H*0.23,3,3,'#1a237e');
  // AC unit
  g.fillStyle='#90a4ae';g.fillRect(W*0.75|0,H*0.13|0,22,8);g.fillStyle='#78909c';g.fillRect(W*0.75|0,H*0.13|0,22,3);
  // Sign
  g.fillStyle='#111';g.fillRect(W*0.733|0,H*0.4|0,W*0.255|0,H*0.028|0);
  g.fillStyle='#fff';g.font='bold 8px monospace';g.textAlign='left';
  g.fillText('ARTE URBANO',W*0.738|0,(H*0.412)|0);
  // Street lamp right
  g.fillStyle='#546e7a';g.fillRect(W*0.7|0,H*0.38|0,4,(H*0.24)|0);
  g.fillStyle='#78909c';g.fillRect(W*0.696|0,H*0.38|0,10,4);g.fillStyle='#fff9c4';g.fillRect(W*0.698|0,H*0.381|0,6,3);
  // Art piece on building wall
  g.fillStyle='#e91e63';g.fillRect(W*0.77|0,H*0.32|0,22,30);
  g.fillStyle='#ff5722';g.fillRect(W*0.775|0,H*0.325|0,10,20);
  g.fillStyle='#9c27b0';g.fillRect(W*0.79|0,H*0.33|0,8,14);

  // ── PLAZA FLOOR ─────────────────────────────
  g.fillStyle='#c2c2c2';g.fillRect(0,H*0.62|0,W,(H*0.38)|0);
  // Tile grid
  g.strokeStyle='#adadad';g.lineWidth=0.7;
  for(let y=(H*0.62|0);y<H;y+=20){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke();}
  for(let x=0;x<W;x+=28){g.beginPath();g.moveTo(x,H*0.62|0);g.lineTo(x,H);g.stroke();}
  // Lighter center strip (main walkway)
  g.fillStyle='#cccccc';g.fillRect(W*0.31|0,H*0.62|0,W*0.38|0,H*0.38|0);
  g.strokeStyle='#b8b8b8';
  for(let y=(H*0.62|0);y<H;y+=20)g.strokeRect(W*0.31|0,y,W*0.38|0,20);

  // ── TRAIN TRACKS ────────────────────────────
  const t1b=W*0.39,t2b=W*0.61,t1t=W*0.47,t2t=W*0.53;
  // Ties
  g.fillStyle='#6d4c41';
  for(let i=0;i<=10;i++){const t=i/10;const ty=(H*0.62+t*(H*0.38))|0;const lx=t1t+(t1b-t1t)*t,rx=t2t+(t2b-t2t)*t;g.fillRect(lx-3|0,ty,rx-lx+6|0,3+t*2|0);}
  // Rails
  [[t1t,t1b],[t2t,t2b]].forEach(([xt,xb])=>{
    g.fillStyle='#9e9e9e';
    g.beginPath();g.moveTo(xt-2,H*0.62);g.lineTo(xb-2,H);g.lineTo(xb+2,H);g.lineTo(xt+2,H*0.62);g.closePath();g.fill();
    g.fillStyle='#d0d0d0';
    g.beginPath();g.moveTo(xt-1,H*0.62);g.lineTo(xb-1,H);g.lineTo(xb,H);g.lineTo(xt,H*0.62);g.closePath();g.fill();
  });

  // ── BENCHES ─────────────────────────────────
  bench(W*0.06,H*0.74,W*0.14);bench(W*0.1,H*0.67,W*0.12);
  bench(W*0.76,H*0.74,W*0.14);bench(W*0.78,H*0.67,W*0.1);

  // ── TROPICAL PLANT GARDEN ───────────────────
  g.fillStyle='#6d6d6d';g.fillRect(W*0.54|0,H*0.63|0,W*0.15|0,H*0.1|0);
  g.fillStyle='#4e342e';g.fillRect(W*0.54|0,H*0.635|0,W*0.15|0,(H*0.095)|0);
  g.fillStyle='#3e2723';g.fillRect(W*0.54|0,H*0.63|0,W*0.15|0,4);
  [[W*0.56,H*0.695,1],[W*0.6,H*0.675,0.85],[W*0.635,H*0.705,0.9],[W*0.665,H*0.67,0.75]].forEach(([px,py,sc])=>{
    g.fillStyle='#2e7d32';g.beginPath();g.arc(px,py,11*sc,0,Math.PI*2);g.fill();
    g.fillStyle='#4caf50';g.beginPath();g.arc(px-3*sc,py-4*sc,7*sc,0,Math.PI*2);g.fill();
    g.strokeStyle='#388e3c';g.lineWidth=2.5*sc;
    g.beginPath();g.moveTo(px,py);g.quadraticCurveTo(px-10*sc,py-8*sc,px-16*sc,py-18*sc);g.stroke();
    g.beginPath();g.moveTo(px,py);g.quadraticCurveTo(px+8*sc,py-10*sc,px+14*sc,py-20*sc);g.stroke();
  });

  // ── PEDESTALS ───────────────────────────────
  [[W*0.32,'#c2185b','♥'],[W*0.68,'#78909c','★']].forEach(([px,col,sym])=>{
    g.fillStyle='#c0c0c0';g.fillRect(px-11,(H*0.81)|0,22,18);
    g.fillStyle='#a0a0a0';g.fillRect(px-9,(H*0.814)|0,18,14);
    g.fillStyle='#d8d8d8';g.fillRect(px-11,(H*0.81)|0,22,3);
    g.fillStyle='#b4b4b4';g.fillRect(px-14,(H*0.824)|0,28,4);
    g.fillStyle=col;g.font='bold 15px serif';g.textAlign='center';
    g.fillText(sym,px,(H*0.822)|0);
  });

  // ── CORNER PLANTS (foreground) ──────────────
  miniPalm(W*0.01,H*0.72,0.55);miniPalm(W*0.99,H*0.74,0.5);
}


function drawTile(ctx,t,x,y,sz,r,c,rng){
  const sd=(r*37+c*17)&0xff;
  switch(t){
    case T_SNOW:{
      ctx.fillStyle='#d8ecf8';ctx.fillRect(x,y,sz,sz);
      ctx.fillStyle='#e8f5fc';
      if(sd%3===0)ctx.fillRect(x+3,y+4,5,3);
      if(sd%5===1)ctx.fillRect(x+12,y+10,4,3);
      ctx.fillStyle='#ffffff';
      if(sd%7===0)ctx.fillRect(x+8,y+14,3,2);
      if(sd%4===0)ctx.fillRect(x+14,y+5,2,2);
      break;}
    case T_PATH:{
      const isLight=((r+c)%2===0);
      ctx.fillStyle=isLight?'#d4a843':'#b8822a';ctx.fillRect(x,y,sz,sz);
      ctx.fillStyle=isLight?'#e0b84e':'#c89232';
      ctx.fillRect(x+1,y+1,sz-2,sz-2);
      ctx.fillStyle='#8b6520';
      ctx.fillRect(x,y,sz,1);ctx.fillRect(x,y,1,sz);
      ctx.fillStyle='rgba(255,230,120,0.25)';
      ctx.fillRect(x+2,y+2,3,2);
      break;}
    case T_PLAZA:{
      const isA=((r+c)%2===0);
      ctx.fillStyle=isA?'#cfc3b2':'#b8ab98';ctx.fillRect(x,y,sz,sz);
      ctx.fillStyle=isA?'#d8cbb8':'#c2b4a0';
      ctx.fillRect(x+1,y+1,sz-2,sz-2);
      ctx.fillStyle='#a09080';
      ctx.fillRect(x,y,sz,1);ctx.fillRect(x,y,1,sz);
      if(sd%5===0){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(x+4,y+4,5,2);}
      break;}
    case T_DANCE:{
      ctx.fillStyle='#0e0a1c';ctx.fillRect(x,y,sz,sz);
      ctx.fillStyle='#18122a';ctx.fillRect(x+1,y+1,sz-2,sz-2);
      ctx.fillStyle='#0a0816';
      ctx.fillRect(x,y,sz,1);ctx.fillRect(x,y,1,sz);
      if(sd%3===0){ctx.fillStyle='rgba(255,80,180,0.12)';ctx.fillRect(x+6,y+6,5,5);}
      if(sd%4===1){ctx.fillStyle='rgba(80,180,255,0.12)';ctx.fillRect(x+12,y+3,4,4);}
      if(sd%5===2){ctx.fillStyle='rgba(255,220,80,0.1)';ctx.fillRect(x+2,y+13,4,4);}
      break;}
    case T_FOUNTAIN:{
      ctx.fillStyle='#78909c';ctx.fillRect(x,y,sz,sz);
      ctx.fillStyle='#90a4ae';ctx.fillRect(x+2,y+2,sz-4,sz-4);
      ctx.fillStyle='#1e88e5';ctx.fillRect(x+4,y+4,sz-8,sz-8);
      ctx.fillStyle='#42a5f5';ctx.fillRect(x+5,y+5,sz-10,sz-10);
      ctx.fillStyle='rgba(100,220,255,0.5)';
      if(sd%2===0)ctx.fillRect(x+7,y+8,4,1);
      if(sd%3===1)ctx.fillRect(x+11,y+12,3,1);
      ctx.fillStyle='#546e7a';
      ctx.fillRect(x,y,sz,2);ctx.fillRect(x,y+sz-2,sz,2);
      ctx.fillRect(x,y,2,sz);ctx.fillRect(x+sz-2,y,2,sz);
      break;}
    case T_BENCH:{
      ctx.fillStyle='#d0e8f4';ctx.fillRect(x,y,sz,sz);
      ctx.fillStyle='#8d6e63';ctx.fillRect(x+2,y+7,sz-4,4);
      ctx.fillStyle='#795548';ctx.fillRect(x+2,y+13,sz-4,3);
      ctx.fillStyle='#6d4c41';
      ctx.fillRect(x+2,y+11,2,7);ctx.fillRect(x+sz-4,y+11,2,7);
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(x+3,y+7,4,1);
      break;}
    case T_LAMP:{
      ctx.fillStyle='#d0e8f4';ctx.fillRect(x,y,sz,sz);
      ctx.fillStyle='#37474f';ctx.fillRect(x+9,y+5,2,13);
      ctx.fillStyle='#546e7a';ctx.fillRect(x+6,y+3,8,4);
      ctx.fillStyle='#ffd740';ctx.fillRect(x+7,y+3,6,3);
      ctx.fillStyle='rgba(255,215,64,0.6)';ctx.fillRect(x+5,y+1,10,6);
      ctx.fillStyle='#ffffff';ctx.fillRect(x+6,y+1,8,2);
      ctx.fillStyle='#263238';ctx.fillRect(x+8,y+17,4,3);
      break;}
    case T_WALL:{
      ctx.fillStyle='#f0e2c8';ctx.fillRect(x,y,sz,sz);
      ctx.fillStyle='#e8d8bc';ctx.fillRect(x+1,y+1,sz-2,sz-2);
      ctx.fillStyle='#d0c0a0';
      ctx.fillRect(x,y,sz,1);ctx.fillRect(x,y,1,sz);
      if(sd%3===0){
        ctx.fillStyle='#90c8e8';ctx.fillRect(x+4,y+3,6,6);
        ctx.fillStyle='#78b0d0';ctx.fillRect(x+5,y+4,2,4);ctx.fillRect(x+8,y+4,2,4);
        ctx.fillStyle='#a08040';
        ctx.fillRect(x+3,y+2,8,1);ctx.fillRect(x+3,y+9,8,1);
        ctx.fillRect(x+3,y+2,1,8);ctx.fillRect(x+10,y+2,1,8);
      } else if(sd%6===4){
        ctx.fillStyle='#8d6e63';ctx.fillRect(x+6,y+10,8,10);
        ctx.fillStyle='#6d4c41';ctx.fillRect(x+7,y+10,6,10);
        ctx.fillStyle='#c8a060';ctx.fillRect(x+6,y+9,8,1);
      }
      break;}
    case T_ROOF:{
      let rc='#6a1b9a';
      if(c>=20&&r<15)rc='#b71c1c';
      else if(c<15&&r>=18)rc='#0d47a1';
      else if(c>=20&&r>=18)rc='#1b5e20';
      ctx.fillStyle=rc;ctx.fillRect(x,y,sz,sz);
      ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(x,y,sz,sz/3);
      ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(x,y+sz*2/3,sz,sz/3);
      for(let i=3;i<sz;i+=4){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(x,y+i,sz,1);}
      ctx.fillStyle='#e8f4fc';ctx.fillRect(x,y,sz,3);
      ctx.fillStyle='#ffffff';ctx.fillRect(x+2,y,sz-4,2);
      break;}
    case T_TREE:{
      ctx.fillStyle='#cce4f4';ctx.fillRect(x,y,sz,sz);
      ctx.fillStyle='#5d4037';ctx.fillRect(x+9,y+13,2,7);
      ctx.fillStyle='#1b5e20';ctx.fillRect(x+4,y+9,12,6);
      ctx.fillStyle='#2e7d32';ctx.fillRect(x+6,y+5,8,6);
      ctx.fillStyle='#33691e';ctx.fillRect(x+8,y+2,4,5);
      ctx.fillStyle='#d8ecf8';ctx.fillRect(x+4,y+8,12,2);
      ctx.fillStyle='#e8f5fc';ctx.fillRect(x+6,y+4,8,2);
      ctx.fillStyle='#ffffff';ctx.fillRect(x+8,y+1,4,2);ctx.fillRect(x+9,y+1,2,1);
      break;}
    case T_CAFE:{
      ctx.fillStyle='#6d4c41';ctx.fillRect(x,y,sz,sz);
      ctx.fillStyle='#795548';ctx.fillRect(x+1,y+1,sz-2,sz-2);
      ctx.fillStyle='#5d4037';
      ctx.fillRect(x,y+6,sz,1);ctx.fillRect(x,y+13,sz,1);
      if(sd%7===0){
        ctx.fillStyle='#4e342e';ctx.fillRect(x+3,y+3,14,14);
        ctx.fillStyle='#6d4c41';ctx.fillRect(x+4,y+4,12,12);
        ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(x+5,y+5,4,2);
      }
      break;}
    case T_BORDER:{
      ctx.fillStyle='#263238';ctx.fillRect(x,y,sz,sz);
      ctx.fillStyle='#37474f';ctx.fillRect(x+1,y+1,sz-2,sz-2);
      ctx.fillStyle='#1c272b';
      ctx.fillRect(x,y,sz,1);ctx.fillRect(x,y,1,sz);
      if(sd%4===0){ctx.fillStyle='#455a64';ctx.fillRect(x+3,y+3,sz-6,sz-6);}
      break;}
    case T_ICE:{
      ctx.fillStyle='#b3d9f0';ctx.fillRect(x,y,sz,sz);
      ctx.fillStyle='#c5e8f8';ctx.fillRect(x+2,y+2,sz-4,sz-4);
      ctx.fillStyle='#78b8d8';
      ctx.fillRect(x+3,y+8,7,1);ctx.fillRect(x+9,y+5,5,1);ctx.fillRect(x+4,y+14,8,1);
      ctx.fillStyle='rgba(255,255,255,0.55)';
      if(sd%3===0)ctx.fillRect(x+6,y+4,4,1);
      if(sd%5===1)ctx.fillRect(x+10,y+13,3,1);
      break;}
  }
}

function tileAt(wx,wy){
  const c=Math.floor(wx/TS),r=Math.floor(wy/TS);
  if(r<0||r>=MH||c<0||c>=MW)return T_BORDER;
  return MAP[r][c];
}
function isSolid(t){return t===T_LAMP||t===T_WALL||t===T_ROOF||t===T_TREE||t===T_BORDER;}
function canWalk(wx,wy){return !isSolid(tileAt(wx,wy));}

function hexLighten(h,a){
  if(!h||h.length<7)return h||'#888';
  const n=parseInt(h.slice(1),16);
  const r=Math.min(255,(n>>16)+a),g=Math.min(255,((n>>8)&0xff)+a),b=Math.min(255,(n&0xff)+a);
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}
function hexDarken(h,a){return hexLighten(h,-a);}

const _SPR_IMG=new Image();
_SPR_IMG.src='data:image/png;base64,'+_SPR_B64;
let _SPR_READY=false;
_SPR_IMG.onload=()=>{_SPR_READY=true;};
const _SPR_CW=64,_SPR_CH=128;
const _SPR_ROW={0:0,1:0,2:2,3:0,4:1,5:1,6:3,7:1,8:4};

// ── Draw Character ──────────────────────
const CS=2.5;
function drawChar(ctx,ch,wx,wy,frame,facing,camXo,camYo,alpha=1){
  const sx=wx-camXo,sy=wy-camYo;
  ctx.save();ctx.globalAlpha=alpha;
  ctx.translate(sx,sy);
  const row=_SPR_ROW[ch.id];
  if(row!==undefined&&_SPR_READY){
    const col=(frame>>1)&1;
    const ax=col*_SPR_CW,ay=row*_SPR_CH;
    const DW=26,DH=52;
    if(facing==='left'){ctx.save();ctx.scale(-1,1);}
    ctx.drawImage(_SPR_IMG,ax,ay,_SPR_CW,_SPR_CH,-DW/2,-DH,DW,DH);
    if(facing==='left')ctx.restore();
  }else{
    ctx.scale(facing==='left'?-CS:CS,CS);
    _drawCharPixels(ctx,ch,frame);
  }
  ctx.restore();
}
function _drawCharPixels(ctx,ch,frame){
  const f4=frame&3;
  const {skin,skinH,skinS,hair,capCol,capBack,shirtCol,pantsCol,shoeCol,accent,gender,ribbon,hairStyle=0,ponytail=false,floralDress=false}=ch;
  const sH=skinH||hexLighten(skin,28),sS=skinS||hexDarken(skin,28);
  // 4-frame walk cycle: legs/arms swing alternately
  const LL=[0,2,0,-2][f4],RL=[0,-2,0,2][f4];
  const LA=[0,-1,0,1][f4],RA=[0,1,0,-1][f4];
  // Drop shadow
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();ctx.ellipse(0,1,5.5,2,0,0,Math.PI*2);ctx.fill();
  // ── Shoes ──
  ctx.fillStyle=hexDarken(shoeCol,25);
  ctx.fillRect(-5+LL,-1,5,2);ctx.fillRect(0+RL,-1,5,2);
  ctx.fillStyle=shoeCol;
  ctx.fillRect(-5+LL,-3,5,2);ctx.fillRect(0+RL,-3,5,2);
  ctx.fillStyle=hexLighten(shoeCol,35);
  ctx.fillRect(-4+LL,-3,2,1);ctx.fillRect(1+RL,-3,2,1);
  // ── Legs ──
  if(gender==='f'){
    if(floralDress){
      // Vestido floral – base crema con manchas de colores
      ctx.fillStyle='#f5f0e6';ctx.fillRect(-5,-11,10,8);
      const fl=[['#e91e63',-3,-9],['#ff7043',1,-8],['#4caf50',-2,-6],['#ffeb3b',2,-9],['#9c27b0',-1,-7]];
      fl.forEach(([c,fx,fy])=>{ctx.fillStyle=c;ctx.fillRect(fx,fy,2,2);});
      ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(-4,-4,8,1);
    } else {
      ctx.fillStyle=pantsCol;ctx.fillRect(-5,-11,10,8);
      ctx.fillStyle=hexLighten(pantsCol,22);ctx.fillRect(-4,-11,8,2);
      ctx.fillStyle=hexDarken(pantsCol,22);ctx.fillRect(-4,-4,8,1);
      ctx.fillStyle=accent;ctx.fillRect(-5,-11,10,1);
    }
    ctx.fillStyle=skin;ctx.fillRect(-4+LL,-6,3,3);ctx.fillRect(1+RL,-6,3,3);
  } else {
    ctx.fillStyle=pantsCol;
    ctx.fillRect(-5+LL,-11,4,8);ctx.fillRect(1+RL,-11,4,8);
    ctx.fillStyle=hexLighten(pantsCol,18);
    ctx.fillRect(-5+LL,-11,2,8);ctx.fillRect(1+RL,-11,2,8);
    ctx.fillStyle=hexDarken(pantsCol,22);
    ctx.fillRect(-2+LL,-11,2,8);ctx.fillRect(3+RL,-11,2,8);
  }
  // ── Belt ──
  ctx.fillStyle=hexDarken(accent,15);ctx.fillRect(-5,-12,10,2);
  ctx.fillStyle=hexLighten(accent,25);ctx.fillRect(-1,-12,2,2);
  // ── Body/Shirt ──
  ctx.fillStyle=shirtCol;ctx.fillRect(-5,-18,10,6);
  ctx.fillStyle=hexLighten(shirtCol,28);
  ctx.fillRect(-5,-18,10,1);ctx.fillRect(-5,-18,2,6);
  ctx.fillStyle=hexDarken(shirtCol,22);ctx.fillRect(3,-18,2,6);
  ctx.fillStyle=accent;ctx.fillRect(-5,-18,2,6);ctx.fillRect(3,-18,2,6);
  // ── Arms ──
  ctx.fillStyle=shirtCol;ctx.fillRect(-8,-17+LA,3,4);ctx.fillRect(5,-17+RA,3,4);
  ctx.fillStyle=hexDarken(shirtCol,18);ctx.fillRect(-8,-17+LA,1,4);
  ctx.fillStyle=hexLighten(shirtCol,18);ctx.fillRect(7,-17+RA,1,4);
  ctx.fillStyle=skin;ctx.fillRect(-8,-14+LA,3,3);ctx.fillRect(5,-14+RA,3,3);
  ctx.fillStyle=sS;ctx.fillRect(-8,-12+LA,3,1);ctx.fillRect(5,-12+RA,3,1);
  // ── Neck ──
  ctx.fillStyle=skin;ctx.fillRect(-2,-20,4,2);
  ctx.fillStyle=sS;ctx.fillRect(0,-20,2,1);
  // ── Head ──
  ctx.fillStyle=skin;
  ctx.fillRect(-5,-28,10,9);
  ctx.fillRect(-6,-27,2,7);ctx.fillRect(4,-27,2,7);
  ctx.fillStyle=sH;ctx.fillRect(-4,-28,4,4);
  ctx.fillStyle=sS;
  ctx.fillRect(-4,-20,8,1);ctx.fillRect(-5,-22,1,2);ctx.fillRect(4,-22,1,2);
  // ── Ears ──
  ctx.fillStyle=skin;ctx.fillRect(-7,-27,2,4);ctx.fillRect(5,-27,2,4);
  ctx.fillStyle=sS;ctx.fillRect(-6,-27,1,2);ctx.fillRect(6,-27,1,2);
  // ── Eyes (whites + iris + pupil + shine) ──
  ctx.fillStyle=sS;ctx.fillRect(-5,-26,4,3);ctx.fillRect(1,-26,4,3);
  ctx.fillStyle='#f5f5f5';ctx.fillRect(-4,-26,3,2);ctx.fillRect(1,-26,3,2);
  ctx.fillStyle='#1a2040';ctx.fillRect(-4,-26,3,1);ctx.fillRect(1,-26,3,1);
  ctx.fillStyle='#000';ctx.fillRect(-3,-26,1,1);ctx.fillRect(2,-26,1,1);
  ctx.fillStyle='#fff';ctx.fillRect(-4,-26,1,1);ctx.fillRect(1,-26,1,1);
  // ── Eyebrows ──
  ctx.fillStyle=hair;ctx.fillRect(-5,-27,3,1);ctx.fillRect(1,-27,4,1);
  // ── Nose ──
  ctx.fillStyle=sS;ctx.fillRect(0,-24,2,1);
  // ── Mouth ──
  ctx.fillStyle=hexDarken(skin,40);ctx.fillRect(-2,-22,4,1);
  ctx.fillStyle='#cc4444';ctx.fillRect(-1,-22,2,1);
  ctx.fillStyle='#fff';ctx.fillRect(-1,-22,1,1);
  // ── Cheek blush ──
  ctx.fillStyle='rgba(255,120,100,0.2)';
  ctx.fillRect(-6,-24,2,2);ctx.fillRect(4,-24,2,2);
  // ── Beard (old characters) ──
  if(ch.beard){
    ctx.fillStyle='#a8a8a8';ctx.fillRect(-3,-23,6,1);
    ctx.fillStyle='#c8c8c8';ctx.fillRect(-4,-22,8,3);
    ctx.fillStyle='#e0e0e0';ctx.fillRect(-3,-22,6,2);
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.fillRect(-2,-22,2,1);
    ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(-4,-20,8,1);
  }
  // ── Hair / Cap ──
  if(capCol){_drawCap(ctx,capCol,capBack,hair,ponytail);}
  else{
    _drawHair(ctx,hairStyle,hair);
    if(gender==='f'&&ribbon){
      ctx.fillStyle=ribbon;
      ctx.fillRect(-7,-32,4,4);ctx.fillRect(3,-32,4,4);ctx.fillRect(-1,-33,2,4);
      ctx.fillStyle=hexLighten(ribbon,35);
      ctx.fillRect(-6,-32,2,2);ctx.fillRect(4,-32,2,2);
    }
  }
}
function _drawHair(ctx,style,hair){
  const hD=hexDarken(hair,25),hL=hexLighten(hair,38);
  ctx.fillStyle=hair;
  switch(style){
    case 3: // Ponytail – Vale
      ctx.fillRect(-5,-31,10,4);
      ctx.fillRect(-6,-30,2,8);ctx.fillRect(4,-30,2,8);
      ctx.fillRect(-8,-28,4,14); // coleta colgando hacia atrás

// ── Movement ────────────────────────────
function moveEntity(e,tx,ty,spd){
  if(tx===null)return false;
  const dx=tx-e.x,dy=ty-e.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<3){e.x=tx;e.y=ty;e.tx=null;e.ty=null;return true;}
  const nx=dx/dist,ny=dy/dist;
  const nx_=e.x+nx*spd,ny_=e.y+ny*spd;
  if(canWalk(nx_,ny_)){e.x=nx_;e.y=ny_;}
  else if(canWalk(nx_,e.y)){e.x=nx_;}
  else if(canWalk(e.x,ny_)){e.y=ny_;}
  if(Math.abs(dx)>1)e.facing=dx>0?'right':'left';
  if(++e.frameTimer>8){e.frameTimer=0;e.frame=(e.frame+1)%4;}
  return false;
}

// ── Audio System ────────────────────────
let audioCtx=null,musicEnabled=true,dancebeat=0,lastZoneSnd=T_SNOW;
function ensureAudio(){
  if(!audioCtx){
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  }
}
function note(f,d,type='sine',vol=0.1,delay=0){
  if(!audioCtx||!musicEnabled)return;
  const t=audioCtx.currentTime+delay;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=f;
  o.connect(g);g.connect(audioCtx.destination);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.start(t);o.stop(t+d+0.05);
}
function sfxVote(ch){
  note(ch===0?440:523,0.1,'sine',0.13);
  note(ch===0?660:784,0.07,'sine',0.08,0.07);
}
function sfxCountdown(n){

}

// Dance beat (called every frame from update)
const DANCE_BPM=128,DANCE_FPB=Math.round(60*60/DANCE_BPM); // frames per beat
function updateDanceBeat(){
  if(!player||!audioCtx||!musicEnabled)return;
  if(player.zone!==T_DANCE)return;
  dancebeat++;
  const b=dancebeat%DANCE_FPB,hb=Math.round(DANCE_FPB/2);
  if(b===0){note(80,0.12,'sine',0.18);note(80,0.08,'sawtooth',0.06);}  // kick
  if(b===hb){note(200,0.08,'square',0.07);note(400,0.04,'square',0.03);}// snare
  if(b===0||b===hb/2||b===hb||b===hb*1.5){note(2000,0.03,'sawtooth',0.03);} // hat
}
// Ambient winter pad (plays every ~6sec when NOT on dance floor)
let padTimer=0;
function updateAmbient(){
  if(!audioCtx||!musicEnabled||!player)return;
  if(player.zone===T_DANCE){padTimer=0;return;}
  padTimer++;
  if(padTimer===360){[220,277,330,415].forEach((f,i)=>note(f,3.5,'sine',0.018,i*0.15));}
  if(padTimer>=360)padTimer=0;
}

// ── Compatibility ───────────────────────
function calcCompatibility(answersA,answersB){
  if(!answersA.length||!answersB.length)return 0;
  const len=Math.min(answersA.length,answersB.length);
  let match=0;
  for(let i=0;i<len;i++)if(answersA[i]===answersB[i])match++;
  return Math.round((match/len)*100);
}

  else{avx.scale(0.85,0.85);_drawCharPixels(avx,bot.charDef,0);}
  avx.restore();
  chatMessages=[];
  addChatMsg('sys','🎉 ¡Match encontrado con '+compat+'% de compatibilidad!');
  setTimeout(()=>{
    addChatMsg('them',rndFrom(BOT_RESPONSES.greet));
    setTimeout(()=>addChatMsg('them','Vi que elegimos lo mismo en varias preguntas 😏'),1200);
  },600);
  STATE='chat';
}
function closeChat(){document.getElementById('chat-wrap').style.display='none';STATE='summary';}
function sendChatMsg(){
  const inp=document.getElementById('chat-input');
  const msg=inp.value.trim();if(!msg||!matchedBot)return;
  inp.value='';addChatMsg('you',msg);
  setTimeout(()=>addChatMsg('them',getBotReply(msg)),600+Math.random()*800);
}
function addChatMsg(type,text){
  chatMessages.push({type,text});
  const inner=document.getElementById('chat-msgs-inner');
  const d=document.createElement('div');d.className='msg msg-'+type;d.textContent=text;
  inner.appendChild(d);

}

const NUM_QUESTIONS=7;
let questionOrder=[];
function shuffleQuestions(){
  questionOrder=[...Array(QUESTIONS.length).keys()];
  for(let i=questionOrder.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [questionOrder[i],questionOrder[j]]=[questionOrder[j],questionOrder[i]];
  }
}

// ── Input ───────────────────────────────
const keys={};
let touchX=null,touchY=null,touchStartX=null,touchStartY=null;

function setupInput(){
  window.addEventListener('keydown',e=>{
    keys[e.key]=true;
    if((e.key===' '||e.key==='Enter')&&STATE==='title')startCharSelect();
  });
  window.addEventListener('keyup',e=>{keys[e.key]=false;});
  function cvCoord(cx2,cy2){
    const r=cv.getBoundingClientRect();
    return {x:(cx2-r.left)/SC,y:(cy2-r.top)/SC};
  }
  cv.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0];const p=cvCoord(t.clientX,t.clientY);
    touchStartX=p.x;touchStartY=p.y;touchX=p.x;touchY=p.y;
    handleTap(p.x,p.y);
  },{passive:false});
  cv.addEventListener('touchmove',e=>{
    e.preventDefault();
    const t=e.touches[0];const p=cvCoord(t.clientX,t.clientY);
    touchX=p.x;touchY=p.y;
  },{passive:false});
  cv.addEventListener('touchend',e=>{
    touchX=null;touchY=null;touchStartX=null;touchStartY=null;
  },{passive:false});
  cv.addEventListener('click',e=>{
    const p=cvCoord(e.clientX,e.clientY);handleTap(p.x,p.y);
  });
  document.getElementById('chat-send').addEventListener('click',sendChatMsg);
  document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendChatMsg();});
  document.getElementById('chat-close').addEventListener('click',closeChat);
  document.querySelectorAll('.ice-btn').forEach(b=>{
    b.addEventListener('click',()=>{document.getElementById('chat-input').value=b.textContent;sendChatMsg();});
  });
}

function handleTap(x,y){
  ensureAudio();
  if(STATE==='title'){startCharSelect();return;}
  if(STATE==='charSelect'){handleCharSelectTap(x,y);return;}
  if(STATE==='voting'){handleVoteTap(x,y);return;}
  if(STATE==='matchReveal'){if(frameN-stateStartFrame>120){startChatFlow();return;}}
  if(STATE==='summary'){if(y>MAP_BOT){restartGame();}}

  // Music toggle (bottom-left)
  if(y>MAP_BOT&&y<MAP_BOT+44&&x>4&&x<50){
    musicEnabled=!musicEnabled;
    if(musicEnabled)ensureAudio();
    return;
  }
  // Emote picker (below map area, right side)
  if((STATE==='playing'||STATE==='countdown')&&y>MAP_BOT&&y<MAP_BOT+44&&x>VW-55&&x<VW-5){
    emotePickerOpen=!emotePickerOpen;return;
  }
  if(emotePickerOpen&&y>MAP_BOT+48&&y<MAP_BOT+100){
    const idx=Math.floor((x-8)/52);
    if(idx>=0&&idx<EMOTES.length){
      player.emote={emoji:EMOTES[idx],timer:200};
      emotePickerOpen=false;sfxEmote();
    }
    return;
  }
  if(emotePickerOpen){emotePickerOpen=false;}
}

// ── Game State ──────────────────────────
let STATE='title';
let selectedChar=null;
let currentQ=0,qTimer=0,Q_TIME=450;
let playerVote=-1,votePhase='pending',voteRevealTimer=0;
let frameN=0,stateStartFrame=0;
let compatList=[];
let countdownTimer=0;

function startCharSelect(){STATE='charSelect';stateStartFrame=frameN;}
function handleCharSelectTap(x,y){
  const COLS=3,PAD=8,GAP=5;
  const cardW=Math.floor((VW-PAD*2-GAP*(COLS-1))/COLS);
  const cardH=152,GRID_Y=82;
  // Character cards
  for(let i=0;i<CHARS.length;i++){
    const col=i%COLS,row=Math.floor(i/COLS);
    const bx=PAD+col*(cardW+GAP),by=GRID_Y+row*cardH;
    if(x>=bx&&x<bx+cardW&&y>=by&&y<by+cardH){
      if(selectedChar===i){startGame();}else{selectedChar=i;}
      return;
    }
  }
  // JUGAR button
  const ROWS=Math.ceil(CHARS.length/COLS);
  const gridBot=GRID_Y+ROWS*cardH;
  const btnY=gridBot+14,btnX=VW/2-75,btnW=150,btnH=46;
  if(selectedChar!==null&&x>=btnX&&x<btnX+btnW&&y>=btnY&&y<btnY+btnH){
    startGame();
  }
}
function startGame(){
  shuffleQuestions();spawnEntities();initCamera();particles=[];
  currentQ=0;playerVote=-1;compatList=[];votePhase='pending';
  emotePickerOpen=false;
  initSnow();
  STATE='playing';stateStartFrame=frameN;
  // Show brief intro then start countdown for first question
  setTimeout(startCountdown,2500);
}
function startCountdown(){
  if(STATE==='playing'||STATE==='countdown'){
    STATE='countdown';stateStartFrame=frameN;
    countdownTimer=200;// ~3.3 sec: "¡SE VIENE!" banner + 3-2-1
  }
}
function showNextQuestion(){
  if(currentQ>=NUM_QUESTIONS){endVoting();return;}
  votePhase='pending';playerVote=-1;qTimer=Q_TIME;
  STATE='voting';stateStartFrame=frameN;
  const q=questionOrder[currentQ];
  bots.forEach(b=>{
    b.pendingVote=Math.random()<b.biases[q]?1:0;
    const zoneX=b.pendingVote===0?WW*0.25:WW*0.75;
    b.tx=zoneX+(-40+Math.random()*80);
    b.ty=WH*0.35+Math.random()*WH*0.3;
  });
}
function handleVoteTap(x,y){
  if(playerVote!==-1)return;
  const btnY=MAP_BOT+90;
  if(y>=btnY&&y<=btnY+72){
    playerVote=x<VW/2?0:1;
    player.answers.push(playerVote);sfxVote(playerVote);
    const zoneX=playerVote===0?WW*0.22:WW*0.78;
    player.tx=zoneX;player.ty=WH*0.4+Math.random()*WH*0.2;
    return;
  }
  if(y>=MAP_TOP&&y<=MAP_BOT){
    playerVote=(x+camX)<WW/2?0:1;
    player.answers.push(playerVote);sfxVote(playerVote);
    const zoneX=playerVote===0?WW*0.22:WW*0.78;
    player.tx=zoneX;player.ty=WH*0.4+Math.random()*WH*0.2;
  }
}
function commitBotVotes(){
  bots.forEach(b=>{if(b.pendingVote!==undefined)b.answers.push(b.pendingVote);});
  // Update running compat
  if(player.answers.length>0){
    compatList=bots.map(b=>({bot:b,compat:calcCompatibility(player.answers,b.answers)}));
    compatList.sort((a,b2)=>b2.compat-a.compat);
  }
}
function endVoting(){
  compatList=bots.map(b=>({bot:b,compat:calcCompatibility(player.answers,b.answers)}));
  compatList.sort((a,b2)=>b2.compat-a.compat);
  const best=compatList[0];
  if(best&&best.compat>0){
    spawnHearts(best.bot.x-camX,best.bot.y-camY+MAP_TOP,12);
    spawnStars(player.x-camX,player.y-camY+MAP_TOP,10);
  }
  STATE='matchReveal';stateStartFrame=frameN;
  setTimeout(sfxReveal,300);
}
function startChatFlow(){if(!compatList.length)return;openChat(compatList[0].bot,compatList[0].compat);}
function restartGame(){
  STATE='title';frameN=0;stateStartFrame=0;
  currentQ=0;playerVote=-1;votePhase='pending';compatList=[];
  particles=[];emotePickerOpen=false;
  initSnow();
  document.getElementById('chat-wrap').style.display='none';
}

// ── Update ──────────────────────────────
function update(){
  frameN++;
  updateParticles();updateSnow();updateEmote();updateBotSpeech();
  updateDanceBeat();updateAmbient();

  if(STATE==='countdown'){
    updateEntities();updateCamera();
    checkPlayerZone();
    const prevSec=Math.ceil((countdownTimer)/60);
    countdownTimer--;
    const nowSec=Math.ceil((countdownTimer)/60);
    if(nowSec!==prevSec&&nowSec<=3&&nowSec>0)sfxCountdown(nowSec);
    if(countdownTimer===0)sfxCountdown(0);
    if(countdownTimer<=0)showNextQuestion();
  }

  if(STATE==='playing'||STATE==='voting'||STATE==='matchReveal'){
    updateEntities();updateCamera();
  }

  if(STATE==='playing'){
    checkPlayerZone();
    // Subtle compat hearts during play (after first answer)
    if(compatList.length>0&&frameN%55===0){
      const best=compatList[0];
      if(best.compat>=40){
        const mx=(player.x+best.bot.x)/2-camX;
        const my=(player.y+best.bot.y)/2-camY+MAP_TOP;
        if(mx>0&&mx<VW&&my>MAP_TOP&&my<MAP_BOT){
          particles.push({x:mx,y:my,vx:0,vy:-0.6,type:'heart',life:50,ml:50,size:4,col:'rgba(255,107,157,0.55)'});
        }
      }
    }
  }

  if(STATE==='voting'){
    checkPlayerZone();
    if(votePhase==='pending'){
      qTimer--;
      if(qTimer<=0){
        if(playerVote===-1){playerVote=Math.round(Math.random());player.answers.push(playerVote);}
        commitBotVotes();votePhase='reveal';voteRevealTimer=150;
      }
    } else if(votePhase==='reveal'){
      voteRevealTimer--;
      if(voteRevealTimer<=0){
        currentQ++;votePhase='pending';
        if(currentQ>=NUM_QUESTIONS)endVoting();
        else{STATE='countdown';stateStartFrame=frameN;countdownTimer=180;}
      }
    }
  }
}

function updateEntities(){
  let dx=0,dy=0;
  if(STATE!=='matchReveal'){
    if(keys['ArrowLeft']||keys['a']||keys['A'])dx=-1;
    if(keys['ArrowRight']||keys['d']||keys['D'])dx=1;
    if(keys['ArrowUp']||keys['w']||keys['W'])dy=-1;
    if(keys['ArrowDown']||keys['s']||keys['S'])dy=1;
    if(touchX!==null&&touchStartX!==null){
      const tdx=touchX-touchStartX,tdy=touchY-touchStartY;
      if(Math.abs(tdx)>10||Math.abs(tdy)>10){
        const mag=Math.sqrt(tdx*tdx+tdy*tdy);
        dx=tdx/mag;dy=tdy/mag;
      }
    }
  }
  if(dx!==0||dy!==0){
    const mag=Math.sqrt(dx*dx+dy*dy);
    const nx=dx/mag*PLAYER_SPEED,ny=dy/mag*PLAYER_SPEED;
    if(canWalk(player.x+nx,player.y))player.x+=nx;
    if(canWalk(player.x,player.y+ny))player.y+=ny;
    player.x=clamp(player.x,TS,WW-TS);player.y=clamp(player.y,TS,WH-TS);
    if(dx!==0)player.facing=dx>0?'right':'left';
    if(++player.frameTimer>8){player.frameTimer=0;player.frame=(player.frame+1)%4;}
  }
  if(player.tx!==null)moveEntity(player,player.tx,player.ty,PLAYER_SPEED);

  for(const b of bots){
    if(b.tx!==null){moveEntity(b,b.tx,b.ty,BOT_SPEED);}
    else{
      b.wanderTimer--;
      if(b.wanderTimer<=0&&(STATE==='playing'||STATE==='countdown')){
        b.wanderTimer=80+Math.random()*200;
        const sp=randSpawn();b.tx=sp.x;b.ty=sp.y;
      }
    }
  }
}

function updateCamera(){
  camX+=(player.x-VW/2-camX)*0.1;
  camY+=(player.y-MAP_H/2-camY)*0.1;
  camX=clamp(camX,0,WW-VW);camY=clamp(camY,0,WH-MAP_H);
}

// ── Draw ────────────────────────────────
function draw(){
  cx.save();cx.scale(SC,SC);
  cx.fillStyle='#0d0820';cx.fillRect(0,0,VW,VH);

  if(STATE==='title'){drawTitle();}
  else if(STATE==='charSelect'){drawCharSelect();drawSnow();}
  else{
    drawMapAndEntities();
    drawHUD();
    if(STATE==='countdown')drawCountdown();
    if(STATE==='voting')drawQuestionOverlay();
    if(STATE==='matchReveal')drawMatchReveal();
    if(STATE==='summary')drawSummary();
    // Snow overlay on top of everything (skip in tropical BG mode)
    if(STATE!=='matchReveal'&&!_BG_ACTIVE)drawSnow();
  }
  cx.restore();
}

// ── Map & Entities ──────────────────────
function drawMapAndEntities(){
  const mx=Math.round(camX),my=Math.round(camY);
  cx.save();
  cx.beginPath();cx.rect(0,MAP_TOP,VW,MAP_H);cx.clip();

  // Static map
  cx.drawImage(mapOC,mx,my,VW,MAP_H,0,MAP_TOP,VW,MAP_H);

  // Lamp glows (tile-map only)
  if(!_BG_ACTIVE)for(const lp of lampPositions){
    const sx=lp.x-mx,sy=lp.y-my+MAP_TOP;
    if(sx>-50&&sx<VW+50){
      const g=cx.createRadialGradient(sx,sy-8,0,sx,sy-8,38);
      g.addColorStop(0,'rgba(255,215,64,0.28)');g.addColorStop(1,'rgba(255,215,64,0)');
      cx.fillStyle=g;cx.fillRect(sx-38,sy-46,76,76);
    }
  }

  // Dance floor pulsing color overlay
  if(STATE==='playing'||STATE==='voting'||STATE==='countdown'){
    for(let r=17;r<=26;r++){
      for(let c=10;c<=13;c++){
        if(MAP[r][c]!==T_DANCE)continue;
        const tx=c*TS-mx,ty=r*TS-my+MAP_TOP;
        if(tx>-TS&&tx<VW+TS&&ty>MAP_TOP-TS&&ty<MAP_BOT+TS){
          const hue=(frameN*3+(r*55+c*40))%360;
          cx.fillStyle=`hsla(${hue},90%,60%,0.22)`;
          cx.fillRect(tx,ty,TS,TS);
        }
      }
    }
  }

  // Building signs (only shown in tile mode, not when bg image is active)
  if(!_BG_ACTIVE){
    const signs=[
      {wx:6.5*TS,wy:11.5*TS,text:'🏪 Tienda'},
      {wx:22.5*TS,wy:11.5*TS,text:'☕ Café'},
      {wx:6.5*TS,wy:27*TS,  text:'🎵 Club'},
      {wx:22.5*TS,wy:27*TS, text:'🌸 Jardín'},
      {wx:17*TS,  wy:12.5*TS,text:'☕'},
      {wx:11.5*TS,wy:21.5*TS,text:'🎶'},
    ];
    cx.font='bold 9px monospace';cx.textAlign='center';
    for(const sg of signs){
      const ssx=sg.wx-mx,ssy=sg.wy-my+MAP_TOP;
      if(ssx<-30||ssx>VW+30||ssy<MAP_TOP||ssy>MAP_BOT)continue;
      cx.fillStyle='rgba(255,240,200,0.85)';
      const tw2=cx.measureText(sg.text).width+6;
      cx.fillRect(ssx-tw2/2,ssy-9,tw2,12);
      cx.fillStyle='#3e2000';cx.fillText(sg.text,ssx,ssy);
    }
  }

  // Fountain ripple
  const fcx=fountainCenter.x-mx,fcy=fountainCenter.y-my+MAP_TOP;
  if(fcx>-60&&fcx<VW+60){
    const ph=(frameN%100)/100;
    cx.save();
    cx.globalAlpha=0.45*(1-ph);cx.strokeStyle='#29b6f6';cx.lineWidth=1;
    cx.beginPath();cx.arc(fcx,fcy,4+ph*22,0,Math.PI*2);cx.stroke();
    const ph2=(ph+0.4)%1;
    cx.globalAlpha=0.35*(1-ph2);
    cx.beginPath();cx.arc(fcx,fcy,4+ph2*22,0,Math.PI*2);cx.stroke();
    cx.restore();
  }

  // Vote zone tints during voting
  if(STATE==='voting'||votePhase==='reveal'){
    const az=0.09+0.04*Math.sin(frameN*0.05);
    cx.fillStyle=`rgba(66,165,245,${az})`;cx.fillRect(0,MAP_TOP,VW/2,MAP_H);
    cx.fillStyle=`rgba(239,83,80,${az})`;cx.fillRect(VW/2,MAP_TOP,VW/2,MAP_H);
    const pulse=0.6+0.4*Math.sin(frameN*0.07);
    cx.fillStyle=`rgba(66,165,245,${pulse})`;cx.font='bold 16px monospace';cx.textAlign='center';
    cx.fillText('◀ ZONA A',VW*0.25,MAP_TOP+26);
    cx.fillStyle=`rgba(239,83,80,${pulse})`;
    cx.fillText('ZONA B ▶',VW*0.75,MAP_TOP+26);
    cx.strokeStyle=`rgba(255,255,255,${0.25*pulse})`;cx.lineWidth=2;cx.setLineDash([5,4]);
    cx.beginPath();cx.moveTo(VW/2,MAP_TOP);cx.lineTo(VW/2,MAP_BOT);cx.stroke();
    cx.setLineDash([]);
  }

  // Entities sorted by Y
  const allE=[player,...bots].sort((a,b)=>a.y-b.y);
  for(const e of allE){
    const sx=e.x-mx,sy=e.y-my+MAP_TOP;
    if(sx<-40||sx>VW+40||sy<MAP_TOP-60||sy>MAP_BOT+20)continue;

    let alpha=1;
    if(STATE==='matchReveal'&&!e.isPlayer){
      const rank=compatList.findIndex(c=>c.bot===e);
      if(rank===0){
        cx.save();
        const pulse=0.5+0.5*Math.sin(frameN*0.15);
        cx.shadowColor='#ff6b9d';cx.shadowBlur=14*pulse;
        drawChar(cx,e.charDef,e.x,e.y,e.frame,e.facing,mx,my-MAP_TOP,1);
        cx.restore();
        cx.fillStyle='#ff6b9d';cx.font='bold 10px monospace';cx.textAlign='center';
        cx.fillText('❤️ '+e.name,sx,sy-40);
        continue;
      } else {alpha=0.4;}
    }

    // Dance floor: player bounces + faster frames
    const onDance=e.isPlayer&&e.zone===T_DANCE;
    const bounceY=onDance?Math.sin(frameN*0.25)*3.5:0;
    const drawFrame=onDance?(frameN>>2)&3:e.frame;
    if(onDance){
      // Disco glow under feet
      const dgx=sx,dgy=sy+bounceY;
      const dg=cx.createRadialGradient(dgx,dgy,0,dgx,dgy,22);
      const hue=(frameN*4)%360;
      dg.addColorStop(0,`hsla(${hue},100%,65%,0.45)`);
      dg.addColorStop(1,`hsla(${hue},100%,65%,0)`);
      cx.fillStyle=dg;cx.fillRect(dgx-22,dgy-22,44,44);
      // Disco ball sparkles raining down
      if(frameN%4===0){
        const sh=(frameN*3)%360;
        particles.push({x:sx+(Math.random()-0.5)*30,y:sy-60,vx:(Math.random()-0.5)*0.5,vy:0.8+Math.random(),
          type:'star',life:40,ml:40,size:2+Math.random()*3,col:`hsl(${sh},100%,70%)`});
      }
    }
    drawChar(cx,e.charDef,e.x,e.y-bounceY,drawFrame,e.facing,mx,my-MAP_TOP,alpha);

    // Player emote
    if(e.isPlayer&&e.emote&&e.emote.timer>0){
      const fadeAlpha=Math.min(1,e.emote.timer/30);
      cx.globalAlpha=fadeAlpha;
      cx.font='18px serif';cx.textAlign='center';
      cx.fillText(e.emote.emoji,sx,sy-48);
      cx.globalAlpha=1;
    }

    // Bot speech bubble / emote
    if(!e.isPlayer&&e.emote&&e.emote.timer>0&&alpha>0.5){
      const fadeA=Math.min(1,e.emote.timer/20);
      cx.globalAlpha=fadeA;cx.font='16px serif';cx.textAlign='center';
      cx.fillText(e.emote.emoji,sx,sy-48);cx.globalAlpha=1;
    }
    if(!e.isPlayer&&e.speech&&e.speech.text&&alpha>0.5){
      const fadeA=Math.min(1,e.speech.timer/20);
      cx.globalAlpha=fadeA;
      drawSpeechBubble(sx,sy,e.speech.text);
      cx.globalAlpha=1;
    }

    // Name label
    if(alpha>0.5){
      cx.fillStyle=e.isPlayer?'#ffd700':'rgba(255,255,255,0.75)';
      cx.font=`bold ${e.isPlayer?10:9}px monospace`;cx.textAlign='center';
      cx.fillText(e.name,sx,sy-30);
    }

    // Vote indicator (reveal phase)
    if(votePhase==='reveal'&&!e.isPlayer&&e.answers.length>0){
      const v=e.answers[e.answers.length-1];
      if(v!==-1&&alpha>0.5){
        cx.fillStyle=v===0?'#42a5f5':'#ef5350';
        cx.font='bold 9px monospace';cx.textAlign='center';

}

    cx.lineWidth=sel?2.5:1;
    if(sel){cx.shadowColor='#ff6b9d';cx.shadowBlur=14;}
    cx.strokeStyle=sel?'#ff6b9d':fem?'rgba(255,107,157,0.28)':'rgba(66,165,245,0.28)';
    cx.strokeRect(bx+0.5,by+0.5,cardW-1,cardH-1);
    cx.shadowBlur=0;

    // Character sprite – walk cycle
    cx.save();
    cx.translate(bx+cardW/2,by+cardH-26);
    const _r=_SPR_ROW[cd.id];
    if(_r!==undefined&&_SPR_READY){
      const _col=((frameN>>4)>>1)&1;
      cx.drawImage(_SPR_IMG,_col*_SPR_CW,_r*_SPR_CH,_SPR_CW,_SPR_CH,-cardW*0.38,-cardH*0.7,cardW*0.76,cardH*0.7);
    }else{
      cx.scale(SPRITE_SC,SPRITE_SC);
      _drawCharPixels(cx,cd,(frameN>>4)&3);
    }
    cx.restore();

    // Name
    cx.font=`bold ${sel?13:11}px monospace`;cx.textAlign='center';
    cx.fillStyle=sel?'#ff9de2':'rgba(225,215,255,0.88)';
    cx.fillText(cd.name,bx+cardW/2,by+cardH-11);

    // Gender badge
    cx.font='9px monospace';
    cx.fillStyle=fem?'rgba(255,140,180,0.75)':'rgba(100,175,255,0.75)';
    cx.fillText(fem?'♀':'♂',bx+cardW/2,by+cardH-1);

    // Selected star
    if(sel){
      cx.fillStyle='#ffd700';cx.font='bold 12px serif';cx.textAlign='center';
      cx.fillText('★',bx+cardW/2,by+15);
    }
  }

  // ── JUGAR Button ──
  const ROWS=Math.ceil(CHARS.length/COLS);
  const gridBot=GRID_Y+ROWS*cardH;
  const btnY=gridBot+14,btnX=VW/2-75,btnW=150,btnH=46;
  const active=selectedChar!==null;

  if(active){
    const pulse=0.85+Math.sin(frameN*0.1)*0.15;
    cx.shadowColor='#ff6b9d';cx.shadowBlur=Math.round(pulse*18);
    cx.fillStyle=`rgba(220,60,120,${(0.75+pulse*0.25).toFixed(2)})`;
  } else {
    cx.shadowBlur=0;cx.fillStyle='rgba(80,60,110,0.4)';
  }
  cx.fillRect(btnX,btnY,btnW,btnH);
  cx.lineWidth=2;
  cx.strokeStyle=active?'rgba(255,200,230,0.85)':'rgba(130,110,150,0.3)';
  cx.strokeRect(btnX,btnY,btnW,btnH);
  cx.shadowBlur=0;
  cx.fillStyle=active?'#fff':'rgba(160,140,180,0.5)';
  cx.font='bold 20px monospace';cx.textAlign='center';
  cx.fillText('¡ JUGAR !',VW/2,btnY+31);

  if(active){
    const cd=CHARS[selectedChar];
    cx.fillStyle='rgba(196,168,255,0.5)';cx.font='10px monospace';
    cx.fillText(`Jugando como ${cd.name}`,VW/2,btnY+btnH+14);
  } else {
    cx.fillStyle='rgba(140,120,170,0.4)';cx.font='10px monospace';
    cx.fillText('← Selecciona un personaje',VW/2,btnY+btnH+14);
  }
}

// ── Utils ────────────────────────────────
function wrapText(ctx,text,maxW,fsize){
  const words=text.split(' ');const lines=[];let line='';
  for(const w of words){
    const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}
    else line=t;
  }
  if(line)lines.push(line);return lines;
}
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v;}

// ── Game Loop ────────────────────────────
function loop(){update();draw();requestAnimationFrame(loop);}

initSnow();
setupInput();
loop();
</script>
