<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Restock · Pokémon TCG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;min-height:100%;
  background:#0c0c1a;color:#fff;
  font-family:'Courier New',monospace;
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:200;
  background:linear-gradient(135deg,#cc0000,#880000);
  padding:12px 16px 10px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 20px rgba(0,0,0,0.7);
}
.hdr-back{
  background:rgba(0,0,0,0.4);border:2px solid rgba(255,255,255,0.3);
  color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:900;
  cursor:pointer;font-family:inherit;flex-shrink:0;
  text-decoration:none;white-space:nowrap;
}
.hdr-info{flex:1;min-width:0}
.hdr-title{font-size:18px;font-weight:900;color:#ffcb05;letter-spacing:1px;line-height:1}
.hdr-date{font-size:9px;color:rgba(255,203,5,0.55);letter-spacing:1px;margin-top:3px}
.hdr-ball{width:34px;height:34px;flex-shrink:0}

/* ── CONTENT ── */
.page{padding:14px 12px 24px}

/* ── TRENDING SECTION ── */
.sec-title{
  font-size:11px;font-weight:900;letter-spacing:2px;color:rgba(255,255,255,0.45);
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.sec-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08)}

.trend-row{
  display:flex;overflow-x:auto;gap:10px;padding-bottom:6px;
  scrollbar-width:none;margin-bottom:22px;
}
.trend-row::-webkit-scrollbar{display:none}

/* Trending card (compact, horizontal scroll) */
.tcard{
  flex-shrink:0;width:148px;border-radius:12px;overflow:hidden;
  border:2px solid rgba(255,255,255,0.08);
  background:#14142a;cursor:default;transition:transform .1s;
}
.tcard:active{transform:scale(.95)}
.tcard-hdr{
  height:78px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;padding:8px 9px;
}
.tcard-wm{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:44px;font-weight:900;color:rgba(255,255,255,0.12);
  white-space:nowrap;pointer-events:none;letter-spacing:-2px;
}
.tcard-code{font-size:8px;font-weight:900;color:rgba(255,255,255,0.5);letter-spacing:1px}
.tcard-name{font-size:12px;font-weight:900;color:#fff;line-height:1.2;text-shadow:0 1px 3px rgba(0,0,0,0.6)}
.tcard-body{padding:8px 9px 9px}
.hot-badge{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(255,80,0,0.25);border:1px solid rgba(255,80,0,0.4);
  color:#ff9955;border-radius:5px;padding:2px 7px;font-size:8px;font-weight:900;
  letter-spacing:0.5px;margin-bottom:6px;
}
.tcard-avail{font-size:9px;color:rgba(255,255,255,0.35);line-height:1.7}

/* ── MAIN SET LIST ── */
.sets-list{display:flex;flex-direction:column;gap:10px}

/* Main card */
.scard{
  border-radius:12px;overflow:hidden;
  border:2px solid rgba(255,255,255,0.06);
  background:#13132a;transition:transform .1s;
}
.scard:active{transform:scale(.99)}

.scard-hdr{
  height:82px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:10px 14px;
}
.scard-wm{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:58px;font-weight:900;color:rgba(255,255,255,0.10);
  white-space:nowrap;pointer-events:none;letter-spacing:-3px;
}
.scard-top-row{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:8px;
}
.scard-code{font-size:9px;font-weight:900;color:rgba(255,255,255,0.5);letter-spacing:1px;flex-shrink:0}
.scard-badge{
  border-radius:5px;padding:2px 8px;font-size:8px;font-weight:900;
  letter-spacing:0.5px;flex-shrink:0;margin-top:1px;
}
.scard-name{
  font-size:17px;font-weight:900;color:#fff;line-height:1.15;
  text-shadow:0 1px 4px rgba(0,0,0,0.5);
}

/* Product grid */
.scard-body{padding:10px 12px 12px}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.prod-item{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,0.04);border-radius:6px;
  padding:5px 8px;
}
.prod-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.prod-label{font-size:9px;font-weight:900;color:rgba(255,255,255,0.7);flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.prod-status{font-size:8px;color:rgba(255,255,255,0.35);white-space:nowrap;flex-shrink:0}

/* Countdown (for upcoming sets) */
.scard-countdown{
  margin:0 12px 10px;
  background:rgba(168,85,247,0.14);border:1px solid rgba(168,85,247,0.3);
  border-radius:8px;padding:7px 10px;
  font-size:11px;color:#c084fc;font-weight:900;letter-spacing:0.5px;
  display:flex;align-items:center;gap:6px;
}

/* Release date line */
.scard-date{font-size:10px;color:rgba(255,255,255,0.28);margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,0.05)}

/* Stock dot colors */
.dot-high{background:#22c55e}
.dot-low{background:#f59e0b}
.dot-out{background:#ef4444}
.dot-inc{background:#3b82f6}

/* Category badge colors */
.badge-proximo{background:rgba(168,85,247,0.2);color:#c084fc}
.badge-nuevo{background:rgba(34,197,94,0.2);color:#4ade80}
.badge-reciente{background:rgba(59,130,246,0.2);color:#60a5fa}
.badge-clasico{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.35)}
</style>
</head>
<body>

<div class="hdr">
  <a href="pokemon.html" class="hdr-back">← Pokémon</a>
  <div class="hdr-info">
    <div class="hdr-title">RESTOCK TCG</div>
    <div class="hdr-date" id="hdr-date"></div>
  </div>
  <svg class="hdr-ball" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <circle cx="30" cy="30" r="27" fill="#fff" stroke="#111" stroke-width="3.5"/>
    <path d="M3 30 Q3 3 30 3 Q57 3 57 30Z" fill="#cc0000"/>
    <rect x="3" y="26.5" width="54" height="7" fill="#111"/>
    <circle cx="30" cy="30" r="9" fill="#eee" stroke="#111" stroke-width="3.5"/>
    <circle cx="30" cy="30" r="4.5" fill="#fff"/>
    <circle cx="25.5" cy="25.5" r="2.2" fill="rgba(255,255,255,0.55)"/>
  </svg>
</div>

<div class="page">
  <div class="sec-title" id="trend-title"></div>
  <div class="trend-row" id="trend-row"></div>

  <div class="sec-title" id="sets-title"></div>
  <div class="sets-list" id="sets-list"></div>
</div>

<script>
'use strict';

// ────────────────────────────────────────────────────────────────────
//  SETS — Edita release, stock y hot para reflejar tu inventario real.
//
//  stock por producto:
//    'high'     → ✅ Disponible
//    'low'      → ⚠ Pocas
//    'out'      → ❌ Agotado
//    'incoming' → 🚚 En camino
//    null       → producto no existe para este set
//
//  hot: true  → aparece en la sección Trending
// ────────────────────────────────────────────────────────────────────
var SETS = [
  { id:'sv95',  name:'Destined Rivals',      code:'SV9.5', release:'2025-05-23', color:'#cc3300', hot:true,
    stock:{ booster:'high', etb:'high',  upc:null,  blisters:'high',  bundle:'high' } },

  { id:'sv9',   name:'Journey Together',     code:'SV9',   release:'2025-03-28', color:'#228855', hot:false,
    stock:{ booster:'high', etb:'low',   upc:null,  blisters:'high',  bundle:'high' } },

  { id:'sv85',  name:'Prismatic Evolutions', code:'SV8.5', release:'2025-01-17', color:'#bb00bb', hot:true,
    stock:{ booster:'low',  etb:'out',   upc:'out', blisters:'low',   bundle:'low'  } },

  { id:'sv8',   name:'Surging Sparks',       code:'SV8',   release:'2024-11-08', color:'#ccaa00', hot:true,
    stock:{ booster:'high', etb:'low',   upc:'out', blisters:'high',  bundle:'high' } },

  { id:'sv7',   name:'Stellar Crown',        code:'SV7',   release:'2024-09-13', color:'#0088cc', hot:false,
    stock:{ booster:'high', etb:'high',  upc:null,  blisters:'high',  bundle:'high' } },

  { id:'sv65',  name:'Shrouded Fissure',     code:'SV6.5', release:'2024-08-02', color:'#774400', hot:false,
    stock:{ booster:'low',  etb:'out',   upc:null,  blisters:'low',   bundle:'low'  } },

  { id:'sv6',   name:'Twilight Masquerade',  code:'SV6',   release:'2024-05-24', color:'#aa8800', hot:false,
    stock:{ booster:'low',  etb:'out',   upc:null,  blisters:'out',   bundle:'low'  } },

  { id:'sv5',   name:'Temporal Forces',      code:'SV5',   release:'2024-03-22', color:'#228833', hot:false,
    stock:{ booster:'high', etb:'low',   upc:null,  blisters:'high',  bundle:'high' } },

  { id:'sv45',  name:'Paldean Fates',        code:'SV4.5', release:'2024-01-26', color:'#cc2277', hot:true,
    stock:{ booster:'low',  etb:'out',   upc:null,  blisters:'low',   bundle:'low'  } },

  { id:'sv4',   name:'Paradox Rift',         code:'SV4',   release:'2023-11-03', color:'#6611bb', hot:false,
    stock:{ booster:'low',  etb:'out',   upc:null,  blisters:'out',   bundle:'low'  } },

  { id:'sv35',  name:'151',                  code:'SV3.5', release:'2023-09-22', color:'#ee9900', hot:true,
    stock:{ booster:'low',  etb:'out',   upc:'out', blisters:'low',   bundle:'low'  } },

  { id:'sv3',   name:'Obsidian Flames',      code:'SV3',   release:'2023-08-11', color:'#ee4400', hot:false,
    stock:{ booster:'low',  etb:'out',   upc:null,  blisters:'out',   bundle:'low'  } },

  { id:'sv2',   name:'Paldea Evolved',       code:'SV2',   release:'2023-06-09', color:'#0044bb', hot:false,
    stock:{ booster:'out',  etb:'out',   upc:null,  blisters:'out',   bundle:'out'  } },

  { id:'sv1',   name:'Scarlet & Violet',     code:'SV1',   release:'2023-03-31', color:'#bb1100', hot:false,
    stock:{ booster:'out',  etb:'out',   upc:null,  blisters:'out',   bundle:'out'  } },
];

// ── Agregar nuevos sets aquí arriba (al inicio del array) ──────────


// ────────────────────────────────────────────────────────────────────
//  ALGORITMO DE FECHA
// ────────────────────────────────────────────────────────────────────
var PROD_LABELS = {
  booster: 'Booster', etb: 'ETB', upc: 'UPC', blisters: 'Blisters', bundle: 'Bundle'
};

var STOCK_META = {
  high:     { cls:'dot-high', label:'Disponible' },
  low:      { cls:'dot-low',  label:'Pocas' },
  out:      { cls:'dot-out',  label:'Agotado' },
  incoming: { cls:'dot-inc',  label:'En camino' },
};

var CAT_META = {
  proximo:  { label:'Próximo',  badgeCls:'badge-proximo' },
  nuevo:    { label:'Nuevo',    badgeCls:'badge-nuevo' },
  reciente: { label:'Reciente', badgeCls:'badge-reciente' },
  clasico:  { label:'Clásico',  badgeCls:'badge-clasico' },
};

function today0() {
  var d = new Date(); d.setHours(0,0,0,0); return d;
}

function categorize(rel) {
  var days = (today0() - new Date(rel + 'T12:00:00')) / 86400000;
  if (days < 0)   return 'proximo';
  if (days < 90)  return 'nuevo';
  if (days < 365) return 'reciente';
  return 'clasico';
}

function daysUntil(rel) {
  return Math.ceil((new Date(rel + 'T12:00:00') - today0()) / 86400000);
}

function fmtDate(rel) {
  var d = new Date(rel + 'T12:00:00');
  var M = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return M[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

// Enrich sets
SETS.forEach(function(s) { s.cat = categorize(s.release); });

// Sort: future sets first (ascending by date), then past sets newest→oldest
SETS.sort(function(a, b) {
  var aFut = new Date(a.release) > today0();
  var bFut = new Date(b.release) > today0();
  if (aFut && bFut) return new Date(a.release) - new Date(b.release); // upcoming: soonest first
  if (aFut) return -1;
  if (bFut) return 1;
  return new Date(b.release) - new Date(a.release); // past: newest first
});

// ────────────────────────────────────────────────────────────────────
//  RENDER HELPERS
// ────────────────────────────────────────────────────────────────────
function prodDot(state) {
  if (!state || !STOCK_META[state]) return '';
  var m = STOCK_META[state];
  return '<div class="prod-dot '+m.cls+'"></div>';
}

function prodRows(stock) {
  var keys = Object.keys(stock).filter(function(k){ return stock[k] !== null; });
  return keys.map(function(k) {
    var m = STOCK_META[stock[k]] || STOCK_META.out;
    return '<div class="prod-item">'+
      prodDot(stock[k])+
      '<span class="prod-label">'+PROD_LABELS[k]+'</span>'+
      '<span class="prod-status">'+m.label+'</span>'+
    '</div>';
  }).join('');
}

// ── Trending cards ────────────────────────────────────────────────
function makeTrendCard(s) {
  var meta = STOCK_META;
  var avail = Object.keys(s.stock)
    .filter(function(k){ return s.stock[k] === 'high' || s.stock[k] === 'low'; })
    .map(function(k){ return PROD_LABELS[k]; }).join(' · ') || 'Sin stock';

  return '<div class="tcard">'+
    '<div class="tcard-hdr" style="background:linear-gradient(145deg,'+s.color+'cc,'+s.color+'55)">'+
      '<div class="tcard-wm">'+s.code+'</div>'+
      '<div class="tcard-code">'+s.code+'</div>'+
      '<div class="tcard-name">'+s.name+'</div>'+
    '</div>'+
    '<div class="tcard-body">'+
      '<div class="hot-badge">🔥 TRENDING</div>'+
      '<div class="tcard-avail">'+avail+'</div>'+
    '</div>'+
  '</div>';
}

// ── Main set card ────────────────────────────────────────────────
function makeSetCard(s) {
  var cat  = CAT_META[s.cat];
  var isProximo = s.cat === 'proximo';

  var countdown = isProximo
    ? '<div class="scard-countdown">⏳ Llega en '+daysUntil(s.release)+' días · Próximo lanzamiento</div>'
    : '';

  return '<div class="scard">'+
    '<div class="scard-hdr" style="background:linear-gradient(150deg,'+s.color+'cc 0%,'+s.color+'44 100%)">'+
      '<div class="scard-wm">'+s.code+'</div>'+
      '<div class="scard-top-row">'+
        '<div class="scard-code">'+s.code+'</div>'+
        '<span class="scard-badge '+cat.badgeCls+'">'+cat.label+'</span>'+
      '</div>'+
      '<div class="scard-name">'+s.name+'</div>'+
    '</div>'+
    '<div class="scard-body">'+
      countdown+
      '<div class="prod-grid">'+prodRows(s.stock)+'</div>'+
      '<div class="scard-date">'+fmtDate(s.release)+'</div>'+
    '</div>'+
  '</div>';
}

// ────────────────────────────────────────────────────────────────────
//  RENDER PAGE
// ────────────────────────────────────────────────────────────────────
var now = new Date();
document.getElementById('hdr-date').textContent =
  now.toLocaleDateString('es-PR',{weekday:'short',year:'numeric',month:'short',day:'numeric'}).toUpperCase();

// Trending
var hotSets = SETS.filter(function(s){ return s.hot; });
var trendTitle = document.getElementById('trend-title');
var trendRow   = document.getElementById('trend-row');

if (hotSets.length) {
  trendTitle.textContent = '🔥 TRENDING';
  trendRow.innerHTML = hotSets.map(makeTrendCard).join('');
} else {
  trendTitle.style.display = 'none';
  trendRow.style.display   = 'none';
}

// All sets newest → oldest
document.getElementById('sets-title').textContent = 'TODOS LOS SETS';
document.getElementById('sets-list').innerHTML = SETS.map(makeSetCard).join('');
</script>
</body>
</html>
