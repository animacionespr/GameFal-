// ── AUDIO ────────────────────────────────────────────────────────────
let AC = null, musicOn = false;
function initAudio(){ if(!AC) AC = new(window.AudioContext||window.webkitAudioContext)(); }

function startDembow(){
  if(!AC||musicOn) return; musicOn = true;
  const bpm=96, beat=60/bpm, bar=beat*4;
  function noise(dur){
    const b=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
    const d=b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; return b;
  }
  function kick(t){
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(38,t+0.12);
    g.gain.setValueAtTime(0.9,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    o.start(t);o.stop(t+0.3);
  }
  function snare(t){
    const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
    f.type='highpass';f.frequency.value=900;s.buffer=noise(0.2);
    s.connect(f);f.connect(g);g.connect(AC.destination);
    g.gain.setValueAtTime(0.35,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    s.start(t);s.stop(t+0.2);
  }
  function hat(t,v){
    const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
    f.type='highpass';f.frequency.value=7000;s.buffer=noise(0.05);
    s.connect(f);f.connect(g);g.connect(AC.destination);
    g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
    s.start(t);s.stop(t+0.05);
  }
  function bass(t,fr){
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sawtooth';o.frequency.value=fr;
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=300;
    o.connect(lp);lp.connect(g);g.connect(AC.destination);
    g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+beat*0.85);
    o.start(t);o.stop(t+beat);
  }
  const bassLine=[55,55,41,41,55,55,49,55];
  function schedBar(t){
    const e=beat/2;
    kick(t);kick(t+e*2);kick(t+e*4);kick(t+e*5);kick(t+e*6);
    snare(t+e*4);
    for(let i=0;i<8;i++) hat(t+e*i, i===5?0.22:0.1);
    for(let i=0;i<8;i++) bass(t+e*i, bassLine[i]);
  }
  let nxt=AC.currentTime+0.1;
  function sched(){
    while(nxt<AC.currentTime+0.6){schedBar(nxt);nxt+=bar;}
    if(musicOn) setTimeout(sched,200);
  }
  sched();
}
function stopMusic(){ musicOn=false; }

function sfx(t){
  if(!AC) return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  if(t==='punch'){
    o.frequency.setValueAtTime(220,AC.currentTime);o.frequency.exponentialRampToValueAtTime(80,AC.currentTime+0.07);
    g.gain.setValueAtTime(0.45,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.1);
  } else if(t==='kick'){
    o.frequency.setValueAtTime(320,AC.currentTime);o.frequency.exponentialRampToValueAtTime(65,AC.currentTime+0.09);
    g.gain.setValueAtTime(0.5,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.13);
  } else if(t==='hurt'){
    o.frequency.setValueAtTime(550,AC.currentTime);o.frequency.exponentialRampToValueAtTime(140,AC.currentTime+0.18);
    g.gain.setValueAtTime(0.3,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.22);
  } else if(t==='special'){
    o.type='sawtooth';
    o.frequency.setValueAtTime(440,AC.currentTime);o.frequency.exponentialRampToValueAtTime(200,AC.currentTime+0.25);
    g.gain.setValueAtTime(0.4,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.3);
  }
  o.start(); o.stop(AC.currentTime+0.35);
}

// ── SPRITE DRAWING ───────────────────────────────────────────────────
function drawChar(ctx, cd, x, y, state, fr, dir, sc2){
  ctx.save(); ctx.translate(x,y); ctx.scale(dir*(sc2||1), sc2||1);
  const {skin:sk,shirt:sh,pant:pt,cap,accent:ac} = cd;
  const w=state==='walk'?Math.sin(fr*0.35)*9:0;
  // shoes
  ctx.fillStyle='#111';
  ctx.fillRect(-17,52+w*.4,15,9); ctx.fillRect(2,52-w*.4,15,9);
  // legs
  ctx.fillStyle=pt;
  ctx.fillRect(-15,18,13,36+w*.5); ctx.fillRect(2,18,13,36-w*.5);
  // body
  ctx.fillStyle=sh;
  ctx.fillRect(-20,-16,40,36);
  // shirt detail
  if(cd.id==='yankee'){
    ctx.fillStyle='#003087'; ctx.fillRect(-18,-14,36,12);
    ctx.fillStyle='#FF0000'; ctx.fillRect(-18,-2,36,10);
    ctx.fillStyle='#fff';    ctx.fillRect(-18,8,36,10);
  } else if(cd.id==='real'){
    ctx.fillStyle='#FFD700';
    ctx.fillRect(-14,-4,28,3); ctx.fillRect(-10,1,20,3);
  } else if(cd.id==='clandestino'){
    ctx.fillStyle='#2e3e1a';
    ctx.fillRect(-18,-14,10,10); ctx.fillRect(6,-8,10,10); ctx.fillRect(-6,4,8,9);
  } else {
    ctx.fillStyle='#0a0a0a'; ctx.fillRect(-10,2,20,14);
  }
  // arms
  ctx.fillStyle=sk;
  if(state==='punch'){
    ctx.fillRect(-28,-12,12,14); ctx.fillRect(18,-12,28,12);
  } else if(state==='kick'){
    ctx.fillRect(-28,-12,12,30); ctx.fillRect(18,-12,12,14);
  } else if(state==='special'){
    ctx.fillRect(-30,-22,12,34); ctx.fillRect(18,-22,12,34);
  } else {
    ctx.fillRect(-28,-12+w*.4,12,30); ctx.fillRect(18,-12-w*.4,12,30);
  }
  // kick leg forward
  if(state==='kick'){
    ctx.fillStyle=pt; ctx.fillRect(2,4,13,20);
    ctx.fillStyle='#111'; ctx.fillRect(14,22,16,9);
  }
  // head
  ctx.fillStyle=sk; ctx.fillRect(-17,-48,34,34);
  // cap or hair
  if(cap){
    ctx.fillStyle=cap; ctx.fillRect(-20,-52,40,10); ctx.fillRect(-20,-52,40,4);
    ctx.fillStyle=ac; ctx.fillRect(6,-52,8,4);
  } else if(cd.id==='real'){
    ctx.fillStyle='#111'; ctx.fillRect(-15,-52,30,8);
    ctx.fillStyle='#2244aa'; ctx.fillRect(-16,-22,7,9);
  } else if(cd.id==='clandestino'){
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(-13,-52,26,10);
  } else {
    ctx.fillStyle='#1a0a0a'; ctx.fillRect(-13,-52,26,8);
  }
  // eyes
  ctx.fillStyle='#111'; ctx.fillRect(-11,-38,7,6); ctx.fillRect(4,-38,7,6);
  ctx.fillStyle='#fff'; ctx.fillRect(-10,-37,5,4); ctx.fillRect(5,-37,5,4);
  ctx.fillStyle='#223399'; ctx.fillRect(-9,-36,3,2); ctx.fillRect(6,-36,3,2);
  // mouth
  ctx.fillStyle= state==='hurt'?'#aa1111':'#333';
  ctx.fillRect(-5,-24,10,4);
  ctx.restore();
}

    ctx.fillRect(4,-42,9,3);  ctx.fillRect(8,-40,3,9);

function drawBG(camX){
  // sky
  const sky=cx.createLinearGradient(0,0,0,310);
  sky.addColorStop(0,'#05051a'); sky.addColorStop(.6,'#180a2a'); sky.addColorStop(1,'#2a1508');
  cx.fillStyle=sky; cx.fillRect(0,0,VW,310);
  // stars
  for(let i=0;i<55;i++){
    const sx=((i*97+13-camX*.04)%1100+1100)%1100;
    const sy=(i*43+7)%110+8, sz=(i%3)*.5+.5;
    cx.globalAlpha=.4+(i%3)*.2; cx.fillStyle='#fff';
    cx.fillRect(sx,sy,sz,sz);
  }
  cx.globalAlpha=1;
  // moon
  const mx=((700-camX*.025)%1200+1200)%1200;
  cx.fillStyle='#fff8dc'; cx.beginPath(); cx.arc(mx,55,26,0,Math.PI*2); cx.fill();
  cx.fillStyle='#180a2a'; cx.beginPath(); cx.arc(mx+9,50,20,0,Math.PI*2); cx.fill();
  // far buildings
  const fo=camX*.13;
  for(const b of FAR_BLDGS){
    const bx=((b.x-fo)%1500+1500)%1500;
    cx.fillStyle=b.c; cx.fillRect(bx,308-b.h,b.w-2,b.h);
    cx.fillStyle='rgba(255,195,80,0.55)';
    for(let wy=18;wy<b.h-16;wy+=22) for(let wx=10;wx<b.w-10;wx+=20)
      if((b.x+wx+wy)%3!==0) cx.fillRect(bx+wx,308-b.h+wy,8,10);
  }
  // near buildings
  const no=camX*.38;
  for(const b of NEAR_BLDGS){
    const bx=b.x-no;
    if(bx>VW+60||bx+b.w<-60) continue;
    cx.fillStyle=b.c; cx.fillRect(bx,308-b.h,b.w,b.h);
    cx.fillStyle=b.tr;
    cx.fillRect(bx,308-b.h,b.w,6); cx.fillRect(bx,304,b.w,4);
    cx.fillRect(bx+8,308-b.h+6,6,b.h-10);
    const [r,g,bl]=[parseInt(b.tr.slice(1,3),16),parseInt(b.tr.slice(3,5),16),parseInt(b.tr.slice(5,7),16)];
    for(let wy=20;wy<b.h-28;wy+=30) for(let wx=20;wx<b.w-10;wx+=32){
      if((b.x+wx+wy)%4!==0){
        cx.fillStyle=`rgba(${r},${g},${bl},0.35)`; cx.fillRect(bx+wx,308-b.h+wy,16,20);
        cx.fillStyle='rgba(255,255,210,0.65)'; cx.fillRect(bx+wx+3,308-b.h+wy+3,10,14);
      }
    }
    if(b.tr==='#FFD700'&&bx>-50&&bx<VW+50){
      cx.fillStyle=b.tr; cx.font='bold 16px monospace'; cx.textAlign='left';
      cx.fillText('LOÍZA',bx+14,308-b.h+45);
      cx.fillStyle='rgba(255,255,255,0.5)'; cx.font='10px monospace';
      cx.fillText('♪ ♪ ♪',bx+14,308-b.h+62);
    }
  }
  // sidewalk
  cx.fillStyle='#383838'; cx.fillRect(0,306,VW,234);
  cx.fillStyle='#282828'; cx.fillRect(0,346,VW,110);
  cx.fillStyle='#FFD700'; cx.fillRect(0,396,VW,3);
  cx.fillStyle='rgba(255,255,255,0.4)';
  for(let i=0;i<VW/60+2;i++){
    const lx=((i*60-camX)%VW+VW)%VW;
    cx.fillRect(lx,399,38,3);
  }
  cx.strokeStyle='rgba(90,90,90,0.35)'; cx.lineWidth=1;
  for(let tx=((-camX)%42+42)%42;tx<VW;tx+=42){
    cx.beginPath(); cx.moveTo(tx,306); cx.lineTo(tx,346); cx.stroke();
  }
  // lamps
  for(let i=0;i<7;i++){
    const lx=((i*180+100-camX*.97)%(VW*2+300)+VW*2+300)%(VW*2+300)-200;
    if(lx<-30||lx>VW+30) continue;
    cx.fillStyle='#555'; cx.fillRect(lx-3,226,6,82); cx.fillRect(lx-3,226,32,5); cx.fillRect(lx+26,224,5,16);
    const gl=cx.createRadialGradient(lx+28,228,0,lx+28,228,35);
    gl.addColorStop(0,'rgba(255,200,80,0.45)'); gl.addColorStop(1,'rgba(255,200,80,0)');
    cx.fillStyle=gl; cx.fillRect(lx,195,68,72);
    cx.fillStyle='#fff8dc'; cx.fillRect(lx+24,222,10,9);
  }
  // depth shadow
  const ds=cx.createLinearGradient(0,455,0,540);
  ds.addColorStop(0,'rgba(0,0,0,0)'); ds.addColorStop(1,'rgba(0,0,0,0.55)');
  cx.fillStyle=ds; cx.fillRect(0,455,VW,85);
}

  rapido: {type:'rapido', mhp:22,pow:4,spd:2.8,sc:0.82,skin:'#D4956A',shirtC:'#224422',pantC:'#1a2a0a',range:48,cool:55,pts:150},
};

const WAVES=[
  [{t:'regular',x:620,y:GY_MID-20},{t:'regular',x:730,y:GY_MID+25}],
  [{t:'regular',x:960,y:GY_MID},{t:'regular',x:1080,y:GY_MID-30},{t:'rapido',x:1180,y:GY_MID+20}],
  [{t:'regular',x:1450,y:GY_MID},{t:'grande',x:1640,y:GY_MID},{t:'rapido',x:1530,y:GY_MID-40}],
  [{t:'grande',x:2050,y:GY_MID-20},{t:'regular',x:2200,y:GY_MID},{t:'regular',x:2260,y:GY_MID+40},{t:'rapido',x:1950,y:GY_MID}],
  [{t:'grande',x:2850,y:GY_MID},{t:'grande',x:3060,y:GY_MID-30},{t:'rapido',x:2750,y:GY_MID+25},{t:'rapido',x:3160,y:GY_MID}],
  [{t:'regular',x:3660,y:GY_MID},{t:'grande',x:3750,y:GY_MID-20},{t:'regular',x:3850,y:GY_MID+20},{t:'rapido',x:3550,y:GY_MID},{t:'rapido',x:3960,y:GY_MID}],
];
const WTHRESH=[280,850,1380,1880,2680,3480];

function mkEnemy(type,x,y){
  const b=ETYPES[type];
  return{...JSON.parse(JSON.stringify(b)), hp:b.mhp, x,y, vx:0,vy:0,
    state:'walk',stimer:0,dir:x>500?-1:1,atimer:0,fr:0,alive:true,flash:0};
}
function mkBoss(){
  return{x:LW-320,y:GY_MID,hp:500,mhp:500,pow:20,spd:0.9,
    state:'walk',stimer:0,dir:-1,atimer:0,fr:0,alive:true,flash:0,phase:1};
}
function mkPlayer(ci){
  const c=CHARS[ci];
  return{x:160,y:GY_MID,cd:c,ci, hp:c.hp,mhp:c.hp,
    state:'idle',stimer:0,dir:1,vx:0,vy:0,inv:0,fr:0,alive:true};
}

function addParts(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.PI*2/n*i;
    parts.push({x,y,vx:Math.cos(a)*(2+Math.random()*3),vy:Math.sin(a)*(2+Math.random()*3)-2,
      col,sz:3+Math.random()*4,life:28+Math.random()*18,ml:46});
  }
}
function addFloat(x,y,txt,col){
  floats.push({x,y:y-15,txt,col,life:70,ml:70,vy:-0.85});
}

// ── INPUT ────────────────────────────────────────────────────────────
const K={}, PK={};
window.addEventListener('keydown',e=>{K[e.key]=true;});
window.addEventListener('keyup',e=>{K[e.key]=false;});
function jp(k){return K[k]&&!PK[k];}

// Touch
let tL=false,tR=false,tU=false,tD=false,tP=false,tK=false,tSp=false;
cv.addEventListener('touchstart',onTS,{passive:false});
cv.addEventListener('touchend',onTE,{passive:false});
cv.addEventListener('touchmove',onTS,{passive:false});
// Touch button centers in virtual coords
const DP ={x:VW*.13,y:VH*.80};  // d-pad center
const BTN={punch:{x:VW*.84,y:VH*.72}, kick:{x:VW*.93,y:VH*.88}, special:{x:VW*.73,y:VH*.60}};
const BTN_R=50; // hit radius

// Prevent iOS synthetic click from double-triggering after touchstart
let lastTouchStamp = 0;

function onTS(e){
  e.preventDefault();
  lastTouchStamp = Date.now();

  // Menu state transitions only on touchstart (not move)
  if(e.type==='touchstart'){
    if(STATE==='title'){initAudio();startDembow();STATE='select';return;}
    if(STATE==='select'){
      const tx=e.touches[0].clientX/sc;
      if(tx<VW/4) selChar=(selChar-1+CHARS.length)%CHARS.length;
      else if(tx>VW*3/4) selChar=(selChar+1)%CHARS.length;
      else startGame();
      return;
    }
    if(STATE==='gameover'||STATE==='victory'){resetGame();return;}
  }

  // In-game controls only
  if(STATE!=='game') return;
  tL=tR=tU=tD=tP=tK=tSp=false;
  for(const t of e.touches){
    const tx=t.clientX/sc, ty=t.clientY/sc;
    if(tx < VW/2){
      const dx=tx-DP.x, dy=ty-DP.y;
      if(Math.abs(dx)>Math.abs(dy)){if(dx<0)tL=true;else tR=true;}
      else{if(dy<0)tU=true;else tD=true;}
    } else {
      const dP=Math.hypot(tx-BTN.punch.x,   ty-BTN.punch.y);
      const dK=Math.hypot(tx-BTN.kick.x,    ty-BTN.kick.y);
      const dS=Math.hypot(tx-BTN.special.x, ty-BTN.special.y);
      const mn=Math.min(dP,dK,dS);
      if(mn<BTN_R*1.5){
        if(mn===dP) tP=true;
        else if(mn===dK) tK=true;
        else tSp=true;
      }
    }
  }
}
function onTE(e){if(e.touches.length===0) tL=tR=tU=tD=tP=tK=tSp=false;}

// Desktop mouse clicks only — skip if a touch fired recently (iOS ghost click guard)
cv.addEventListener('click',e=>{
  if(Date.now()-lastTouchStamp < 700) return;
  initAudio();
  if(STATE==='title'){startDembow();STATE='select';return;}
  const tx=e.clientX/sc;
  if(STATE==='select'){
    if(tx<VW/4) selChar=(selChar-1+CHARS.length)%CHARS.length;
    else if(tx>VW*3/4) selChar=(selChar+1)%CHARS.length;
    else startGame();
    return;
  }
  if(STATE==='gameover'||STATE==='victory'){resetGame();return;}
});

// ── UPDATE ───────────────────────────────────────────────────────────
function update(){
  FN++; if(spCool>0)spCool--;
  updPlayer(); updEnemies();
  if(boss&&boss.alive) updBoss();
  updFX(); checkWaves();
  // camera with optional lock
  let maxCam=LW-VW;
  if(enemies.length>0||(boss&&boss.alive&&bossSpawned)){
    maxCam=Math.min(camX+30, LW-VW);
  }
  tgtCamX=Math.max(0,Math.min(player.x-VW*.33, maxCam));
  camX+=(tgtCamX-camX)*.09;
  if(score>hiScore){hiScore=score;localStorage.setItem('cd_hi',hiScore);}
}

function updPlayer(){
  const p=player; if(!p.alive) return;
  p.fr++; if(p.inv>0)p.inv--;
  if(p.stimer>0){
    p.stimer--;
    if(p.stimer===8&&p.state==='punch') doAttack('punch');
    if(p.stimer===8&&p.state==='kick')  doAttack('kick');
    if(p.stimer===12&&p.state==='special') doSpecial();
    if(p.stimer===0&&['punch','kick','special','hurt'].includes(p.state)) p.state='idle';
    return;
  }
  const l=K['ArrowLeft']||K['a']||K['A']||tL;
  const r=K['ArrowRight']||K['d']||K['D']||tR;
  const u=K['ArrowUp']||K['w']||K['W']||tU;
  const d=K['ArrowDown']||K['s']||K['S']||tD;
  const pu=jp('z')||jp('Z')||jp('j')||jp('J')||tP;
  const ki=jp('x')||jp('X')||jp('k')||jp('K')||tK;
  const sp=(jp('c')||jp('C')||jp(' ')||tSp)&&spCool===0;
  const spd=p.cd.spd;
  p.vx=0;p.vy=0;
  if(l){p.vx=-spd;p.dir=-1;} if(r){p.vx=spd;p.dir=1;}
  if(u) p.vy=-spd*.65; if(d) p.vy=spd*.65;
  p.x=Math.max(50,Math.min(LW-50,p.x+p.vx));
  p.y=Math.max(GY_MIN,Math.min(GY_MAX,p.y+p.vy));
  if(sp){p.state='special';p.stimer=38;spCool=320;sfx('special');addFloat(p.x,p.y-65,p.cd.special+'!','#FFD700');}
  else if(pu){p.state='punch';p.stimer=22;sfx('punch');}
  else if(ki){p.state='kick';p.stimer=22;sfx('kick');}
  if(p.state==='idle'&&(l||r||u||d)) p.state='walk';
  if(p.state==='walk'&&!l&&!r&&!u&&!d) p.state='idle';
}

function doAttack(type){
  const p=player;
  const range=type==='kick'?95:72;
  const power=Math.round(p.cd.pow*(type==='kick'?1.6:1));
  const ax=p.x+p.dir*range*.5;
  for(const e of enemies){
    if(!e.alive) continue;
    if(Math.abs(e.x-ax)<range*.75&&Math.abs(e.y-p.y)<58) hitEnemy(e,power,type);
  }
  if(boss&&boss.alive&&Math.abs(boss.x-ax)<range&&Math.abs(boss.y-p.y)<75) hitBoss(power,type);
}
function doSpecial(){
  const p=player;
  for(const e of enemies){
    if(!e.alive)continue;
    if(Math.hypot(e.x-p.x,e.y-p.y)<175) hitEnemy(e,Math.round(p.cd.pow*3.2),'special');
  }
  if(boss&&boss.alive&&Math.hypot(boss.x-p.x,boss.y-p.y)<190) hitBoss(Math.round(p.cd.pow*3),'special');
  addParts(p.x,p.y-40,'#FFD700',22); addParts(p.x,p.y-40,p.cd.col,16);
}
function hitEnemy(e,pow,type){
  e.hp-=pow; e.flash=10; e.state='hurt'; e.stimer=14;
  addParts(e.x,e.y-30,'#ff4444',6);
  const labels={punch:'¡PAO!',kick:'¡ZAS!',special:'¡WEPA!'};
  const cols={punch:'#ff8800',kick:'#ffcc00',special:'#FFD700'};
  addFloat(e.x,e.y-72,labels[type],cols[type]);
  if(e.hp<=0){
    e.alive=false; score+=e.pts;
    addParts(e.x,e.y-40,'#FFD700',12);
    addFloat(e.x,e.y-90,'+'+e.pts,'#00ff88');
  }
}
function hitBoss(pow,type){
  boss.hp-=pow; boss.flash=10; boss.state='hurt'; boss.stimer=12;
  addParts(boss.x,boss.y-55,'#ff4444',10);
  const q=['¡COÑO!','¡QUÉ PALOS!','¡AI!','¡DIABLO!','¡ME CANSÉ!'];
  if(Math.random()<.35) addFloat(boss.x,boss.y-100,q[Math.floor(Math.random()*q.length)],'#ff3333');
  if(boss.hp<=0){
    boss.alive=false; score+=2500;
    addFloat(boss.x,boss.y-110,'+2500 ¡WEPA!','#FFD700');
    addParts(boss.x,boss.y-60,'#FFD700',30);
    addParts(boss.x,boss.y-60,'#FF0000',18);
    addParts(boss.x,boss.y-60,'#0055AA',18);
    setTimeout(()=>{STATE='victory';stopMusic();},2200);
  }
  if(boss.hp<boss.mhp*.5&&boss.phase===1){
    boss.phase=2; boss.spd=1.6; boss.pow=28;
    addFloat(boss.x,boss.y-120,'¡ME CAE MAL, MANO!','#ff0000');
  }
}

function updEnemies(){
  const p=player;
  enemies=enemies.filter(e=>e.alive||e.flash>0);
  for(const e of enemies){
    e.fr++; if(e.flash>0)e.flash--;
    if(e.stimer>0){e.stimer--;continue;} if(!e.alive) continue;
    const dx=p.x-e.x, dy=p.y-e.y, dist=Math.hypot(dx,dy);
    e.dir=dx>0?1:-1;
    if(dist>e.range){
      e.state='walk';
      e.x+=dx/dist*e.spd; e.y+=dy/dist*e.spd*.55;
      e.y=Math.max(GY_MIN,Math.min(GY_MAX,e.y));
    } else {
      if(e.atimer<=0){
        e.state='attack'; e.stimer=28; e.atimer=e.cool;
        if(p.inv===0){
          p.hp-=e.pow; p.inv=65; p.state='hurt'; p.stimer=16;
          sfx('hurt'); addFloat(p.x,p.y-72,'-'+e.pow,'#ff4444');
          if(p.hp<=0){p.hp=0;p.alive=false;setTimeout(()=>{STATE='gameover';stopMusic();},1600);}
        }
      } else { e.atimer--; }
    }
  }
}

function updBoss(){
  boss.fr++; if(boss.flash>0)boss.flash--;
  if(boss.stimer>0){boss.stimer--;return;}
  const p=player, dx=p.x-boss.x, dy=p.y-boss.y, dist=Math.hypot(dx,dy);
  boss.dir=dx>0?1:-1;
  if(dist>95){
    boss.state='walk';
    boss.x+=dx/dist*boss.spd; boss.y+=dy/dist*boss.spd*.45;
    boss.y=Math.max(GY_MIN,Math.min(GY_MAX,boss.y));
  } else {
    if(boss.atimer<=0){
      boss.state='attack'; boss.stimer=32; boss.atimer=75-(boss.phase===2?28:0);
      if(p.inv===0){
        p.hp-=boss.pow; p.inv=85; p.state='hurt'; p.stimer=20;
        sfx('hurt'); addFloat(p.x,p.y-72,'-'+boss.pow+' ¡AY!','#ff2222');
        if(p.hp<=0){p.hp=0;p.alive=false;setTimeout(()=>{STATE='gameover';stopMusic();},1600);}
      }
    } else boss.atimer--;
  }
}

function updFX(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=.16;
    if(--p.life<=0) parts.splice(i,1);
  }
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.y+=f.vy;
    if(--f.life<=0) floats.splice(i,1);
  }
}

function checkWaves(){
  if(waveN<WAVES.length){
    if(player.x>WTHRESH[waveN]&&enemies.length===0){
      WAVES[waveN].forEach(w=>enemies.push(mkEnemy(w.t,w.x,w.y)));
      waveN++;
    }
  } else if(!bossSpawned&&player.x>LW-800&&enemies.length===0){
    boss=mkBoss(); bossSpawned=true;
    addFloat(LW-320,GY_MID-120,'¡EL CAPO!','#FF0000');
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────
function draw(){
  cx.save(); cx.scale(sc,sc);
  cx.clearRect(0,0,VW,VH);
  if(STATE==='title')       drawTitle();
  else if(STATE==='select') drawSelect();
  else                      drawGame();
  cx.restore();
}

function drawGame(){
  drawBG(camX);
  cx.save(); cx.translate(-camX,0);
  // collect & depth-sort entities
  const ents=[];
  enemies.filter(e=>e.alive||e.flash>0).forEach(e=>ents.push({...e,_e:true}));
  if(boss&&(boss.alive||boss.flash>0)) ents.push({...boss,_b:true});
  if(player.alive) ents.push({...player,_p:true});
  ents.sort((a,b)=>a.y-b.y);
  for(const e of ents){
    // shadow
    cx.fillStyle='rgba(0,0,0,0.28)';
    cx.beginPath();
    const sw=e._b?95:e._e&&e.sc>1?70:48;
    cx.ellipse(e.x,e.y+8,sw*.5,8,0,0,Math.PI*2); cx.fill();
    if(e._p){
      if(e.inv>0&&Math.floor(e.inv/4)%2===0){}
      else{
        if(e.flash>0) cx.globalAlpha=.5+Math.sin(e.flash)*.5;
        drawChar(cx,e.cd,e.x,e.y,e.state,e.fr,e.dir,1);
        cx.globalAlpha=1;
      }
    } else if(e._b){
      if(e.flash>0) cx.globalAlpha=.35+Math.abs(Math.sin(e.flash*.8))*.65;
      drawBoss(cx,e.x,e.y,e.state,e.fr,e.dir);
      cx.globalAlpha=1;
      // boss name + HP
      cx.fillStyle='rgba(0,0,0,.6)'; cx.fillRect(e.x-75,e.y-125,150,22);
      cx.fillStyle='#FFD700'; cx.font='bold 11px monospace'; cx.textAlign='center';
      cx.fillText('★ DON CACHI EL CAPO ★',e.x,e.y-110);
      cx.fillStyle='#300'; cx.fillRect(e.x-75,e.y-106,150,14);
      cx.fillStyle=boss.hp>boss.mhp*.5?'#ff3333':'#ff0000';
      cx.fillRect(e.x-75,e.y-106,150*(boss.hp/boss.mhp),14);
    } else {
      if(e.flash>0) cx.globalAlpha=.35+Math.abs(Math.sin(e.flash*.8))*.65;
      drawEnemy(cx,e,e.x,e.y,e.state,e.fr,e.dir);
      cx.globalAlpha=1;
      cx.fillStyle='#300'; cx.fillRect(e.x-22,e.y-92,44,5);
      cx.fillStyle='#f33'; cx.fillRect(e.x-22,e.y-92,44*(e.hp/ETYPES[e.type].mhp),5);
    }
  }
  // FX
  for(const p of parts){
    cx.globalAlpha=p.life/p.ml; cx.fillStyle=p.col;
    cx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  }
  cx.globalAlpha=1;
  cx.textAlign='center';
  for(const f of floats){
    cx.globalAlpha=f.life/f.ml; cx.fillStyle=f.col;
    cx.font='bold 17px monospace'; cx.fillText(f.txt,f.x,f.y);
  }
  cx.globalAlpha=1;
  cx.restore();
  drawHUD();
  // overlay screens
  if(STATE==='gameover') drawGameOver();
  if(STATE==='victory')  drawVictory();
  // touch controls
  if('ontouchstart' in window) drawTouchUI();
}

function drawHUD(){
  const cd=CHARS[selChar];
  // health panel
  cx.fillStyle='rgba(0,0,0,.6)'; cx.fillRect(8,8,230,52);
  cx.fillStyle=cd.col; cx.font='bold 13px monospace'; cx.textAlign='left';
  cx.fillText(cd.name,16,24);
  cx.fillStyle='#333'; cx.fillRect(16,28,188,14);
  const hp=player.hp/player.mhp;
  cx.fillStyle=hp>.5?'#44ff66':hp>.25?'#ffaa00':'#ff2222';
  cx.fillRect(16,28,188*hp,14);
  cx.fillStyle='#fff'; cx.font='10px monospace'; cx.fillText(player.hp+'/'+player.mhp,20,40);
  // special bar
  cx.fillStyle='rgba(0,0,0,.55)'; cx.fillRect(8,62,230,18);
  cx.fillStyle=spCool===0?'#FFD700':'#444';
  cx.fillRect(8,62,230*(1-spCool/320),18);
  cx.fillStyle=spCool===0?'#000':'#777'; cx.font='bold 10px monospace';
  cx.fillText(spCool===0?'⚡ ESPECIAL LISTO':'⚡ '+(Math.ceil(spCool/60))+'s',16,74);
  // score
  cx.fillStyle='rgba(0,0,0,.6)'; cx.fillRect(VW-180,8,172,46);
  cx.fillStyle='#FFD700'; cx.font='bold 24px monospace'; cx.textAlign='right';
  cx.fillText(score,VW-16,33);
  cx.fillStyle='#aaa'; cx.font='11px monospace'; cx.fillText('RÉCORD: '+hiScore,VW-16,49);
  // controls hint — only on desktop
  if(!('ontouchstart' in window)){
    cx.fillStyle='rgba(0,0,0,.4)'; cx.fillRect(VW/2-210,VH-22,420,20);
    cx.fillStyle='rgba(255,255,255,.45)'; cx.font='10px monospace'; cx.textAlign='center';
    cx.fillText('FLECHAS:mover  Z:golpe  X:patada  C/ESPACIO:especial',VW/2,VH-8);
  }
}

function drawTouchUI(){
  cx.save();
  const a=0.62;
  // ── D-pad ──
  const {x:dpx,y:dpy}=DP;
  const ds=68;
  // outer ring
  cx.globalAlpha=a*.35;
  cx.fillStyle='#ffffff';
  cx.beginPath(); cx.arc(dpx,dpy,ds,0,Math.PI*2); cx.fill();
  // directional arrows
  cx.globalAlpha=a;
  cx.fillStyle='rgba(255,255,255,0.9)';
  cx.font='bold 28px monospace'; cx.textAlign='center';
  cx.fillText('◀',dpx-ds*.62,dpy+10);
  cx.fillText('▶',dpx+ds*.62,dpy+10);
  cx.fillText('▲',dpx,dpy-ds*.52+4);
  cx.fillText('▼',dpx,dpy+ds*.68);
  // center dot
  cx.globalAlpha=a*.5;
  cx.fillStyle='#fff';
  cx.beginPath(); cx.arc(dpx,dpy,10,0,Math.PI*2); cx.fill();
  // ── Action buttons ──
  const btns=[
    {pos:BTN.punch,   label:'GOLPE',  key:'Z', col:'#FF8800', active:tP},
    {pos:BTN.kick,    label:'PATADA', key:'X', col:'#FF3366', active:tK},
    {pos:BTN.special, label:'ESP.',   key:'⚡', col:'#FFD700', active:tSp&&spCool===0},
  ];
  for(const b of btns){
    const {x,y}=b.pos;
    const r=BTN_R;
    // shadow
    cx.globalAlpha=a*.4;
    cx.fillStyle='#000';
    cx.beginPath(); cx.arc(x+3,y+3,r,0,Math.PI*2); cx.fill();
    // fill
    cx.globalAlpha=b.active?0.95:a;
    cx.fillStyle=b.active?b.col:'rgba(0,0,0,0.55)';
    cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill();
    // ring
    cx.strokeStyle=b.col;
    cx.lineWidth=b.active?4:2.5;
    cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.stroke();
    // label
    cx.globalAlpha=b.active?1:a;
    cx.fillStyle=b.active?'#000':b.col;
    cx.font='bold 13px monospace'; cx.textAlign='center';
    cx.fillText(b.key,x,y-4);
    cx.font='bold 10px monospace';
    cx.fillText(b.label,x,y+12);
  }
  cx.globalAlpha=1;
  cx.restore();
}

function drawGameOver(){
  cx.fillStyle='rgba(0,0,0,.78)'; cx.fillRect(0,0,VW,VH);
  cx.textAlign='center';
  cx.shadowColor='#FF0000'; cx.shadowBlur=25;
  cx.fillStyle='#FF3333'; cx.font='bold 76px monospace'; cx.fillText('GAME OVER',VW/2,220);
  cx.shadowBlur=0;
  cx.fillStyle='#FFD700'; cx.font='bold 28px monospace'; cx.fillText('SCORE: '+score,VW/2,288);
  cx.fillStyle='rgba(255,200,0,.6)'; cx.font='18px monospace'; cx.fillText('RÉCORD: '+hiScore,VW/2,322);
  const p=.62+.38*Math.sin(Date.now()*.003);
  cx.globalAlpha=p; cx.fillStyle='#fff'; cx.font='bold 22px monospace';
  cx.fillText('► ENTER / TOCA PARA REINTENTAR',VW/2,405); cx.globalAlpha=1;
}

function drawVictory(){
  cx.fillStyle='rgba(0,0,0,.72)'; cx.fillRect(0,0,VW,VH);
  cx.textAlign='center';
  cx.shadowColor='#FFD700'; cx.shadowBlur=35;
  cx.fillStyle='#FFD700'; cx.font='bold 72px monospace'; cx.fillText('¡WEPA!',VW/2,170);
  cx.shadowBlur=0;
  cx.fillStyle='#00FF88'; cx.font='bold 28px monospace'; cx.fillText('¡CALLE LOÍZA LIBRE!',VW/2,230);
  cx.fillStyle='#fff'; cx.font='bold 24px monospace'; cx.fillText('SCORE FINAL: '+score,VW/2,282);
  if(score>=hiScore){
    cx.fillStyle='#FFD700'; cx.font='bold 19px monospace'; cx.fillText('¡NUEVO RÉCORD!',VW/2,316);
  }
  drawChar(cx,CHARS[selChar],VW/2,425,'idle',FN,1,1.5);
  const p=.62+.38*Math.sin(Date.now()*.003);
  cx.globalAlpha=p; cx.fillStyle='#fff'; cx.font='bold 20px monospace';
  cx.fillText('► ENTER / TOCA PARA JUGAR DE NUEVO',VW/2,505); cx.globalAlpha=1;
}

// ── TITLE ────────────────────────────────────────────────────────────
function drawTitle(){
  tfr++;
  drawBG(tfr*.28);
  cx.fillStyle='rgba(0,0,0,.52)'; cx.fillRect(0,0,VW,VH);
  cx.textAlign='center';
  cx.shadowColor='#FF3366'; cx.shadowBlur=32;
  cx.fillStyle='#FF3366'; cx.font='bold 96px monospace'; cx.fillText('CALLE',VW/2,155);
  cx.shadowColor='#FFD700'; cx.shadowBlur=32;
  cx.fillStyle='#FFD700'; cx.font='bold 96px monospace'; cx.fillText('DURA',VW/2,260);
  cx.shadowBlur=0;
  cx.fillStyle='#00FFAA'; cx.font='bold 17px monospace'; cx.fillText('★ UN BEAT EM UP BORICUA ★',VW/2,298);
  // preview chars
  for(let i=0;i<CHARS.length;i++){
    const cx2=140+i*190;
    const by=435+Math.sin(tfr*.05+i)*.8*7;
    drawChar(cx,CHARS[i],cx2,by,'idle',tfr+i*10,i%2===0?1:-1,1.25);
    cx.fillStyle=CHARS[i].col; cx.font='bold 11px monospace'; cx.textAlign='center';
    cx.fillText(CHARS[i].name,cx2,490);
  }
  const p=.6+.4*Math.sin(tfr*.065);
  cx.globalAlpha=p; cx.fillStyle='#fff'; cx.font='bold 23px monospace'; cx.textAlign='center';
  cx.fillText('► TOCA / ENTER PARA EMPEZAR',VW/2,518); cx.globalAlpha=1;
  cx.fillStyle='rgba(255,255,255,.35)'; cx.font='11px monospace';
  cx.fillText('Calle Loíza, San Juan PR  |  FLECHAS+Z/X/C',VW/2,536);
}

// ── SELECT ───────────────────────────────────────────────────────────
function drawSelect(){
  sfr++;
  drawBG(sfr*.18);
  cx.fillStyle='rgba(0,0,0,.62)'; cx.fillRect(0,0,VW,VH);
  cx.textAlign='center';
  cx.shadowColor='#FFD700'; cx.shadowBlur=18;
  cx.fillStyle='#FFD700'; cx.font='bold 30px monospace'; cx.fillText('ELIGE TU PERSONAJE',VW/2,50);
  cx.shadowBlur=0;
  for(let i=0;i<CHARS.length;i++){
    const bx=72+i*215;
    const sel=i===selChar;
    cx.fillStyle=sel?'rgba(255,215,0,.18)':'rgba(255,255,255,.04)';
    cx.fillRect(bx-4,68,200,368);
    if(sel){cx.strokeStyle=CHARS[i].col;cx.lineWidth=3;cx.strokeRect(bx-4,68,200,368);}
    const by=240+Math.sin(sfr*.05+i)*6;
    drawChar(cx,CHARS[i],bx+96,by,'idle',sfr+i*8,1,sel?1.45:1.1);
    cx.fillStyle=CHARS[i].col; cx.font=`bold ${sel?17:14}px monospace`; cx.textAlign='center';
    cx.fillText(CHARS[i].name,bx+96,310);
    cx.fillStyle='rgba(255,255,255,.55)'; cx.font='10px monospace';
    cx.fillText(CHARS[i].sub,bx+96,326);
    const stats=[['VEL',CHARS[i].spd,6,'#00FFAA'],['POD',CHARS[i].pow,6,'#FF6644'],['DEF',CHARS[i].def,5,'#4488FF']];
    for(let s=0;s<3;s++){
      const [lb,v,mx,co]=stats[s];
      cx.fillStyle='rgba(255,255,255,.4)'; cx.textAlign='left'; cx.font='10px monospace';
      cx.fillText(lb,bx+8,347+s*19);
      cx.fillStyle='#333'; cx.fillRect(bx+36,336+s*19,128,11);
      cx.fillStyle=co; cx.fillRect(bx+36,336+s*19,128*(v/mx),11);
    }
    cx.fillStyle='rgba(255,215,0,.75)'; cx.font='9px monospace'; cx.textAlign='center';
    cx.fillText('⚡ '+CHARS[i].special,bx+96,413);
    cx.fillStyle='rgba(255,255,255,.3)'; cx.font='bold 16px monospace';
    cx.fillText('['+(i+1)+']',bx+96,435);
  }
  cx.fillStyle='rgba(255,255,255,.65)'; cx.font='bold 15px monospace'; cx.textAlign='center';
  cx.fillText('← → elige  |  ENTER / tap centro confirma',VW/2,480);
  cx.fillStyle='rgba(255,255,255,.35)'; cx.font='12px monospace';
  cx.fillText('← toca izquierda/derecha de pantalla para navegar →',VW/2,500);
  const p=.6+.4*Math.sin(sfr*.08);
  cx.globalAlpha=p; cx.fillStyle=CHARS[selChar].col; cx.font='bold 19px monospace';
  cx.fillText('▶ PRESIONA ENTER O TOCA EL CENTRO',VW/2,526); cx.globalAlpha=1;
}

// ── GAME SETUP ───────────────────────────────────────────────────────
function startGame(){
  player=mkPlayer(selChar); enemies=[]; parts=[]; floats=[];
  camX=0; tgtCamX=0; score=0; boss=null; bossSpawned=false;
  spCool=0; FN=0; waveN=0; STATE='game';
}
function resetGame(){score=0;stopMusic();startDembow();STATE='select';}

// ── INPUT for menus ───────────────────────────────────────────────────
function handleMenuInput(){
  if(STATE==='title'){
    if(jp('Enter')||jp(' ')){initAudio();startDembow();STATE='select';}
  } else if(STATE==='select'){
    if(jp('ArrowLeft'))  selChar=(selChar-1+CHARS.length)%CHARS.length;
    if(jp('ArrowRight')) selChar=(selChar+1)%CHARS.length;
    if(jp('1')) selChar=0; if(jp('2')) selChar=1; if(jp('3')) selChar=2; if(jp('4')) selChar=3;
    if(jp('Enter')||jp(' ')) startGame();
  } else if(STATE==='gameover'||STATE==='victory'){
    if(jp('Enter')||jp(' ')) resetGame();
  }
}

// ── LOOP ─────────────────────────────────────────────────────────────
function loop(){
  handleMenuInput();
  if(STATE==='game'||STATE==='gameover'||STATE==='victory') update();
  draw();
  Object.assign(PK,K);
  requestAnimationFrame(loop);
}
loop();
</script>
