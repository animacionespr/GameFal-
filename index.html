<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CALLE DURA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#050510;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
body{display:flex;justify-content:center;align-items:center}
canvas{display:block}
</style>
</head>
<body>
<canvas id="g"></canvas>
<script>
'use strict';
const cv=document.getElementById('g'), cx=cv.getContext('2d');
const VW=390, VH=700;
let sc=1;
function resize(){
  sc=Math.min(window.innerWidth/VW,window.innerHeight/VH);
  cv.width=Math.floor(VW*sc); cv.height=Math.floor(VH*sc);
}
resize(); window.addEventListener('resize',resize);

// ── SCREEN SHAKE ─────────────────────────────────────────────────────
let shakeT=0, shakeAmt=0;
function shake(a){shakeAmt=a;shakeT=8;}

// ── AUDIO ─────────────────────────────────────────────────────────────
let AC=null, musicOn=false;
function initAudio(){if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)();}
function startMusic(){
  if(!AC||musicOn) return; musicOn=true;
  const bpm=96,beat=60/bpm,bar=beat*4;
  function noise(d){const b=AC.createBuffer(1,AC.sampleRate*d,AC.sampleRate),dt=b.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=Math.random()*2-1;return b;}
  function kick(t){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(38,t+.12);g.gain.setValueAtTime(.9,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);o.start(t);o.stop(t+.3);}
  function snare(t){const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=900;s.buffer=noise(.2);s.connect(f);f.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(.32,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);s.start(t);s.stop(t+.2);}
  function hat(t,v){const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=7000;s.buffer=noise(.05);s.connect(f);f.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);s.start(t);s.stop(t+.05);}
  function bass(t,fr){const o=AC.createOscillator(),g=AC.createGain(),lp=AC.createBiquadFilter();o.type='sawtooth';o.frequency.value=fr;lp.type='lowpass';lp.frequency.value=280;o.connect(lp);lp.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(.16,t);g.gain.exponentialRampToValueAtTime(.001,t+beat*.8);o.start(t);o.stop(t+beat);}
  function synth(t,fr,dur){const o=AC.createOscillator(),g=AC.createGain();o.type='square';o.frequency.value=fr;o.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur);}
  const bassL=[55,55,41,41,55,55,49,55];
  // Simple melody (major pentatonic, reggaeton-ish)
  const mel=[220,0,262,0,330,0,262,220, 196,0,220,0,262,0,0,0];
  function bar1(t){
    const e=beat/2;
    kick(t);kick(t+e*2);kick(t+e*4);kick(t+e*5);kick(t+e*6);
    snare(t+e*4);
    for(let i=0;i<8;i++) hat(t+e*i,i===5?.22:.1);
    for(let i=0;i<8;i++) bass(t+e*i,bassL[i]);
  }
  function bar2(t){
    bar1(t);
    const e=beat/2;
    for(let i=0;i<16;i++){if(mel[i]) synth(t+e*.5*i,mel[i],e*.45);}
  }
  let nxt=AC.currentTime+.1, bn=0;
  function sched(){
    while(nxt<AC.currentTime+.7){
      if(bn%2===0) bar1(nxt); else bar2(nxt);
      nxt+=bar; bn++;
    }
    if(musicOn) setTimeout(sched,200);
  }
  sched();
}
function stopMusic(){musicOn=false;}
function sfx(t){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  if(t==='punch'){o.frequency.setValueAtTime(240,AC.currentTime);o.frequency.exponentialRampToValueAtTime(80,AC.currentTime+.07);g.gain.setValueAtTime(.4,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.1);}
  else if(t==='kick'){o.frequency.setValueAtTime(340,AC.currentTime);o.frequency.exponentialRampToValueAtTime(60,AC.currentTime+.09);g.gain.setValueAtTime(.5,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.13);}
  else if(t==='heavy'){o.type='sawtooth';o.frequency.setValueAtTime(120,AC.currentTime);o.frequency.exponentialRampToValueAtTime(40,AC.currentTime+.18);g.gain.setValueAtTime(.55,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.22);shake(4);}
  else if(t==='special'){o.type='sawtooth';o.frequency.setValueAtTime(500,AC.currentTime);o.frequency.exponentialRampToValueAtTime(150,AC.currentTime+.3);g.gain.setValueAtTime(.45,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.35);shake(7);}
  else if(t==='hurt'){o.frequency.setValueAtTime(600,AC.currentTime);o.frequency.exponentialRampToValueAtTime(140,AC.currentTime+.18);g.gain.setValueAtTime(.28,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.22);}
  else if(t==='land'){o.frequency.setValueAtTime(90,AC.currentTime);o.frequency.exponentialRampToValueAtTime(40,AC.currentTime+.08);g.gain.setValueAtTime(.3,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.1);}
  o.start();o.stop(AC.currentTime+.4);
}

// ── CANVAS HELPERS ────────────────────────────────────────────────────
function rr(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);
  cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);
  cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);
  cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath();
}
function fillRR(x,y,w,h,r,col){cx.fillStyle=col;rr(x,y,w,h,r);cx.fill();}
function strokeRR(x,y,w,h,r,col,lw){cx.strokeStyle=col;cx.lineWidth=lw||1.5;rr(x,y,w,h,r);cx.stroke();}

// ── SPRITES ───────────────────────────────────────────────────────────
// Limb helper: draws a rounded rect segment from joint downward at angle
function limb(ctx,x,y,angle,len,w,col,outline){
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  ctx.fillStyle=col;
  rr.call({},(-w/2),0,w,len,w/2);
  // rr is defined in outer scope but we need to call it on the main cx...
  // Let me just use ctx directly
  ctx.beginPath();
  ctx.moveTo(-w/2+w/2,0);ctx.lineTo(w/2-w/2,0);
  // Simpler: just fillRect for limbs since they rotate
  ctx.fillRect(-w/2,0,w,len);
  if(outline){ctx.strokeStyle=outline;ctx.lineWidth=1.2;ctx.strokeRect(-w/2,0,w,len);}
  ctx.restore();
}

// Better approach - draw limb as a pill shape
function pill(ctx,x1,y1,x2,y2,r,col,strokeCol){
  const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy);
  const ang=Math.atan2(dy,dx);
  ctx.save(); ctx.translate(x1,y1); ctx.rotate(ang);
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(0,-r); ctx.lineTo(len,-r);
  ctx.arc(len,0,r,-.5*Math.PI,.5*Math.PI);
  ctx.lineTo(0,r);
  ctx.arc(0,0,r,.5*Math.PI,-.5*Math.PI);
  ctx.closePath(); ctx.fill();
  if(strokeCol){ctx.strokeStyle=strokeCol;ctx.lineWidth=1.5;ctx.stroke();}
  ctx.restore();
}

function drawChar(ctx,cd,x,y,jy,state,fr,dir,sc2){
  ctx.save();
  const scale=sc2||1;
  ctx.translate(x, y-(jy||0));
  ctx.scale(dir*scale,scale);

  const sk=cd.skin, sh=cd.shirt, pt=cd.pant, ha=cd.hair||'#111';
  const ol='rgba(0,0,0,0.55)'; // outline color
  const shade=cd.shade||'rgba(0,0,0,0.18)';

  // Walk / idle animation
  let wph=0;
  if(state==='walk'||state==='run') wph=(fr%16)/16*Math.PI*2;
  const lhA=state==='walk'?Math.sin(wph)*.52:0;
  const rhA=state==='walk'?-Math.sin(wph)*.52:0;
  const laA=state==='walk'?-Math.sin(wph)*.4:0;
  const raA=state==='walk'?Math.sin(wph)*.4:0;
  const bob=state==='walk'?Math.abs(Math.sin(wph))*2.5:0;

  // Pose overrides
  let raPunch=0, laBack=0, rkKick=0, lhKick=0;
  const p1=state==='punch1', p2=state==='punch2', up=state==='upper';
  const ki=state==='kick';
  if(p1){raPunch=-1.1;laBack=.25;}
  if(p2){raPunch=-1.35;laBack=.35;}
  if(up){raPunch=-1.6;laBack=.1;} // uppercut
  if(ki){rkKick=-1.2;lhKick=.15;}

  ctx.translate(0, bob);

  // ── BACK LEG ──
  const blA = lhA + lhKick;
  pill(ctx, -6,-28, -6+Math.sin(blA)*22,-28+Math.cos(blA)*22, 7, pt, ol);
  // lower back leg
  const blKn = -6+Math.sin(blA)*22, blKy = -28+Math.cos(blA)*22;
  pill(ctx, blKn,blKy, blKn+Math.sin(blA)*.3*20, blKy+Math.cos(blA)*.8*20, 6, pt, ol);
  // back shoe
  ctx.fillStyle='#1a1a1a'; ctx.strokeStyle=ol; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.ellipse(blKn+Math.sin(blA)*.3*20+4*(dir||1), blKy+Math.cos(blA)*.8*20+2, 11,5,blA*.15,0,Math.PI*2); ctx.fill();ctx.stroke();

  // ── TORSO ──
  ctx.fillStyle=sh;
  rr(-15,-56,30,28,6); ctx.fill();
  ctx.strokeStyle=ol;ctx.lineWidth=1.5; rr(-15,-56,30,28,6); ctx.stroke();
  // shade side
  ctx.fillStyle=shade;
  rr(4,-56,9,28,3); ctx.fill();

  // shirt detail per character
  if(cd.detail) cd.detail(ctx);

  // ── BACK ARM ──
  const baShoulderX=-13, baShoulderY=-52;
  const baA=laA+laBack;
  pill(ctx,baShoulderX,baShoulderY, baShoulderX+Math.sin(-baA)*18,baShoulderY+Math.cos(-baA)*18, 6,sk,ol);
  const baElX=baShoulderX+Math.sin(-baA)*18, baElY=baShoulderY+Math.cos(-baA)*18;
  pill(ctx,baElX,baElY, baElX+Math.sin(-baA*.6)*16,baElY+Math.cos(-baA*.6)*16, 5,sk,ol);

  // ── HEAD ──
  const headBob=state==='hurt'?2:0;
  ctx.fillStyle=sk;
  ctx.strokeStyle=ol; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.arc(0,-72+headBob,15,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // shade
  ctx.fillStyle=shade;
  ctx.beginPath(); ctx.arc(4,-72+headBob,10,0,Math.PI*2); ctx.fill();

  // hair / hat
  if(cd.id==='yankee'||cd.id==='kendo'){
    ctx.fillStyle=cd.capColor||'#003087';
    rr(-17,-87+headBob,34,12,4); ctx.fill();
    ctx.strokeStyle=ol; ctx.lineWidth=1.2; rr(-17,-87+headBob,34,12,4); ctx.stroke();
    // brim
    ctx.fillStyle=cd.capColor||'#003087';
    rr(-4,-90+headBob,24,5,2); ctx.fill();
    if(cd.id==='yankee'){ctx.fillStyle='#FFD700';rr(4,-87+headBob,7,4,2);ctx.fill();}
  } else {
    ctx.fillStyle=ha;
    rr(-14,-87+headBob,28,9,4); ctx.fill();
    ctx.strokeStyle=ol; ctx.lineWidth=1.2; rr(-14,-87+headBob,28,9,4); ctx.stroke();
  }

  // face
  const ey=-68+headBob;
  // eyes
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(-6,ey,4.5,3.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(5,ey,4.5,3.5,0,0,Math.PI*2); ctx.fill();
  const pupilOff=state==='hurt'?0:(dir<0?-1.5:1.5);
  ctx.fillStyle='#1a1a2a'; ctx.beginPath(); ctx.arc(-6+pupilOff,ey,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a2a'; ctx.beginPath(); ctx.arc(5+pupilOff,ey,2.5,0,Math.PI*2); ctx.fill();
  // shine
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-5.5+pupilOff,ey-1,1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(5.5+pupilOff,ey-1,1,0,Math.PI*2); ctx.fill();
  // eyebrows
  ctx.strokeStyle=ha; ctx.lineWidth=2; ctx.lineCap='round';
  const brow=state==='hurt'?.5:state.startsWith('punch')||ki?-.3:0;
  ctx.beginPath(); ctx.moveTo(-10,ey-5-brow); ctx.lineTo(-2,ey-5+brow); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,ey-5+brow); ctx.lineTo(10,ey-5-brow); ctx.stroke();
  // mouth
  ctx.strokeStyle='#333'; ctx.lineWidth=1.8; ctx.lineCap='round';
  if(state==='hurt'){ctx.beginPath();ctx.arc(0,-64+headBob,4,0,Math.PI);ctx.stroke();}
  else if(p1||p2||up||ki){ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.ellipse(0,-63+headBob,4,2.5,0,0,Math.PI*2);ctx.fill();}
  else{ctx.beginPath();ctx.moveTo(-4,-64+headBob);ctx.quadraticCurveTo(0,-61+headBob,4,-64+headBob);ctx.stroke();}

  // ── FRONT LEG ──
  const flA = rhA - rkKick;
  pill(ctx, 6,-28, 6+Math.sin(flA)*22,-28+Math.cos(flA)*22, 7, pt, ol);
  const flKn=6+Math.sin(flA)*22, flKy=-28+Math.cos(flA)*22;
  const flkA=ki?flA*.5-0.4:flA;
  pill(ctx, flKn,flKy, flKn+Math.sin(flkA)*20, flKy+Math.cos(flkA)*20, 6, pt, ol);
  ctx.fillStyle='#1a1a1a'; ctx.strokeStyle=ol; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.ellipse(flKn+Math.sin(flkA)*20+4*(dir||1), flKy+Math.cos(flkA)*20+2,11,5,flkA*.15,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // ── FRONT ARM ──
  const faShoulderX=13, faShoulderY=-52;
  const faAngleBase=-raA+(raPunch||0);
  pill(ctx,faShoulderX,faShoulderY, faShoulderX+Math.sin(faAngleBase)*18,faShoulderY+Math.cos(faAngleBase)*18, 6,sk,ol);
  const faElX=faShoulderX+Math.sin(faAngleBase)*18, faElY=faShoulderY+Math.cos(faAngleBase)*18;
  const faElA=up?faAngleBase-.3:faAngleBase;
  pill(ctx,faElX,faElY, faElX+Math.sin(faElA)*16,faElY+Math.cos(faElA)*16, 5,sk,ol);
  // fist
  const fistX=faElX+Math.sin(faElA)*16, fistY=faElY+Math.cos(faElA)*16;
  ctx.fillStyle=p1||p2||up?'#cc4400':sk;
  ctx.strokeStyle=ol; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(fistX,fistY,6,0,Math.PI*2); ctx.fill(); ctx.stroke();

  ctx.restore();
}

// ── ENEMY SPRITES ─────────────────────────────────────────────────────
function drawEnemy(ctx,e,x,y,jy,state,fr,dir){
  ctx.save();
  ctx.translate(x,y-(jy||0));
  ctx.scale(dir*(e.sc||1), e.sc||1);

  const sk=e.skin, sh=e.shirtC, pt=e.pantC, ol='rgba(0,0,0,0.55)';
  let wph=0;
  if(state==='walk') wph=(fr%16)/16*Math.PI*2;
  const lhA=Math.sin(wph)*.5, rhA=-Math.sin(wph)*.5;
  const laA=-Math.sin(wph)*.35, raA=Math.sin(wph)*.35;
  const bob=state==='walk'?Math.abs(Math.sin(wph))*2:0;
  const atk=state==='attack';
  ctx.translate(0,bob);

  // legs
  pill(ctx,-6,-26,-6+Math.sin(lhA)*20,-26+Math.cos(lhA)*20,7,pt,ol);
  const blk=-6+Math.sin(lhA)*20, bly=-26+Math.cos(lhA)*20;
  pill(ctx,blk,bly,blk+Math.sin(lhA*.4)*19,bly+Math.cos(lhA*.4)*19,6,pt,ol);
  ctx.fillStyle='#1a1a1a';ctx.strokeStyle=ol;ctx.lineWidth=1.2;
  ctx.beginPath();ctx.ellipse(blk+Math.sin(lhA*.4)*19+4,bly+Math.cos(lhA*.4)*19+2,11,5,0,0,Math.PI*2);ctx.fill();ctx.stroke();

  // torso
  ctx.fillStyle=sh; rr(-16,-54,32,26,5); ctx.fill();
  ctx.strokeStyle=ol;ctx.lineWidth=1.5; rr(-16,-54,32,26,5); ctx.stroke();
  // shade
  ctx.fillStyle='rgba(0,0,0,0.18)'; rr(5,-54,9,26,3); ctx.fill();
  // gold chain for grande
  if(e.type==='grande'){
    ctx.strokeStyle='#FFD700';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(0,-44,12,.7,Math.PI-.7);ctx.stroke();
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(0,-42,4,0,Math.PI*2);ctx.fill();
  }

  // back arm
  const baA=atk?-1.0:laA;
  pill(ctx,-13,-50,-13+Math.sin(-baA)*18,-50+Math.cos(-baA)*18,6,sk,ol);
  const bael=-13+Math.sin(-baA)*18, bael2=-50+Math.cos(-baA)*18;
  pill(ctx,bael,bael2,bael+Math.sin(-baA*.5)*15,bael2+Math.cos(-baA*.5)*15,5,sk,ol);

  // head
  ctx.fillStyle=sk;ctx.strokeStyle=ol;ctx.lineWidth=1.8;
  ctx.beginPath();ctx.arc(0,-68,16,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.beginPath();ctx.arc(4,-68,11,0,Math.PI*2);ctx.fill();

  // hat
  ctx.fillStyle=e.hatCol||'#cc2222';
  rr(-18,-83,36,10,4);ctx.fill();
  ctx.strokeStyle=ol;ctx.lineWidth=1.2;rr(-18,-83,36,10,4);ctx.stroke();
  // brim
  if(e.type!=='grande'){ctx.fillStyle=e.hatCol||'#cc2222';rr(-8,-87,26,6,2);ctx.fill();}

  // face
  const ey=-64;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(-6,ey,4,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(5,ey,4,3.5,0,0,Math.PI*2);ctx.fill();
  if(state==='hurt'){
    ctx.strokeStyle='#c00';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-10,ey-2);ctx.lineTo(-4,ey+2);ctx.moveTo(-4,ey-2);ctx.lineTo(-10,ey+2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(2,ey-2);ctx.lineTo(8,ey+2);ctx.moveTo(8,ey-2);ctx.lineTo(2,ey+2);ctx.stroke();
  } else {
    ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-6,ey,2.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';ctx.beginPath();ctx.arc(5,ey,2.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.beginPath();ctx.arc(-5.2,ey-1,1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.beginPath();ctx.arc(5.8,ey-1,1,0,Math.PI*2);ctx.fill();
  }
  ctx.strokeStyle='#333';ctx.lineWidth=1.8;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-5,-59);ctx.quadraticCurveTo(0,-56,5,-59);ctx.stroke();

  // front leg
  pill(ctx,6,-26,6+Math.sin(rhA)*20,-26+Math.cos(rhA)*20,7,pt,ol);
  const flk=6+Math.sin(rhA)*20,fly=-26+Math.cos(rhA)*20;
  pill(ctx,flk,fly,flk+Math.sin(rhA*.4)*19,fly+Math.cos(rhA*.4)*19,6,pt,ol);
  ctx.fillStyle='#1a1a1a';ctx.strokeStyle=ol;ctx.lineWidth=1.2;
  ctx.beginPath();ctx.ellipse(flk+Math.sin(rhA*.4)*19+4,fly+Math.cos(rhA*.4)*19+2,11,5,0,0,Math.PI*2);ctx.fill();ctx.stroke();

  // front arm
  const faA=atk?-1.3:raA;
  pill(ctx,13,-50,13+Math.sin(-faA)*18,-50+Math.cos(-faA)*18,6,sk,ol);
  const fael=13+Math.sin(-faA)*18,fael2=-50+Math.cos(-faA)*18;
  pill(ctx,fael,fael2,fael+Math.sin(-faA*.5)*15,fael2+Math.cos(-faA*.5)*15,5,sk,ol);
  ctx.fillStyle=atk?'#cc4400':sk;ctx.strokeStyle=ol;ctx.lineWidth=1.2;
  ctx.beginPath();ctx.arc(fael+Math.sin(-faA*.5)*15,fael2+Math.cos(-faA*.5)*15,5,0,Math.PI*2);ctx.fill();ctx.stroke();

  ctx.restore();
}

function drawBoss(ctx,x,y,state,fr,dir){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(dir*1.55,1.55);
  const sk='#C8906A',ol='rgba(0,0,0,0.55)';
  const bob=Math.sin(fr*.06)*2.5;
  const atk=state==='attack';

  ctx.translate(0,bob);

  // legs

function drawSpark(ctx,x,y,size,col){
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle=col||'#FFD700';
  for(let i=0;i<8;i++){
    ctx.save(); ctx.rotate(i*Math.PI/4);
    ctx.beginPath(); ctx.moveTo(0,-size*.3); ctx.lineTo(2,-size); ctx.lineTo(-2,-size); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(0,0,size*.35,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBG(camX){
  // sky
  const sky=cx.createLinearGradient(0,0,0,GND_Y);
  sky.addColorStop(0,'#02020f'); sky.addColorStop(.5,'#0d0620'); sky.addColorStop(1,'#1a0c10');
  cx.fillStyle=sky; cx.fillRect(0,0,VW,GND_Y);
  // stars
  for(let i=0;i<70;i++){
    const sx=((i*97+13-camX*.025)%650+650)%650;
    const sy=(i*43+7)%160+8; const sz=(i%3)*.5+.5;
    cx.globalAlpha=.4+(i%5)*.1; cx.fillStyle='#fff';
    cx.fillRect(sx,sy,sz,sz);
  }
  cx.globalAlpha=1;
  // moon
  const mx=((550-camX*.02)%800+800)%800;
  cx.fillStyle='#fff8dc'; cx.beginPath(); cx.arc(mx,55,24,0,Math.PI*2); cx.fill();
  cx.fillStyle='#02020f'; cx.beginPath(); cx.arc(mx+8,50,18,0,Math.PI*2); cx.fill();

  // far buildings
  const fo=camX*.12;
  for(const b of BLDGS){
    if(b.layer!==0) continue;
    const tile=720;
    for(let t=-1;t<=3;t++){
      const bx=b.x-fo+t*tile;
      if(bx>VW+5||bx+b.w<-5) continue;
      cx.fillStyle=b.c; cx.fillRect(bx,GND_Y-b.h,b.w-1,b.h);
      // windows
      cx.fillStyle=b.tr.replace('#','rgba(').replace(/(..)(..)(..)/, (_,r,g,bl)=>
        `${parseInt(r,16)},${parseInt(g,16)},${parseInt(bl,16)},0.55)`);
      for(let wy=16;wy<b.h-16;wy+=22) for(let wx=8;wx<b.w-8;wx+=18)
        if((b.x+wx+wy)%4!==0) cx.fillRect(bx+wx,GND_Y-b.h+wy,7,10);
    }
  }

  // near buildings (parallax 0.42)
  const no=camX*.42;
  const tileN=1400;
  for(const b of BLDGS){
    if(b.layer!==1) continue;
    for(let t=0;t<=2;t++){
      const bx=b.x-no+t*tileN;
      if(bx>VW+10||bx+b.w<-10) continue;
      cx.fillStyle=b.c; cx.fillRect(bx,GND_Y-b.h,b.w,b.h);
      // trim
      cx.fillStyle=b.tr;
      cx.fillRect(bx,GND_Y-b.h,b.w,6);
      cx.fillRect(bx,GND_Y-4,b.w,4);
      cx.fillRect(bx+6,GND_Y-b.h+6,5,b.h-10);
      // windows
      const [R,G,BL]=[parseInt(b.tr.slice(1,3),16),parseInt(b.tr.slice(3,5),16),parseInt(b.tr.slice(5,7),16)];
      for(let wy=18;wy<b.h-22;wy+=28) for(let wx=18;wx<b.w-8;wx+=30){
        if((b.x+wx+wy)%5!==0){
          cx.fillStyle=`rgba(${R},${G},${BL},0.3)`; cx.fillRect(bx+wx,GND_Y-b.h+wy,14,18);
          cx.fillStyle='rgba(255,255,210,0.6)'; cx.fillRect(bx+wx+3,GND_Y-b.h+wy+3,8,12);
        }
      }
      // label
      if(b.label&&bx>-20&&bx<VW){
        cx.fillStyle=b.tr; cx.font='bold 15px monospace'; cx.textAlign='left';
        cx.fillText(b.label,bx+10,GND_Y-b.h+38);
        cx.fillStyle='rgba(255,255,255,0.45)';cx.font='10px monospace';
        cx.fillText('♪ ♪',bx+10,GND_Y-b.h+54);
      }
    }
  }

  // sidewalk
  cx.fillStyle='#323232'; cx.fillRect(0,GND_Y,VW,VH-GND_Y);
  cx.fillStyle='#282828'; cx.fillRect(0,GND_Y+38,VW,110);
  // road markings
  cx.fillStyle='#FFD700'; cx.fillRect(0,GND_Y+88,VW,3);
  cx.fillStyle='rgba(255,255,255,0.4)';
  for(let i=0;i<VW/55+2;i++){const lx=((i*55-camX)%VW+VW)%VW; cx.fillRect(lx,GND_Y+91,35,3);}
  // sidewalk tiles
  cx.strokeStyle='rgba(80,80,80,0.35)';cx.lineWidth=1;
  for(let tx=((-camX)%38+38)%38;tx<VW;tx+=38){
    cx.beginPath();cx.moveTo(tx,GND_Y);cx.lineTo(tx,GND_Y+38);cx.stroke();
  }
  // street lamps
  for(let i=0;i<5;i++){
    const lx=((i*200+80-camX*.96)%(VW*2)+VW*2)%(VW*2)-100;
    if(lx<-20||lx>VW+20) continue;
    cx.fillStyle='#5a5a5a'; cx.fillRect(lx-3,GND_Y-75,6,77); cx.fillRect(lx-3,GND_Y-75,28,5); cx.fillRect(lx+22,GND_Y-77,5,14);
    const gl=cx.createRadialGradient(lx+25,GND_Y-74,0,lx+25,GND_Y-74,38);
    gl.addColorStop(0,'rgba(255,200,80,0.5)'); gl.addColorStop(1,'rgba(255,200,80,0)');
    cx.fillStyle=gl; cx.fillRect(lx-5,GND_Y-115,70,70);
    cx.fillStyle='#fff8dc'; cx.fillRect(lx+21,GND_Y-78,10,8);
  }
  // ground depth fade
  const gd=cx.createLinearGradient(0,GND_Y+150,0,VH);
  gd.addColorStop(0,'rgba(0,0,0,0)'); gd.addColorStop(1,'rgba(0,0,0,0.5)');
  cx.fillStyle=gd; cx.fillRect(0,GND_Y+150,VW,VH-GND_Y-150);
}

let tL=false,tR=false,tU=false,tD=false,tP=false,tK2=false,tSp=false,tJump=false;
// Touch control centers (in virtual coords)
const DPC={x:75,y:638}, BTR=52;
const BPUNCH={x:300,y:622}, BKICK={x:348,y:668}, BSPEC={x:252,y:668}, BJUMP={x:75,y:570};

function onTS(e){
  e.preventDefault();
  lastTouchStamp=Date.now();
  if(e.type==='touchstart'){
    if(STATE==='title'){initAudio();startMusic();STATE='select';return;}
    if(STATE==='select'){const tx=e.touches[0].clientX/sc;if(tx<VW/4)selChar=(selChar-1+CHARS.length)%CHARS.length;else if(tx>VW*3/4)selChar=(selChar+1)%CHARS.length;else startGame();return;}
    if(STATE==='gameover'||STATE==='victory'){resetToSelect();return;}
  }
  if(STATE!=='game') return;
  tL=tR=tU=tD=tP=tK2=tSp=tJump=false;
  for(const t of e.touches){
    const tx=t.clientX/sc,ty=t.clientY/sc;
    // jump button
    if(Math.hypot(tx-BJUMP.x,ty-BJUMP.y)<BTR){tJump=true;continue;}
    if(tx<VW/2){
      const dx=tx-DPC.x,dy=ty-DPC.y;
      if(Math.abs(dx)>Math.abs(dy)){if(dx<0)tL=true;else tR=true;}
      else{if(dy<0)tU=true;else tD=true;}
    } else {
      const dP=Math.hypot(tx-BPUNCH.x,ty-BPUNCH.y);
      const dK=Math.hypot(tx-BKICK.x,ty-BKICK.y);
      const dS=Math.hypot(tx-BSPEC.x,ty-BSPEC.y);
      const mn=Math.min(dP,dK,dS);
      if(mn<BTR*1.6){if(mn===dP)tP=true;else if(mn===dK)tK2=true;else tSp=true;}
    }
  }
}
function onTE(e){if(e.touches.length===0)tL=tR=tU=tD=tP=tK2=tSp=tJump=false;}
cv.addEventListener('click',e=>{
  if(Date.now()-lastTouchStamp<700)return;
  initAudio();
  if(STATE==='title'){startMusic();STATE='select';return;}
  if(STATE==='select'){startGame();return;}
  if(STATE==='gameover'||STATE==='victory'){resetToSelect();return;}
});

// ── UPDATE ────────────────────────────────────────────────────────────
function update(){
  FN++;if(spCool>0)spCool--;if(shakeT>0)shakeT--;
  updPlayer();updEnemies();
  if(boss&&boss.alive)updBoss();
  updFX();checkWaves();
  // camera
  let maxCam=LW-VW;
  if(enemies.length>0||(boss&&boss.alive))maxCam=Math.min(camX+25,LW-VW);
  tgtCamX=Math.max(0,Math.min(player.x-VW*.38,maxCam));
  camX+=(tgtCamX-camX)*.09;
  if(score>hiScore){hiScore=score;localStorage.setItem('cd_hi',hiScore);}
}

const COMBO_STATES=['punch1','punch2','upper'];
function updPlayer(){
  const p=player;if(!p.alive)return;
  p.fr++;if(p.inv>0)p.inv--;
  if(p.comboTimer>0){p.comboTimer--;if(p.comboTimer===0)p.combo=0;}

  if(p.stimer>0){
    p.stimer--;
    const hitFrame=8;
    if(p.stimer===hitFrame&&p.state==='punch1') doAtk('punch',1);
    if(p.stimer===hitFrame&&p.state==='punch2') doAtk('punch',1.3);
    if(p.stimer===hitFrame&&p.state==='upper')  doAtk('upper',1.8);
    if(p.stimer===hitFrame&&p.state==='kick')   doAtk('kick',1.5);
    if(p.stimer===12&&p.state==='special') doSpecial();
    if(p.stimer===0&&['punch1','punch2','upper','kick','special','hurt'].includes(p.state)){p.state='idle';}
    // jump attack still possible
    if(!p.grounded){updJump(p);}
    if(p.state==='hurt') return;
  } else {
    const l=K['ArrowLeft']||K['a']||K['A']||tL;
    const r=K['ArrowRight']||K['d']||K['D']||tR;
    const u=K['ArrowUp']||K['w']||K['W']||tU;
    const d=K['ArrowDown']||K['s']||K['S']||tD;
    const pu=jp('z')||jp('Z')||jp('j')||tP;
    const ki=jp('x')||jp('X')||jp('k')||tK2;
    const sp=(jp('c')||jp('C')||jp(' ')||tSp)&&spCool===0;
    const jump=(jp('ArrowUp')||jp('w')||jp('W')||tJump)&&p.grounded;

    const spd=p.cd.spd;
    p.vx=0;p.vy=0;
    if(l){p.vx=-spd;p.dir=-1;}if(r){p.vx=spd;p.dir=1;}
    if(u&&!jump)p.vy=-spd*.6;if(d)p.vy=spd*.6;
    p.x=Math.max(40,Math.min(LW-40,p.x+p.vx));
    p.y=Math.max(GY_MIN,Math.min(GY_MAX,p.y+p.vy));

    if(jump){p.jvy=JUMP_VEL;p.grounded=false;}
    updJump(p);

    if(sp){p.state='special';p.stimer=40;spCool=340;sfx('special');addFloat(p.x,p.y-100,p.cd.special+'!','#FFD700',true);}
    else if(pu){
      const cs=COMBO_STATES[p.combo];
      p.state=cs;p.stimer=22;p.combo=(p.combo+1)%3;p.comboTimer=55;
      sfx(p.state==='upper'?'heavy':'punch');
    }
    else if(ki){p.state='kick';p.stimer=22;sfx('kick');}
    if(p.state==='idle'&&(l||r||u||d))p.state='walk';
    if(p.state==='walk'&&!l&&!r&&!u&&!d)p.state='idle';
  }
}
function updJump(p){
  if(!p.grounded){
    p.jvy+=GRAV; p.jy-=p.jvy;
    if(p.jy<=0){p.jy=0;p.jvy=0;p.grounded=true;if(Math.abs(p.jvy)>3)sfx('land');}
  }
}

function doAtk(type,mult){
  const p=player;
  const range=type==='kick'?95:type==='upper'?65:72;
  const power=Math.round(p.cd.pow*mult*(1+(p.jy>20?.3:0)));
  const ax=p.x+p.dir*range*.5;
  const ay=p.y-p.jy;
  for(const e of enemies){
    if(!e.alive)continue;
    if(Math.abs(e.x-ax)<range*.75&&Math.abs(e.y-ay)<62){
      hitEnemy(e,power,type);
    }
  }
  if(boss&&boss.alive&&Math.abs(boss.x-ax)<range&&Math.abs(boss.y-ay)<78)hitBoss(power,type);
}

function doSpecial(){
  const p=player;
  const r=180;
  let hit=false;
  for(const e of enemies){
    if(!e.alive)continue;
    if(Math.hypot(e.x-p.x,e.y-p.y)<r){hitEnemy(e,Math.round(p.cd.pow*3.5),'special');hit=true;}
  }
  if(boss&&boss.alive&&Math.hypot(boss.x-p.x,boss.y-p.y)<r+20){hitBoss(Math.round(p.cd.pow*3),'special');hit=true;}
  addParts(p.x,p.y-40,'#FFD700',24,4);addParts(p.x,p.y-40,p.cd.col,18,3);
  addSpark(p.x,p.y-60,'#FFD700');
}

function hitEnemy(e,pow,type){
  e.hp-=pow;e.flash=12;e.state='hurt';e.stimer=14;
  addSpark(e.x,e.y-55,type==='upper'?'#ff8800':'#FFD700');
  addParts(e.x,e.y-40,'#ff4444',7);
  const lbl={punch:'¡PAO!',punch2:'¡BUM!',upper:'¡CRACK!',kick:'¡ZAS!',special:'¡WEPA!'};
  addFloat(e.x,e.y-75,lbl[type]||'¡AY!',type==='upper'?'#ff8800':'#FFD700');
  if(e.hp<=0){
    e.alive=false;score+=e.pts;
    // ragdoll
    e.dying=true;e.dyTimer=45;e.dyVx=player.dir*4+Math.random()*2;e.jvy=-6;
    if(Math.random()<.15)addFood(e.x,e.y-20);
    addFloat(e.x,e.y-95,'+'+e.pts,'#00ff88');
  }
}

function hitBoss(pow,type){
  boss.hp-=pow;boss.flash=12;boss.state='hurt';boss.stimer=12;
  addSpark(boss.x,boss.y-70,type==='upper'?'#ff4400':'#FFD700');
  addParts(boss.x,boss.y-55,'#ff4444',10);
  const q=['¡COÑO!','¡QUÉ PALOS!','¡AI!','¡DIABLO!','¡ME CANSÉ!','¡NO PUEDE SER!'];
  if(Math.random()<.4)addFloat(boss.x,boss.y-110,q[FN%q.length],'#ff3333');
  if(boss.hp<=0){
    boss.alive=false;score+=3000;
    addFloat(boss.x,boss.y-130,'+3000 ¡WEPA!','#FFD700',true);
    for(let i=0;i<3;i++){addParts(boss.x+Math.random()*60-30,boss.y-40,'#FFD700',20,5);addParts(boss.x+Math.random()*60-30,boss.y-40,'#FF0000',14,4);addParts(boss.x+Math.random()*60-30,boss.y-40,'#0055AA',14,4);}
    setTimeout(()=>{STATE='victory';stopMusic();},2500);
  }
  if(boss.hp<boss.mhp*.5&&boss.phase===1){
    boss.phase=2;boss.spd=1.6;boss.pow=30;
    addFloat(boss.x,boss.y-130,'¡ME CAE MAL, MANO!','#ff0000',true);
    shake(6);
  }
}

function updEnemies(){
  const p=player;
  for(const e of enemies){
    e.fr++;if(e.flash>0)e.flash--;
    // dying ragdoll
    if(e.dying){
      e.dyTimer--;
      e.x+=e.dyVx;
      e.jvy+=GRAV*.8; e.jy-=e.jvy;
      if(e.jy<=0){e.jy=0;e.jvy=0;e.dyVx*=.5;}
      if(e.dyTimer<=0){e.dying=false;}
      continue;
    }
    if(!e.alive) continue;
    if(e.stimer>0){e.stimer--;continue;}
    const dx=p.x-e.x,dy=p.y-e.y,dist=Math.hypot(dx,dy);
    e.dir=dx>0?1:-1;
    if(dist>e.range){
      e.state='walk';
      e.x+=dx/dist*e.spd; e.y+=dy/dist*e.spd*.55;
      e.y=Math.max(GY_MIN,Math.min(GY_MAX,e.y));
    } else {
      if(e.atimer<=0){
        e.state='attack';e.stimer=28;e.atimer=e.cool;
        if(p.inv===0&&p.jy<30){
          p.hp-=e.pow;p.inv=70;p.state='hurt';p.stimer=18;
          sfx('hurt');addFloat(p.x,p.y-75,'-'+e.pow,'#ff4444');
          shake(3);
          if(p.hp<=0){p.hp=0;p.alive=false;setTimeout(()=>{STATE='gameover';stopMusic();},1600);}
        }
      }else e.atimer--;
    }
  }
  enemies=enemies.filter(e=>e.alive||e.dying||e.flash>0);
}

function updBoss(){
  boss.fr++;if(boss.flash>0)boss.flash--;
  if(boss.stimer>0){boss.stimer--;return;}
  const p=player,dx=p.x-boss.x,dy=p.y-boss.y,dist=Math.hypot(dx,dy);
  boss.dir=dx>0?1:-1;
  // phase 2: occasional charge
  if(boss.phase===2){
    boss.chargeTimer--;
    if(boss.chargeTimer<0){
      boss.chargeTimer=180+Math.random()*120;
      addFloat(boss.x,boss.y-120,'¡AHORA SÍ!','#ff0000');
      boss.state='attack';boss.stimer=45;
      // do charge damage at end
      setTimeout(()=>{
        if(boss.alive&&p.inv===0&&Math.hypot(p.x-boss.x,p.y-boss.y)<110){
          p.hp-=boss.pow*1.5;p.inv=90;p.state='hurt';p.stimer=22;
          sfx('hurt');addFloat(p.x,p.y-75,'-'+Math.round(boss.pow*1.5)+' ¡CARGADA!','#ff0000');
          shake(5);
          if(p.hp<=0){p.hp=0;p.alive=false;setTimeout(()=>{STATE='gameover';stopMusic();},1600);}
        }
      },600);
      return;
    }
  }
  if(dist>100){boss.state='walk';boss.x+=dx/dist*boss.spd;boss.y+=dy/dist*boss.spd*.45;boss.y=Math.max(GY_MIN,Math.min(GY_MAX,boss.y));}
  else{
    if(boss.atimer<=0){
      boss.state='attack';boss.stimer=32;boss.atimer=70-(boss.phase===2?28:0);
      if(p.inv===0){
        p.hp-=boss.pow;p.inv=88;p.state='hurt';p.stimer=20;
        sfx('hurt');addFloat(p.x,p.y-75,'-'+boss.pow+' ¡AY!','#ff2222');
        shake(4);
        if(p.hp<=0){p.hp=0;p.alive=false;setTimeout(()=>{STATE='gameover';stopMusic();},1600);}
      }
    }else boss.atimer--;
  }
}

function updFX(){
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.16;if(--p.life<=0)parts.splice(i,1);}
  for(let i=floats.length-1;i>=0;i--){const f=floats[i];f.y+=f.vy;if(--f.life<=0)floats.splice(i,1);}
  for(let i=sparks.length-1;i>=0;i--){if(--sparks[i].life<=0)sparks.splice(i,1);}
  for(let i=foods.length-1;i>=0;i--){
    const f=foods[i];f.bob=(f.bob+.08)%(Math.PI*2);
    if(--f.life<=0){foods.splice(i,1);continue;}
    if(player.alive&&Math.hypot(player.x-f.x,player.y-f.y)<28){
      player.hp=Math.min(player.mhp,player.hp+22);
      addFloat(f.x,f.y-30,'+22 HP','#00ff88');
      foods.splice(i,1);
    }
  }
}

function checkWaves(){
  if(waveN<WAVES.length){
    if(player.x>WTHRESH[waveN]&&enemies.length===0){WAVES[waveN].forEach(w=>enemies.push(mkEnemy(w.t,w.x,w.y)));waveN++;}
  }else if(!bossSpawned&&player.x>LW-700&&enemies.length===0){boss=mkBoss();bossSpawned=true;addFloat(LW-350,GY_MID-140,'★ DON CACHI EL CAPO ★','#FFD700',true);}
}

// ── DRAW ──────────────────────────────────────────────────────────────
function draw(){
  cx.save();cx.scale(sc,sc);
  // shake
  if(shakeT>0){const s=(shakeT/8)*shakeAmt;cx.translate(Math.random()*s*2-s,Math.random()*s*2-s);}
  cx.clearRect(-20,-20,VW+40,VH+40);
  if(STATE==='title')drawTitle();
  else if(STATE==='select')drawSelect();
  else drawGame();
  cx.restore();
}

function drawGame(){
  drawBG(camX);
  cx.save();cx.translate(-camX,0);

  // food items
  for(const f of foods){
    const fy=f.y-Math.sin(f.bob)*5;
    cx.fillStyle='#ff4444';cx.strokeStyle='rgba(0,0,0,0.5)';cx.lineWidth=1.5;
    cx.beginPath();cx.arc(f.x,fy,8,0,Math.PI*2);cx.fill();cx.stroke();
    cx.fillStyle='#ff8888';cx.beginPath();cx.arc(f.x-2,fy-2,3,0,Math.PI*2);cx.fill();
    cx.fillStyle='#228B22';rr(f.x-2,fy-13,4,7,1);cx.fill();
  }

  // collect visible entities, sort by Y (depth)
  const ents=[];
  enemies.forEach(e=>ents.push({...e,_e:true}));
  if(boss&&(boss.alive||boss.flash>0))ents.push({...boss,_b:true});
  if(player.alive)ents.push({...player,_p:true});
  ents.sort((a,b)=>a.y-b.y);

  for(const e of ents){
    // shadow
    const sAlpha=e.jy>0?(1-Math.min(e.jy/120,1))*.35:.3;
    cx.fillStyle=`rgba(0,0,0,${sAlpha})`;
    cx.beginPath();
    const sw=e._b?100:e._e&&e.sc>1?72:52;
    cx.ellipse(e.x,e.y+8,sw*.5,8,0,0,Math.PI*2);cx.fill();

    if(e._p){
      if(e.inv>0&&Math.floor(e.inv/4)%2===0){}
      else{
        if(e.flash>0)cx.globalAlpha=.4+Math.abs(Math.sin(e.flash*.9))*.6;
        drawChar(cx,e.cd,e.x,e.y,e.jy,e.state,e.fr,e.dir,1);
        cx.globalAlpha=1;
      }
    } else if(e._b){
      if(e.flash>0)cx.globalAlpha=.35+Math.abs(Math.sin(e.flash*.8))*.65;
      drawBoss(cx,e.x,e.y,e.state,e.fr,e.dir);
      cx.globalAlpha=1;
      // boss HP
      const bw=140;
      cx.fillStyle='rgba(0,0,0,.65)';rr(e.x-bw/2-4,e.y-140,bw+8,22,4);cx.fill();
      cx.fillStyle='#300';rr(e.x-bw/2,e.y-138,bw,16,3);cx.fill();
      cx.fillStyle=boss.hp>boss.mhp*.5?'#ff3333':'#ff0000';
      rr(e.x-bw/2,e.y-138,bw*(boss.hp/boss.mhp),16,3);cx.fill();
      cx.fillStyle='#FFD700';cx.font='bold 10px monospace';cx.textAlign='center';
      cx.fillText('★ DON CACHI EL CAPO ★',e.x,e.y-148);
    } else {
      if(e.flash>0)cx.globalAlpha=.35+Math.abs(Math.sin(e.flash*.8))*.65;
      drawEnemy(cx,e,e.x,e.y,e.jy,e.dying?'hurt':e.state,e.fr,e.dir);
      cx.globalAlpha=1;
      if(e.alive){
        cx.fillStyle='#300';cx.fillRect(e.x-22,e.y-96,44,5);
        cx.fillStyle='#f33';cx.fillRect(e.x-22,e.y-96,44*(e.hp/ETYPES[e.type].mhp),5);
      }
    }
  }

  // sparks
  for(const s of sparks){
    cx.globalAlpha=s.life/s.ml;
    drawSpark(cx,s.x,s.y,s.size,s.col);
  }
  cx.globalAlpha=1;

  // particles
  for(const p of parts){cx.globalAlpha=p.life/p.ml;cx.fillStyle=p.col;cx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);}
  cx.globalAlpha=1;

  // floats
  cx.textAlign='center';
  for(const f of floats){
    cx.globalAlpha=f.life/f.ml;
    cx.font=f.big?'bold 20px monospace':'bold 16px monospace';
    if(f.big){cx.strokeStyle='rgba(0,0,0,0.7)';cx.lineWidth=3;cx.strokeText(f.txt,f.x,f.y);}
    cx.fillStyle=f.col;cx.fillText(f.txt,f.x,f.y);
  }
  cx.globalAlpha=1;
  cx.restore();

  drawHUD();
  if(STATE==='gameover')drawGameOver();
  if(STATE==='victory')drawVictory();
  if('ontouchstart' in window)drawTouchUI();
}

}
function drawVictory(){
  cx.fillStyle='rgba(0,0,0,.75)';cx.fillRect(0,0,VW,VH);
  cx.textAlign='center';
  cx.shadowColor='#FFD700';cx.shadowBlur=35;
  cx.fillStyle='#FFD700';cx.font='bold 72px monospace';cx.fillText('¡WEPA!',VW/2,200);
  cx.shadowBlur=0;
  cx.fillStyle='#00FF88';cx.font='bold 22px monospace';cx.fillText('¡CALLE LOÍZA LIBRE!',VW/2,252);
  cx.fillStyle='#fff';cx.font='bold 22px monospace';cx.fillText('SCORE: '+score,VW/2,295);
  if(score>=hiScore){cx.fillStyle='#FFD700';cx.font='bold 17px monospace';cx.fillText('¡NUEVO RÉCORD! 🏆',VW/2,325);}
  drawChar(cx,CHARS[selChar],VW/2,490,0,'idle',FN,1,1.6);
  const p=.6+.4*Math.sin(Date.now()*.003);
  cx.globalAlpha=p;cx.fillStyle='#fff';cx.font='bold 17px monospace';
  cx.fillText('► TOCA PARA JUGAR DE NUEVO',VW/2,590);cx.globalAlpha=1;
}

// ── TITLE & SELECT ────────────────────────────────────────────────────
function drawTitle(){
  tfr++;
  drawBG(tfr*.25);
  cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(0,0,VW,VH);
  cx.textAlign='center';
  cx.shadowColor='#FF3366';cx.shadowBlur=30;
  cx.fillStyle='#FF3366';cx.font='bold 82px monospace';cx.fillText('CALLE',VW/2,160);
  cx.shadowColor='#FFD700';cx.shadowBlur=30;
  cx.fillStyle='#FFD700';cx.font='bold 82px monospace';cx.fillText('DURA',VW/2,252);
  cx.shadowBlur=0;
  cx.fillStyle='#00FFAA';cx.font='bold 15px monospace';cx.fillText('★ BEAT EM UP BORICUA ★',VW/2,285);
  // chars preview
  for(let i=0;i<4;i++){
    const cx2=50+i*97;
    const by=440+Math.sin(tfr*.05+i)*.8*8;
    drawChar(cx,CHARS[i],cx2,by,0,'idle',tfr+i*8,i%2===0?1:-1,1.1);
    cx.fillStyle=CHARS[i].col;cx.font='bold 9px monospace';cx.textAlign='center';
    cx.fillText(CHARS[i].name,cx2,495);
  }
  const p=.6+.4*Math.sin(tfr*.065);
  cx.globalAlpha=p;cx.fillStyle='#fff';cx.font='bold 19px monospace';cx.textAlign='center';
  cx.fillText('► TOCA PARA EMPEZAR',VW/2,540);cx.globalAlpha=1;
  cx.fillStyle='rgba(255,255,255,.3)';cx.font='10px monospace';
  cx.fillText('Calle Loíza, San Juan PR',VW/2,565);
}

function drawSelect(){
  sfr++;
  drawBG(sfr*.18);
  cx.fillStyle='rgba(0,0,0,.65)';cx.fillRect(0,0,VW,VH);
  cx.textAlign='center';
  cx.shadowColor='#FFD700';cx.shadowBlur=15;
  cx.fillStyle='#FFD700';cx.font='bold 26px monospace';cx.fillText('ELIGE TU PERSONAJE',VW/2,45);
  cx.shadowBlur=0;

  for(let i=0;i<4;i++){
    const bx=6+i*96, sel=i===selChar;
    cx.fillStyle=sel?'rgba(255,215,0,.18)':'rgba(255,255,255,.04)';
    rr(bx,55,90,340,5);cx.fill();
    if(sel){cx.strokeStyle=CHARS[i].col;cx.lineWidth=2.5;rr(bx,55,90,340,5);cx.stroke();}
    const by=220+Math.sin(sfr*.05+i)*5;
    drawChar(cx,CHARS[i],bx+45,by,0,'idle',sfr+i*7,1,sel?1.15:.9);
    cx.fillStyle=CHARS[i].col;cx.font=`bold ${sel?12:11}px monospace`;cx.textAlign='center';
    cx.fillText(CHARS[i].name,bx+45,278);
    cx.fillStyle='rgba(255,255,255,.5)';cx.font='9px monospace';
    cx.fillText(CHARS[i].sub,bx+45,292);
    const stats=[['VEL',CHARS[i].spd,6,'#00FFAA'],['POD',CHARS[i].pow,6,'#FF6644'],['DEF',CHARS[i].def,5,'#4488FF']];
    for(let s=0;s<3;s++){
      const [lb,v,mx,co]=stats[s];
      cx.fillStyle='rgba(255,255,255,.35)';cx.textAlign='left';cx.font='8px monospace';
      cx.fillText(lb,bx+5,314+s*17);
      cx.fillStyle='#222';cx.fillRect(bx+26,304+s*17,58,9);
      cx.fillStyle=co;cx.fillRect(bx+26,304+s*17,58*(v/mx),9);
    }
    cx.fillStyle='rgba(255,215,0,.7)';cx.font='8px monospace';cx.textAlign='center';
    cx.fillText('⚡'+CHARS[i].special,bx+45,368);
    cx.fillStyle='rgba(255,255,255,.28)';cx.font='bold 14px monospace';
    cx.fillText('['+(i+1)+']',bx+45,388);
  }
  cx.fillStyle='rgba(255,255,255,.6)';cx.font='bold 13px monospace';cx.textAlign='center';
  cx.fillText('← toca los lados para cambiar',VW/2,420);
  const p=.6+.4*Math.sin(sfr*.08);
  cx.globalAlpha=p;cx.fillStyle=CHARS[selChar].col;cx.font='bold 17px monospace';
  cx.fillText('► TOCA EL CENTRO PARA JUGAR',VW/2,450);cx.globalAlpha=1;

  // controls legend
  cx.fillStyle='rgba(0,0,0,.55)';rr(20,465,350,80,8);cx.fill();
  cx.fillStyle='#fff';cx.font='bold 11px monospace';cx.textAlign='left';
  cx.fillText('CONTROLES:',28,483);
  cx.fillStyle='rgba(255,255,255,.7)';cx.font='10px monospace';
  cx.fillText('FLECHAS / D-PAD  →  mover',28,499);
  cx.fillText('Z  golpe (x3 combo)   X  patada',28,514);
  cx.fillText('SALTO + Z/X  →  ataque aéreo',28,529);
  cx.fillText('C / ⚡  →  ataque especial',28,544);
}

// ── INIT ──────────────────────────────────────────────────────────────
function startGame(){
  player=mkPlayer(selChar);enemies=[];parts=[];floats=[];sparks=[];foods=[];
  camX=0;tgtCamX=0;score=0;boss=null;bossSpawned=false;
  spCool=0;FN=0;waveN=0;STATE='game';
}
function resetToSelect(){score=0;stopMusic();startMusic();STATE='select';}

function handleMenuKeys(){
  if(STATE==='title'){if(jp('Enter')||jp(' ')){initAudio();startMusic();STATE='select';}}
  else if(STATE==='select'){
    if(jp('ArrowLeft')||jp('1')&&false){}
    if(jp('ArrowLeft'))selChar=(selChar-1+CHARS.length)%CHARS.length;
    if(jp('ArrowRight'))selChar=(selChar+1)%CHARS.length;
    if(jp('1'))selChar=0;if(jp('2'))selChar=1;if(jp('3'))selChar=2;if(jp('4'))selChar=3;
    if(jp('Enter')||jp(' '))startGame();
  }
  else if(STATE==='gameover'||STATE==='victory'){if(jp('Enter')||jp(' '))resetToSelect();}
}

function loop(){
  handleMenuKeys();
  if(STATE==='game'||STATE==='gameover'||STATE==='victory')update();
  draw();
  Object.assign(PK,K);
  requestAnimationFrame(loop);
}
loop();
</script>
